<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rizvi Family · Root Tree View</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ========== EXACT STYLES FROM FILE 2 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #d4edda;
            --pink-bg: #fff0f5;
            --light-pink: #ffe4e9;
            --light-sage: #f4f7f2;
            --border-sage: #c9d6c2;
            --sisters-border: #fb7185;
            --summary-border: #e6c87c;
            --table-header-bg: #fdf6e3;
            --bronze: #bc8c4f;
            --reset-red: #5a0000;
            --reset-red-dark: #7a1f1f;
            --pdf-grey: #6c757d;
            --pdf-grey-dark: #5a6268;
            --dashboard-green: #1b5e20;
            --sisters-box-bg: #fff0f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);

        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 6px 14px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            transition: all 0.2s;
            border-radius: 4px;
        }

        .header-btn:hover {
            background: var(--gold);
            color: var(--dark-blue);
            transform: translateY(-2px);
        }

        .header-btn.dashboard {
            background: var(--dashboard-green);
            color: white;
            border-color: transparent;
            border-radius: 4px;
        }

        .header-btn.dashboard:hover {
            background: #2e7d32;
        }

        .header-btn.reset {
            background: var(--reset-red);
            color: white;
            border-color: transparent;
            border-radius: 4px;
        }

        .header-btn.reset:hover {
            background: var(--reset-red-dark);
        }

        .header-btn.pdf {
            background: var(--pdf-grey);
            color: white;
            border-color: transparent;
            border-radius: 4px;
        }

        .header-btn.pdf:hover {
            background: var(--pdf-grey-dark);
        }

        .header-btn.table {
            background: var(--bronze);
            color: white;
            border-color: transparent;
            border-radius: 4px;
        }

        .header-btn.table:hover {
            background: #9e6f3a;
        }

        .menu-toggle {
            display: none;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fffcf8;
        }

        #rootSection {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            flex: 1;
        }

        .fixed-header-section {
            padding: 15px 15px 0 15px;
            background: #fffcf8;
            flex-shrink: 0;
        }

        .border-line {
            border-top: 3px solid var(--gold);
            margin: 20px 0 0 0;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            padding: 0 15px 15px 15px;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-label {
            font-weight: 700;
            color: var(--maroon);
            font-size: 13px;
            text-transform: uppercase;
            white-space: nowrap;
            min-width: 80px;
        }

        .search-wrapper {
            position: relative;
            flex: 2;
            min-width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 8px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .result-item {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
        }

        .result-item:hover {
            background: #faebcd;
        }

        .result-item .main-name {
            font-weight: 700;
            color: var(--dark-blue);
        }

        .result-item .gen {
            color: var(--maroon);
            font-size: 11px;
            margin-left: 6px;
        }

        .root-announce {
            background: var(--light-sage);
            padding: 20px 30px;
            border-radius: 30px;
            margin: 20px auto;
            text-align: center;
            border: 2px solid var(--border-sage);
            width: fit-content;
            max-width: 900px;
        }

        .generation-info {
            background: white;
            border-radius: 20px;
            padding: 15px;
            margin-top: 15px;
        }

.gap-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    flex-wrap: nowrap; /* Prevents wrapping */
    white-space: nowrap; /* Prevents text wrapping inside items */
}

@media screen and (max-width: 768px) {
    .gap-row {
        flex-wrap: wrap; /* Allows wrapping on mobile */
        white-space: normal;
    }
} 

        .gap-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            background: var(--light-sage);
            border-radius: 40px;
            border: 1px solid var(--border-sage);
            font-size: 14px;
        }

        .gap-value {
            font-weight: 700;
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .gap-value.highlight {
            background: var(--bronze);
            color: white;
        }

        .paths-container {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .path-column {
            flex: 1;
            min-width: 350px;
            max-width: 450px;
            text-align: center;
        }

        .path-column h3 {
            color: var(--maroon);
            margin-bottom: 20px;
            font-family: 'Playfair Display', serif;
            font-size: 18px;
        }

        /* ===== BOX STYLES EXACTLY FROM FILE 2 ===== */
        .box {
            border: 2px solid var(--gold);
            border-radius: 12px;
            background: white;
            min-width: 280px;
            max-width: 350px;
            text-align: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            margin: 8px auto;
        }

        .box:hover {
            transform: translateY(-3px);
        }

        .box.blinking-box {
            animation: blinkBoxLightGreen 1.5s infinite;
            border-width: 4px;
            z-index: 10;
            transform: scale(1.02);
        }

        @keyframes blinkBoxLightGreen {
            0%, 100% { 
                border-color: #2e7d32;
                background: #e8f5e9;
                box-shadow: 0 0 15px rgba(46, 125, 50, 0.4);
            }
            50% { 
                border-color: #4caf50;
                background: #c8e6c9;
                box-shadow: 0 0 30px rgba(76, 175, 80, 0.6);
                transform: scale(1.05);
            }
        }

        .box.root-box {
            border-color: var(--maroon);
            border-width: 4px;
            background: #fff0f0;
        }

        .box.female-box {
            background-color: var(--light-pink) !important;
            border-color: #fb7185 !important;
        }

        .box-header {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: #f8fafc;
            font-size: 11px;
            font-weight: 800;
            border-bottom: 1px solid #ddd;
            border-radius: 10px 10px 0 0;
        }

        .box-body {
            padding: 15px;
        }

        .member-name {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 18px;
            display: block;
        }

        .father-name {
            font-size: 12px;
            color: #64748b;
            margin-top: 6px;
        }

        .path-connector {
            width: 3px;
            height: 25px;
            background: var(--gold);
            margin: 5px auto;
        }

        .footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 11px;
            border-top: 2px solid var(--gold);
        }

        .hidden {
            display: none !important;
        }

        .toggle-view-btn {
            position: fixed; bottom: 20px; left: 20px; z-index: 9999;
            background: #5a0000; color: white; border: 2px solid #d4af37;
            border-radius: 50px; padding: 10px 20px; font-size: 14px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center;
            gap: 8px; opacity: 0.8;
        }
        .toggle-view-btn:hover {
            opacity: 1;
        }
        body.canvas-only .app-header,
        body.canvas-only .footer,
        body.canvas-only .fixed-header-section,
        body.canvas-only .search-row,
        body.canvas-only .border-line,
        body.canvas-only .toggle-view-btn {
            display: none !important;
        }
        body.canvas-only .main-content {
            height: 100vh;
        }

        /* Mobile styles */
        @media screen and (max-width: 768px) {
            body {
                overflow: auto;
                -webkit-overflow-scrolling: touch;
                height: auto;
                min-height: 100vh;
                padding: 5px;
            }
            
            .app-container {
                height: auto;
                min-height: calc(100vh - 10px);
                border-radius: 16px;
            }
            
            .app-header {
                position: relative;
                padding: 10px 15px;
            }
            
            .header-title {
                font-size: 18px;
                width: calc(100% - 50px);
            }
            
            .menu-toggle {
                display: flex !important;
                position: absolute;
                top: 50%;
                right: 15px;
                transform: translateY(-50%);
                background: var(--gold);
                color: black;
                border: none;
                border-radius: 50%;
                width: 44px;
                height: 44px;
                font-size: 26px;
                font-weight: bold;
                cursor: pointer;
                z-index: 2000;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            }
            
            .fixed-header-section {
                transition: max-height 0.3s ease;
                overflow: hidden;
                max-height: 500px;
                padding: 15px 15px 10px 15px;
            }
            
            .fixed-header-section.collapsed {

            .search-row {
                flex-direction: column;

            }

                min-width: 100%;
            }

            }

                justify-content: center;
                height: 44px;
            }
            
            .box {
                min-width: 240px;
                max-width: 300px;
            }
            
            .member-name {
                font-size: 16px;
            }
            
            .toggle-view-btn {
                bottom: 15px;
                left: 15px;
                padding: 10px 18px;
                font-size: 14px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">👥</span>
                <span id="mainTitle">Rizvi Family - Root Tree View</span>
            </div>
            <button class="menu-toggle" id="mobileMenuToggle">☰</button>
            <div class="header-actions" id="headerActions"></div>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="main-content" id="mainContent">
            <div id="rootSection">
                <div class="fixed-header-section">
                    <div class="search-row">
                        <span class="search-label">MEMBER 1</span>
                        <div class="search-wrapper">
                            <input type="text" id="search1" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value, 1)" autocomplete="off">
                            <div id="dropdown1" class="dropdown"></div>
                        </div>
                    </div>
                    <div class="search-row">
                        <span class="search-label">MEMBER 2</span>
                        <div class="search-wrapper">
                            <input type="text" id="search2" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value, 2)" autocomplete="off">
                            <div id="dropdown2" class="dropdown"></div>
                        </div>
                    </div>
                    <div class="border-line"></div>
                </div>
                <div class="scrollable-content" id="rootTree"></div>
            </div>
        </div>

        <div class="footer">
            Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010
        </div>
    </div>

    <div class="toggle-view-btn" id="toggleViewBtn" onclick="toggleCanvasView()">
        <span>👁️</span> <span>Full Screen</span>
    </div>

    <script>
        // ======================================================================
        // ========================== GLOBAL VARIABLES ==========================
        // ======================================================================
        let db = [];
        let member1 = null;
        let member2 = null;
        let LOAD_STAMP = '';

        // ======================================================================
        // ========================== HELPER FUNCTIONS ==========================
        // ======================================================================
        function displayName(str) {
            return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
        }

        function formatCurrentTime() {
            const d = new Date();
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
        }

        function getGenNum(gen) {
            const match = String(gen).match(/\d+/);
            return match ? parseInt(match[0]) : 0;
        }

        // ======================================================================
        // ========================== VIEW TOGGLE ===============================
        // ======================================================================
        function switchToTableView() {
            if (member1 && member2) {
                localStorage.setItem('rootMember1', JSON.stringify(member1));
                localStorage.setItem('rootMember2', JSON.stringify(member2));
            }
            window.location.href = '5-root-table-pc.html';
        }

        function updateHeaderButtons() {
            const headerActions = document.getElementById('headerActions');
            headerActions.innerHTML = `
                <div class="header-btn table" onclick="switchToTableView()">📋 Switch to Table</div>
                <div class="header-btn reset" onclick="resetSearch()">🔄 Reset</div>
                <div class="header-btn pdf" onclick="exportPDF()">📑 Save PDF</div>
                <div class="header-btn dashboard" onclick="showDashboard()">🏠 Dashboard</div>
            `;
        }

        function showDashboard() {
            window.location.href = '1-dashboard-pc.html';
        }

        // ======================================================================
        // ========================== TREE FUNCTIONS ============================
        // ======================================================================
        function findParent(member) {
            if (!member || !member.father) return null;
            return db.find(x => x.name.toLowerCase() === member.father.toLowerCase());
        }

        function getAncestryChain(member) {
            if (!member) return [];
            let chain = [], cur = member, visited = new Set();
            while (cur && !visited.has(cur.name.toLowerCase())) {
                chain.push(cur);
                visited.add(cur.name.toLowerCase());
                cur = findParent(cur);
            }
            return chain;
        }

        function findCommonRoot(m1, m2) {
            const chain1 = getAncestryChain(m1);
            const chain2 = getAncestryChain(m2);
            
            for (let p of chain1) {
                if (chain2.some(x => x.name.toLowerCase() === p.name.toLowerCase())) {
                    return p;
                }
            }
            return null;
        }

        // ======================================================================
        // ========================== SEARCH FUNCTIONS ==========================
        // ======================================================================
        function searchMember(query, num) {
            if (!db.length) return;
            
            const drop = document.getElementById(`dropdown${num}`);
            drop.innerHTML = '';
            
            if (!query || query.length < 1) {
                drop.style.display = 'none';
                return;
            }
            
            const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
            if (found.length === 0) {
                drop.style.display = 'none';
                return;
            }
            
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div><span class="main-name">${displayName(p.name)}</span> <span class="gen">(${p.gen})</span></div>
                    <div style="font-size:11px;">${p.gender?.startsWith('F') ? 'D/o' : 'S/o'} ${displayName(p.father)}</div>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById(`search${num}`).value = displayName(p.name) + ' (' + p.gen + ')';
                    if (num === 1) member1 = p;
                    else member2 = p;
                    
                    if (member1 && member2) {
                        renderTree();
                    }
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            
            drop.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                document.getElementById('dropdown1').style.display = 'none';
                document.getElementById('dropdown2').style.display = 'none';
            }
        });

        // ======================================================================
        // ========================== RENDER TREE ===============================
        // ======================================================================
        function renderBox(member, label, isRoot = false, isSelected = false) {
            const isFemale = member.gender?.startsWith('F');
            const blinkClass = isSelected ? 'blinking-box' : '';
            const rootClass = isRoot ? 'root-box' : '';
            
            return `<div class="box ${isFemale ? 'female-box' : ''} ${blinkClass} ${rootClass}">
                <div class="box-header"><span>${label}</span><span>${member.gen}</span></div>
                <div class="box-body">
                    <span class="member-name">${displayName(member.name)}</span>
                    <span class="father-name">${isFemale ? 'D/o' : 'S/o'}: ${displayName(member.father)}</span>
                </div>
            </div>`;
        }

        function renderTree() {
            if (!member1 || !member2) return;
            
            const commonRoot = findCommonRoot(member1, member2);
            
            if (!commonRoot) {
                document.getElementById('rootTree').innerHTML = `
                    <div class="root-announce">
                        <h3 style="color: var(--maroon);">No Common Ancestor Found</h3>
                        <p style="margin-top: 10px; color: #666;">These two members do not share a common root in the family tree.</p>
                    </div>
                `;
                return;
            }
            
            const chain1 = getAncestryChain(member1);
            const chain2 = getAncestryChain(member2);
            
            const path1 = chain1.slice(0, chain1.findIndex(p => p.name.toLowerCase() === commonRoot.name.toLowerCase()) + 1);
            const path2 = chain2.slice(0, chain2.findIndex(p => p.name.toLowerCase() === commonRoot.name.toLowerCase()) + 1);
            
            const gen1 = getGenNum(member1.gen);
            const gen2 = getGenNum(member2.gen);
            const genRoot = getGenNum(commonRoot.gen);
            const gap1 = Math.abs(gen1 - genRoot);
            const gap2 = Math.abs(gen2 - genRoot);
            const gap12 = Math.abs(gen1 - gen2);
            
            let html = `
                <div class="root-announce">
                    <h2 style="color: var(--maroon); margin-bottom: 15px;">Common Root Ancestor</h2>
                    <h3 style="color: var(--dark-blue); font-size: 24px; margin: 10px 0;">${displayName(commonRoot.name)} - ${commonRoot.gen}</h3>
                    
                    <div class="generation-info">
                        <div class="gap-row">
                            <div class="gap-item">${displayName(member1.name)} → Root <span class="gap-value">${gap1} gen</span></div>
                            <div class="gap-item">${displayName(member2.name)} → Root <span class="gap-value">${gap2} gen</span></div>
                            <div class="gap-item">Between members <span class="gap-value highlight">${gap12} gen</span></div>
                        </div>
                    </div>
                </div>
                
                <div class="paths-container">
                    <div class="path-column">
                        <h3>${displayName(member1.name)}'s Path to Root</h3>
            `;
            
            // Path 1 (Member 1 to Root)
            [...path1].reverse().forEach((member, index) => {
                const isRoot = member.name.toLowerCase() === commonRoot.name.toLowerCase();
                const label = index === 0 ? 'Selected' : (isRoot ? 'Root' : `Generation`);
                const isSelected = index === 0;
                
                html += renderBox(member, label, isRoot, isSelected);
                if (index < path1.length - 1) {
                    html += `<div class="path-connector"></div>`;
                }
            });
            
            html += `</div><div class="path-column"><h3>${displayName(member2.name)}'s Path to Root</h3>`;
            
            // Path 2 (Member 2 to Root)
            [...path2].reverse().forEach((member, index) => {
                const isRoot = member.name.toLowerCase() === commonRoot.name.toLowerCase();
                const label = index === 0 ? 'Selected' : (isRoot ? 'Root' : `Generation`);
                const isSelected = index === 0;
                
                html += renderBox(member, label, isRoot, isSelected);
                if (index < path2.length - 1) {
                    html += `<div class="path-connector"></div>`;
                }
            });
            
            html += `</div></div>`;
            
            document.getElementById('rootTree').innerHTML = html;
        }

        // ======================================================================
        // ========================== RESET FUNCTION ============================
        // ======================================================================
        function resetSearch() {
            member1 = null;
            member2 = null;
            document.getElementById('search1').value = '';
            document.getElementById('search2').value = '';
            document.getElementById('rootTree').innerHTML = '<div style="text-align:center; color:#999; padding:60px;">Select two members to analyze their common root</div>';
            document.getElementById('dropdown1').style.display = 'none';
            document.getElementById('dropdown2').style.display = 'none';
        }

        // ======================================================================
        // ========================== PDF EXPORT ================================
        // ======================================================================
        async function exportPDF() {
            if (!member1 || !member2) {
                alert('Please select both members first');
                return;
            }
            
            const content = document.getElementById('rootTree');
            
            try {
                const header = document.createElement('div');
                header.style.marginBottom = '30px';
                header.style.textAlign = 'center';
                header.innerHTML = `
                    <h1 style="color: #d4af37; font-size: 36px; font-family: 'Playfair Display', serif; margin: 0 0 10px 0;">Rizvi Family - Root Analysis</h1>
                    <h2 style="color: #5a0000; font-size: 24px; font-family: 'Playfair Display', serif; margin: 0;">${displayName(member1.name)} & ${displayName(member2.name)}</h2>
                `;
                
                const footer = document.createElement('div');
                footer.style.marginTop = '40px';
                footer.style.padding = '15px 20px';
                footer.style.border = '2px solid #d4af37';
                footer.style.borderRadius = '4px';
                footer.style.background = '#0f172a';
                footer.style.color = '#d4af37';
                footer.style.display = 'flex';
                footer.style.justifyContent = 'space-between';
                footer.style.alignItems = 'center';
                footer.style.fontSize = '11px';
                
                const timeStr = formatCurrentTime();
                footer.innerHTML = `
                    <span>${LOAD_STAMP || 'Last data updated on: Unknown'}</span>
                    <span style="font-weight: 500;">PDF generated: ${timeStr}</span>
                `;
                
                const signature = document.createElement('div');
                signature.style.marginTop = '20px';
                signature.style.paddingTop = '15px';
                signature.style.borderTop = '1px solid #ddd';
                signature.style.textAlign = 'center';
                signature.style.color = '#000';
                signature.style.fontSize = '12px';
                signature.style.fontWeight = '500';
                signature.textContent = 'Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010';
                
                content.insertBefore(header, content.firstChild);
                content.appendChild(footer);
                content.appendChild(signature);
                
                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed';
                loadingMsg.style.top = '50%';
                loadingMsg.style.left = '50%';
                loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000';
                loadingMsg.style.color = 'white';
                loadingMsg.style.padding = '20px 40px';
                loadingMsg.style.borderRadius = '8px';
                loadingMsg.style.zIndex = '9999';
                loadingMsg.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
                loadingMsg.textContent = '📄 Preparing PDF... please wait';
                document.body.appendChild(loadingMsg);
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const canvas = await html2canvas(content, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: true,
                    useCORS: true
                });
                
                content.removeChild(header);
                content.removeChild(footer);
                content.removeChild(signature);
                document.body.removeChild(loadingMsg);
                
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                
                const w = canvas.width / 2 * 0.264583;
                const h = canvas.height / 2 * 0.264583;
                
                const pdf = new jsPDF({
                    orientation: w > h ? 'l' : 'p',
                    unit: 'mm',
                    format: [w + 40, h + 40]
                });
                
                pdf.addImage(imgData, 'PNG', 20, 20, w, h);
                
                const safeName1 = displayName(member1.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const safeName2 = displayName(member2.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                pdf.save(`root_${safeName1}_${safeName2}_${new Date().getTime()}.pdf`);
                
            } catch (err) {
                console.error('PDF Error:', err);
                alert('❌ PDF generation failed: ' + err.message);
            }
        }

        // ======================================================================
        // ========================== TOGGLE CANVAS VIEW ========================
        // ======================================================================
        function toggleCanvasView() {
            document.body.classList.toggle('canvas-only');
            const btn = document.getElementById('toggleViewBtn');
            if (document.body.classList.contains('canvas-only')) {
                btn.innerHTML = '<span>🔍</span> <span>Exit</span>';
            } else {
                btn.innerHTML = '<span>👁️</span> <span>Full Screen</span>';
            }
        }

        // ======================================================================
        // ========================== DATA LOADING ==============================
        // ======================================================================
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
            LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
        }

        // ======================================================================
        // ========================== INITIALIZATION ============================
        // ======================================================================
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.getElementById('mobileMenuToggle');
            const topSection = document.querySelector('.fixed-header-section');
            
            if (menuToggle && topSection) {
                menuToggle.addEventListener('click', function() {
                    topSection.classList.toggle('collapsed');
                });
            }
            
            // Check if coming from table view
            const savedMember1 = localStorage.getItem('rootMember1');
            const savedMember2 = localStorage.getItem('rootMember2');
            
            if (savedMember1 && savedMember2) {
                member1 = JSON.parse(savedMember1);
                member2 = JSON.parse(savedMember2);
                document.getElementById('search1').value = displayName(member1.name) + ' (' + member1.gen + ')';
                document.getElementById('search2').value = displayName(member2.name) + ' (' + member2.gen + ')';
                localStorage.removeItem('rootMember1');
                localStorage.removeItem('rootMember2');
                renderTree();
            }
            
            updateHeaderButtons();
        });
    </script>
