<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Rizvi Family · Mobile Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="13-family-data.js"></script>  <!-- Moved here, before any other scripts -->
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --bronze: #bc8c4f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 5px;
        }

        .app-container {
            background: white;
            min-height: calc(100vh - 10px);
            border-radius: 16px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 12px 15px;
            border-bottom: 3px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .logout-btn {
            padding: 6px 12px;
            background: var(--maroon);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fffcf8;
            padding: 15px;
        }

        .dashboard-grid {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .dashboard-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dashboard-card:active {
            transform: scale(0.98);
            background: #fdf6e3;
        }

        .card-icon {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 4px;
        }

        .card-desc {
            color: #666;
            font-size: 12px;
        }

        .data-status {
            margin-top: 8px;
            color: var(--maroon);
            font-size: 11px;
            font-weight: 600;
        }

        .exit-btn {
            background: var(--maroon);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 10px;
            font-size: 10px;
            border-top: 2px solid var(--gold);
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span>Rizvi Family</span>
            </div>
            <button class="logout-btn" onclick="logout()">Exit</button>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="main-content">
            <div class="dashboard-grid">
                <div class="dashboard-card" onclick="loadDataWithPassword()">
                    <div class="card-icon">📂</div>
                    <div class="card-title">Load Data</div>
                    <div class="card-desc">Upload Excel file</div>
                    <div class="data-status" id="dataStatus">🔍 Searching...</div>
                </div>
                <div class="dashboard-card" onclick="goToIndividual()">
                    <div class="card-icon">👤</div>
                    <div class="card-title">Individual</div>
                    <div class="card-desc">Single member search</div>
                </div>
                <div class="dashboard-card" onclick="goToRoot()">
                    <div class="card-icon">👥</div>
                    <div class="card-title">Root Relative</div>
                    <div class="card-desc">Two member search</div>
                </div>
                <div class="exit-btn" onclick="logout()">
                    <span>🚪</span> Lock Screen
                </div>
            </div>
        </div>

        <div class="app-footer">
            Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010
        </div>
    </div>

    <script>
        let db = [];

        function logout() {
            localStorage.removeItem('familyDB');
            db = [];
            window.location.href = 'index.html';
        }

        function loadDataWithPassword() {
            const pwd = prompt('Enter data password:');
            if (pwd === '6010') {
                document.getElementById('fileInput').click();
            } else if (pwd !== null) {
                alert('❌ Invalid password');
            }
        }

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    
                    db = rows.map(r => ({
                        name: String(r.Name || r.name || '').trim(),
                        father: String(r.Father || r.father || '').trim(),
                        gen: String(r.Gen || r.gen || '').trim(),
                        gender: String(r.Gender || r.gender || 'M').trim().toUpperCase()
                    })).filter(p => p.name);

                    localStorage.setItem('familyDB', JSON.stringify(db));
                    document.getElementById('dataStatus').innerHTML = `✅ ${db.length} members`;
                    document.getElementById('dataStatus').style.color = '#2e7d32';
                } catch (err) {
                    alert('❌ Error: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        function goToIndividual() {
            if (db.length === 0) {
                const saved = localStorage.getItem('familyDB');
                if (saved) {
                    db = JSON.parse(saved);
                } else {
                    alert('Please load data first');
                    return;
                }
            }
            window.location.href = '7-individual-tree-mobile.html';
        }

        function goToRoot() {
            if (db.length === 0) {
                const saved = localStorage.getItem('familyDB');
                if (saved) {
                    db = JSON.parse(saved);
                } else {
                    alert('Please load data first');
                    return;
                }
            }
            window.location.href = '9-root-tree-mobile.html';
        }

        function initializeData() {
            console.log('initializeData called');
            
            // Check if FAMILY_DATA exists (from the external file)
            if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length > 0) {
                console.log('FAMILY_DATA found with', FAMILY_DATA.length, 'members');
                db = FAMILY_DATA;
                localStorage.setItem('familyDB', JSON.stringify(db));
                document.getElementById('dataStatus').innerHTML = `✅ ${db.length} members`;
                document.getElementById('dataStatus').style.color = '#2e7d32';
                return;
            }
            
            // Fallback to localStorage if no external data
            const saved = localStorage.getItem('familyDB');
            if (saved) {
                console.log('Loading from localStorage');
                db = JSON.parse(saved);
                document.getElementById('dataStatus').innerHTML = `✅ ${db.length} members`;
                document.getElementById('dataStatus').style.color = '#2e7d32';
            } else {
                console.log('No data found, auto-loading from file');
                autoLoadData();
            }
        }

        function autoLoadData() {
            const possiblePaths = [
                'data.xlsx',
                './data.xlsx',
                'Rizvi Family Tree.xlsx',
                './Rizvi Family Tree.xlsx'
            ];
            
            let attempted = 0;
            let loadingIndicator = document.getElementById('dataStatus');
            
            function tryNextPath() {
                if (attempted >= possiblePaths.length) {
                    loadingIndicator.innerHTML = '⚠️ Tap to load manually';
                    loadingIndicator.style.color = '#f59e0b';
                    return;
                }
                
                const path = possiblePaths[attempted];
                attempted++;
                
                fetch(path)
                    .then(response => {
                        if (!response.ok) throw new Error('Not found');
                        return response.arrayBuffer();
                    })
                    .then(data => {
                        try {
                            const wb = XLSX.read(new Uint8Array(data), { type: 'array' });
                            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                            
                            db = rows.map(r => ({
                                name: String(r.Name || r.name || '').trim(),
                                father: String(r.Father || r.father || '').trim(),
                                gen: String(r.Gen || r.gen || '').trim(),
                                gender: String(r.Gender || r.gender || 'M').trim().toUpperCase()
                            })).filter(p => p.name);

                            if (db.length > 0) {
                                localStorage.setItem('familyDB', JSON.stringify(db));
                                loadingIndicator.innerHTML = `✅ ${db.length} members`;
                                loadingIndicator.style.color = '#2e7d32';
                            } else {
                                tryNextPath();
                            }
                        } catch (err) {
                            tryNextPath();
                        }
                    })
                    .catch(() => tryNextPath());
            }
            
            tryNextPath();
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing...');
            initializeData();
        });
    </script>
</body>
</html>
