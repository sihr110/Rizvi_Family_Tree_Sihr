<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Rizvi Family · Mobile Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --bronze: #bc8c4f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            padding: 5px;
            overflow: hidden;
        }

        .app-container {
            background: white;
            height: calc(100vh - 10px);
            border-radius: 16px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 8px 12px;
            border-bottom: 3px solid var(--gold);
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 60px;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .header-status {
            background: var(--gold);
            color: var(--dark-blue);
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fffcf8;
            padding: 10px;
        }

        .dashboard-grid {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .dashboard-card {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 16px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .dashboard-card:active {
            transform: scale(0.98);
            background: #fdf6e3;
        }

        .card-icon {
            font-size: 32px;
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark-blue);
            margin-bottom: 2px;
        }

        .card-desc {
            color: #666;
            font-size: 11px;
        }

        .exit-btn-container {
            background: var(--maroon);
            color: white;
            padding: 14px 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 2px solid var(--maroon);
            font-size: 14px;
        }

        .exit-btn-container.hard-reset {
            background: #4169E1;
            border-color: #4169E1;
        }

        .exit-btn-container:hover {
            opacity: 0.9;
        }

        .exit-btn-container span:last-child {
            font-size: 11px;
            opacity: 0.8;
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 9px;
            border-top: 2px solid var(--gold);
            line-height: 1.2;
        }

        .hidden { display: none; }
    </style>

    <script src="family-data.js"></script>
</head>

<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span>Rizvi Family</span>
            </div>
            <div class="header-status" id="headerStatus" onclick="loadDataWithPassword()">📂 Load Data - Upload Excel file - ⏳</div>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="main-content">
            <div class="dashboard-grid">
                <div class="dashboard-card" onclick="goToIndividual()">
                    <div class="card-icon">👤</div>
                    <div class="card-title">Individual</div>
                    <div class="card-desc">Single member search</div>
                </div>
                
                <div class="dashboard-card" onclick="goToRoot()">
                    <div class="card-icon">👥</div>
                    <div class="card-title">Root Relative</div>
                    <div class="card-desc">Two member search</div>
                </div>
                
                <div class="exit-btn-container hard-reset" onclick="hardReset()">
                    <span>⚠️</span> Hard Reset <span>- (Delete all data)</span>
                </div>
                
                <div class="exit-btn-container" onclick="logout()">
                    <span>🚪</span> Exit <span>- (Back to login)</span>
                </div>
            </div>
        </div>

        <div class="app-footer">
            Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010
        </div>
    </div>

    <script>
        let db = [];

        function logout() {
            localStorage.removeItem('familyDB');
            db = [];
            window.location.href = 'index.html';
        }

        function hardReset() {
            const confirmation = confirm("🚨 WARNING: This will permanently delete ALL family data from this browser. Are you sure?");
            
            if (confirmation) {
                localStorage.removeItem('familyDB');
                db = [];
                updateStatusDisplay();
                alert("✅ All data has been cleared from browser storage.");
                if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length > 0) {
                    db = FAMILY_DATA;
                    localStorage.setItem('familyDB', JSON.stringify(db));
                    updateStatusDisplay();
                }
            }
        }

        function updateStatusDisplay() {
            const count = db.length;
            const statusText = `📂 Load Data - Upload Excel file - ✅ ${count} members`;
            document.getElementById('headerStatus').innerHTML = statusText;
        }

        function loadDataWithPassword() {
            const pwd = prompt('Enter data password:');
            if (pwd === '6010') {
                document.getElementById('fileInput').click();
            } else if (pwd !== null) {
                alert('❌ Invalid password');
            }
        }

        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    
                    db = rows.map(r => ({
                        name: String(r.Name || r.name || '').trim(),
                        father: String(r.Father || r.father || '').trim(),
                        gen: String(r.Gen || r.gen || '').trim(),
                        gender: String(r.Gender || r.gender || 'M').trim().toUpperCase()
                    })).filter(p => p.name);

                    localStorage.setItem('familyDB', JSON.stringify(db));
                    updateStatusDisplay();
                } catch (err) {
                    alert('❌ Error: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        function goToIndividual() {
            if (db.length === 0) {
                const saved = localStorage.getItem('familyDB');
                if (saved) {
                    db = JSON.parse(saved);
                } else {
                    alert('Please load data first');
                    return;
                }
            }
            window.location.href = '7-individual-tree-mobile.html';
        }

        function goToRoot() {
            if (db.length === 0) {
                const saved = localStorage.getItem('familyDB');
                if (saved) {
                    db = JSON.parse(saved);
                } else {
                    alert('Please load data first');
                    return;
                }
            }
            window.location.href = '9-root-tree-mobile.html';
        }

        function initializeData() {
            if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length > 0) {
                db = FAMILY_DATA;
                localStorage.setItem('familyDB', JSON.stringify(db));
                updateStatusDisplay();
                return;
            }
            
            const saved = localStorage.getItem('familyDB');
            if (saved) {
                db = JSON.parse(saved);
                updateStatusDisplay();
            } else {
                document.getElementById('headerStatus').innerHTML = '📂 Load Data - Upload Excel file - ⏳ Tap to load';
            }
        }

        initializeData();
    </script>
</body>
</html>
