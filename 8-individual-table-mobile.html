<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover">
    <title>Rizvi family · structured table (mobile→pc layout)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
<!-- ========================================= -->
<!-- CSS START                                 -->
<!-- ========================================= -->

    <style>
        /* ===== GLOBAL RESET & VARIABLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #d4edda;
            --pink-bg: #fff0f5;
            --light-pink: #ffe4e9;
            --light-sage: #f4f7f2;
            --border-sage: #c9d6c2;
            --sisters-border: #fb7185;
            --summary-border: #e6c87c;
            --table-header-bg: #fdf6e3;
            --bronze: #bc8c4f;
            --reset-red: #5a0000;
            --reset-red-dark: #7a1f1f;
            --pdf-grey: #6c757d;
            --pdf-grey-dark: #5a6268;
            --dashboard-green: #1b5e20;
            --sisters-box-bg: #fff0f5;
        }

        /* ----- BASE LAYOUT ----- */
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }
        
        /* ----- HEADER SECTION ----- */
        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            position: relative;
        }
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        /* Top row - Reset button */
        .top-reset-btn {
            background: var(--reset-red);
            color: white;
            border: 2px solid var(--gold);
            border-radius: 4px;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .top-reset-btn:hover {
            background: var(--reset-red-dark);
            transform: translateY(-2px);
        }
        
        /* Bottom row - Three equal buttons */
        .action-buttons-row {
            display: flex;
            gap: 8px;
            width: 100%;
            padding: 10px 20px;
            background: var(--dark-blue);
            border-bottom: 2px solid var(--gold);
        }
        .action-btn {
            flex: 1;
            padding: 8px 5px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            border: 2px solid var(--gold);
            border-radius: 4px;
            transition: all 0.2s;
            min-width: 0;
            text-align: center;
        }
        .action-btn.tree {
            background: var(--bronze);
            color: white;
            border-color: transparent;
        }
        .action-btn.pdf {
            background: var(--pdf-grey);
            color: white;
            border-color: transparent;
        }
        .action-btn.dashboard {
            background: var(--dashboard-green);
            color: white;
            border-color: transparent;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        
        .menu-toggle { display: none; }
        
        /* ----- MAIN CONTENT ----- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fffcf8; }
        #individualSection { display: flex; flex-direction: column; height: 100%; overflow: hidden; flex: 1; }
        .fixed-header-section { padding: 15px 15px 0 15px; background: #fffcf8; flex-shrink: 0; }
        .border-line { border-top: 3px solid var(--gold); margin: 20px 0 0 0; }
        .scrollable-content { flex: 1; overflow-y: auto; overflow-x: auto; padding: 0 15px 15px 15px; }
        
        /* ----- SEARCH SECTION ----- */
        .search-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .search-label { font-weight: 700; color: var(--maroon); font-size: 13px; text-transform: uppercase; white-space: nowrap; }
        .search-wrapper { position: relative; flex: 2; min-width: 300px; }
        .search-input { width: 100%; padding: 8px 15px; border: 2px solid #cbd5e1; border-radius: 4px; font-size: 13px; outline: none; transition: all 0.3s; }
        .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid var(--gold); border-radius: 0 0 4px 4px; max-height: 200px; overflow-y: auto; display: none; z-index: 1000; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .result-item { padding: 8px 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .result-item:hover { background: #faebcd; }
        .result-item .main-name { font-weight: 700; color: var(--dark-blue); }
        .result-item .gen { color: var(--maroon); font-size: 11px; margin-left: 6px; }
        
        /* ----- FILTER BUTTONS ----- */
        .filter-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; border-radius: 4px; font-weight: 600; font-size: 13px; cursor: pointer; border: 2px solid var(--gold); background: white; color: var(--dark-blue); white-space: nowrap; display: flex; align-items: center; gap: 4px; }
        .filter-btn.active { background: #d4edda; border-color: var(--dark-green); }
        
        /* ----- TABLE STYLES ----- */
        .table-container {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 10px;
            overflow-x: auto;
            margin: 10px 0;
        }
        
        .lineage-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .lineage-table th {
            background: var(--table-header-bg);
            color: var(--maroon);
            font-weight: 700;
            padding: 10px 8px;
            text-align: left;
            border-bottom: 2px solid var(--gold);
        }
        
        .lineage-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #f0e5ce;
            text-align: left;
        }
        
        .lineage-table tr:hover td {
            background: #faebcd;
            cursor: pointer;
        }
        
        .lineage-table .section-header td {
            background: var(--light-sage);
            font-weight: 700;
            color: var(--maroon);
            border-top: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
        }
        
        .lineage-table .current-member td {
            background: #e8f5e9;
            font-weight: 700;
            border: 2px solid var(--dark-green);
        }
        
        .lineage-table .female-row td {
            background-color: var(--light-pink) !important;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px;
            background: var(--light-sage);
            border: 2px solid var(--border-sage);
            border-radius: 16px;
            margin: 20px auto;
            max-width: 500px;
        }
        
        /* ----- FOOTER ----- */
        .app-footer { background: var(--dark-blue); color: var(--gold); text-align: center; padding: 8px; font-size: 11px; border-top: 2px solid var(--gold); }
        
        /* ----- MOBILE RESPONSIVE ----- */
        @media screen and (max-width: 768px) {
            body { overflow: auto; -webkit-overflow-scrolling: touch; height: auto; min-height: 100vh; padding: 5px; }
            .app-container { height: auto; min-height: calc(100vh - 10px); border-radius: 16px; overflow: hidden; }
            .app-header { position: relative; padding: 10px 15px; }
            .header-title { font-size: 18px; width: calc(100% - 50px); }
            .menu-toggle { display: flex !important; position: absolute; top: 50%; right: 15px; transform: translateY(-50%); background: var(--gold); color: black; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 26px; font-weight: bold; cursor: pointer; z-index: 2000; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
            
            .action-buttons-row {
                padding: 8px 10px;
                gap: 5px;
            }
            .action-btn {
                font-size: 10px;
                padding: 8px 2px;
            }
            
            .fixed-header-section { transition: max-height 0.3s ease, padding 0.3s ease, margin 0.3s ease; overflow: hidden; max-height: 500px; padding: 15px 15px 10px 15px; background: #fffcf8; }
            .fixed-header-section.collapsed { max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; border-bottom: none; }
            .search-row { flex-direction: column; align-items: stretch; gap: 12px; }
            .search-wrapper { min-width: 100%; width: 100%; }
            .search-input { width: 100%; font-size: 16px; padding: 12px 15px; height: 48px; }
            .filter-buttons { width: 100%; justify-content: space-between; gap: 8px; }
            .filter-btn { flex: 1; padding: 10px 5px; font-size: 12px; justify-content: center; height: 44px; }
            
            .table-container { padding: 5px; }
            .lineage-table { font-size: 12px; }
            .lineage-table th,
            .lineage-table td { padding: 8px 5px; }
            
            .dropdown { max-height: 200px; font-size: 14px; }
            .result-item { padding: 12px 15px; }
            .app-footer { padding: 10px; font-size: 10px; }
        }
        @media screen and (max-width: 380px) {
            .filter-btn { font-size: 11px; padding: 8px 4px; }
            .action-btn { font-size: 9px; }
        }

        /* Prevent pull-to-refresh */
        body {
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
        }

        /* Ensure content stays after scroll */
        #tableView { min-height: 100%; }
    </style>

<!-- ========================================= -->
<!-- CSS END                                   -->
<!-- ========================================= -->

</head>
<body>
    <!-- ⑧ INDIVIDUAL TABLE – MOBILE WIDE -->
    <div class="app-container">
        <!-- HEADER - TOP ROW with Reset on right -->
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">📋</span> 
                <span>Rizvi family - Table View</span>
            </div>
            <div class="top-reset-btn" onclick="resetSearch()">🔄 Reset</div>
            <button class="menu-toggle" id="mobileMenuToggle">☰</button>
        </div>
        
        <!-- SECOND ROW - Three equal buttons -->
        <div class="action-buttons-row">
            <div class="action-btn tree" onclick="switchToTree()">🌲 Switch to Tree</div>
            <div class="action-btn pdf" onclick="exportPDF()">📑 Save PDF</div>
            <div class="action-btn dashboard" onclick="goToDashboard()">🏠 Dashboard</div>
        </div>
        
        <!-- main area -->
        <div class="main-content" id="mainContent">
            <div id="individualSection">
                <!-- fixed header with search & filters -->
                <div class="fixed-header-section">
                    <div class="search-row">
                        <span class="search-label">SEARCH MEMBER</span>
                        <div class="search-wrapper">
                            <input type="text" id="searchInput" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value)" autocomplete="off">
                            <div id="dropdown" class="dropdown"></div>
                        </div>
                        <div class="filter-buttons">
                            <div id="filterSiblings" class="filter-btn active" onclick="toggleFilter('siblings')">👥 Siblings</div>
                            <div id="filterDescendants" class="filter-btn active" onclick="toggleFilter('descendants')">👶 Descendants</div>
                            <div id="filterAncestors" class="filter-btn" onclick="toggleFilter('ancestors')">🌳 Ancestors</div>
                        </div>
                    </div>
                    <div class="border-line"></div>
                </div>
                <!-- scrollable table area -->
                <div class="scrollable-content">
                    <div id="tableView"></div>
                </div>
            </div>
        </div>
        <!-- footer -->
        <div class="app-footer">Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010</div>
    </div>

    <!-- hidden markers for html editing -->
    <div class="section-marker" data-section="1-header"></div>
    <div class="section-marker" data-section="2-main"></div>
    <div class="section-marker" data-section="3-search-filters"></div>
    <div class="section-marker" data-section="4-table-container"></div>
    <div class="section-marker" data-section="5-footer"></div>

<!-- ========================================= -->
<!-- JAVASCRIPT Start                          -->
<!-- ========================================= -->

<script>
    (function(){
        // =========================================================================
        // STATE PRESERVATION - MUST RUN FIRST
        // =========================================================================
        let currentMember = null;
        let db = [];
        let showSiblings = true;
        let showDescendants = true;
        let showAncestors = false;
        let LOAD_STAMP = '';

        // =========================================================================
        // UTILITIES
        // =========================================================================
        function displayName(str) {
            return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
        }

        function formatCurrentTime() {
            const d = new Date();
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
        }

        function findParent(member) {
            if (!member || !member.father) return null;
            return db.find(x => x.name.toLowerCase() === member.father.toLowerCase());
        }

        function getAncestryChain(member) {
            if (!member) return [];
            let chain = [], cur = member, visited = new Set();
            while (cur && !visited.has(cur.name.toLowerCase())) {
                chain.push(cur);
                visited.add(cur.name.toLowerCase());
                cur = findParent(cur);
            }
            return chain;
        }

        function getSiblings(member) {
            if (!member || !member.father) return [];
            return db.filter(x => x.father?.toLowerCase() === member.father?.toLowerCase() && x.name !== member.name);
        }

        function getDescendants(member) {
            if (!member) return [];
            return db.filter(x => x.father?.toLowerCase() === member.name.toLowerCase());
        }

        // =========================================================================
        // NAVIGATION
        // =========================================================================
        function switchToTree() {
            if (currentMember) {
                localStorage.setItem('tableViewMember', JSON.stringify(currentMember));
                localStorage.setItem('tableViewFilters', JSON.stringify({
                    showSiblings: showSiblings,
                    showDescendants: showDescendants,
                    showAncestors: showAncestors
                }));
            }
            window.location.href = '7-individual-tree-mobile.html';
        }

        function goToDashboard() {
            window.location.href = '6-dashboard-mobile.html';
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            currentMember = null;
            document.getElementById('tableView').innerHTML = `
                <div class="empty-state">
                    <div style="font-size:48px; margin-bottom:15px; opacity:0.5;">👤</div>
                    <div style="font-size:18px; font-weight:600; color:var(--maroon); margin-bottom:8px;">Select a member to view</div>
                    <div style="font-size:13px; color:#666;">Search and select a family member above to see their table</div>
                </div>
            `;
            document.getElementById('dropdown').style.display = 'none';
        }

        // =========================================================================
        // FILTER TOGGLE
        // =========================================================================
        window.toggleFilter = function(filter) {
            if (!currentMember) return;
            
            if (filter === 'siblings') {
                showSiblings = !showSiblings;
                document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
            } else if (filter === 'descendants') {
                showDescendants = !showDescendants;
                document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
            } else if (filter === 'ancestors') {
                showAncestors = !showAncestors;
                document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
            }
            
            renderTable();
        };

        // =========================================================================
        // SEARCH DROPDOWN
        // =========================================================================
        window.searchMember = function(query) {
            const drop = document.getElementById('dropdown');
            drop.innerHTML = '';
            
            if (!query || query.length < 1) {
                drop.style.display = 'none';
                return;
            }
            
            const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
            if (found.length === 0) {
                drop.style.display = 'none';
                return;
            }
            
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div><span class="main-name">${displayName(p.name)}</span> <span class="gen">(${p.gen})</span></div>
                    <div style="font-size:11px;">${p.gender?.startsWith('F') ? 'D/o' : 'S/o'} ${displayName(p.father)}</div>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('searchInput').value = displayName(p.name) + ' (' + p.gen + ')';
                    currentMember = p;
                    renderTable();
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            
            drop.style.display = 'block';
        };

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                document.getElementById('dropdown').style.display = 'none';
            }
        });

        function handleRowClick(member) {
            currentMember = member;
            document.getElementById('searchInput').value = displayName(member.name) + ' (' + member.gen + ')';
            renderTable();
        }

        // =========================================================================
        // RENDER TABLE
        // =========================================================================
        function renderTable() {
            if (!currentMember) return;
            
            let html = '<div class="table-container"><table class="lineage-table">';
            html += '<tr><th>S.No</th><th>Name</th><th>Generation</th></tr>';
            
            let sno = 1;
            const isCurrentFemale = currentMember.gender?.startsWith('F');
            const currentRowClass = isCurrentFemale ? 'current-member female-row' : 'current-member';
            
            // Escape quotes for JSON
            const memberStr = JSON.stringify(currentMember).replace(/'/g, "\\'");
            
            html += `<tr class="${currentRowClass}" onclick='handleRowClick(${memberStr})'>`;
            html += `<td>${sno++}</td>`;
            html += `<td><strong>${displayName(currentMember.name)}</strong> (Selected)</td>`;
            html += `<td><strong>${currentMember.gen}</strong></td>`;
            html += `</tr>`;
            
            if (showAncestors) {
                const ancestors = getAncestryChain(currentMember).slice(1);
                if (ancestors.length > 0) {
                    html += `<tr class="section-header"><td colspan="3">🔺 ANCESTORS (${ancestors.length})</td></tr>`;
                    let aSno = 1;
                    ancestors.forEach(a => {
                        const isFemale = a.gender?.startsWith('F');
                        const rowClass = isFemale ? 'female-row' : '';
                        const aStr = JSON.stringify(a).replace(/'/g, "\\'");
                        html += `<tr class="${rowClass}" onclick='handleRowClick(${aStr})'>`;
                        html += `<td>${aSno++}</td>`;
                        html += `<td>${displayName(a.name)}</td>`;
                        html += `<td>${a.gen}</td>`;
                        html += `</tr>`;
                    });
                }
            }
            
            if (showSiblings) {
                const siblings = getSiblings(currentMember);
                if (siblings.length > 0) {
                    const father = findParent(currentMember);
                    const fatherName = father ? displayName(father.name) : 'Unknown';
                    html += `<tr class="section-header"><td colspan="3">👥 SIBLINGS (${siblings.length}) - Children of ${fatherName}</td></tr>`;
                    let sSno = 1;
                    siblings.forEach(s => {
                        const isFemale = s.gender?.startsWith('F');
                        const rowClass = isFemale ? 'female-row' : '';
                        const sStr = JSON.stringify(s).replace(/'/g, "\\'");
                        html += `<tr class="${rowClass}" onclick='handleRowClick(${sStr})'>`;
                        html += `<td>${sSno++}</td>`;
                        html += `<td>${displayName(s.name)}</td>`;
                        html += `<td>${s.gen}</td>`;
                        html += `</tr>`;
                    });
                }
            }
            
            if (showDescendants) {
                const descendants = getDescendants(currentMember);
                if (descendants.length > 0) {
                    html += `<tr class="section-header"><td colspan="3">👶 DESCENDANTS (${descendants.length}) - Children of ${displayName(currentMember.name)}</td></tr>`;
                    let dSno = 1;
                    descendants.forEach(d => {
                        const isFemale = d.gender?.startsWith('F');
                        const rowClass = isFemale ? 'female-row' : '';
                        const dStr = JSON.stringify(d).replace(/'/g, "\\'");
                        html += `<tr class="${rowClass}" onclick='handleRowClick(${dStr})'>`;
                        html += `<td>${dSno++}</td>`;
                        html += `<td>${displayName(d.name)}</td>`;
                        html += `<td>${d.gen}</td>`;
                        html += `</tr>`;
                    });
                }
            }
            
            html += '</table></div>';
            document.getElementById('tableView').innerHTML = html;
        }

        // =========================================================================
        // PDF EXPORT
        // =========================================================================
        window.exportPDF = async function() {
            if (!currentMember) {
                alert('Please select a member first');
                return;
            }
            
            const content = document.getElementById('tableView');
            
            try {
                const header = document.createElement('div');
                header.style.marginBottom = '30px';
                header.style.textAlign = 'center';
                header.innerHTML = `
                    <h1 style="color: #d4af37; font-size: 36px; font-family: 'Playfair Display', serif; margin:0 0 10px 0;">Rizvi Family - Table View</h1>
                    <h2 style="color:#5a0000; font-size:24px; font-family:'Playfair Display', serif; margin:0;">${displayName(currentMember.name)}</h2>
                `;
                
                const footer = document.createElement('div');
                footer.style.marginTop = '40px';
                footer.style.padding = '15px 20px';
                footer.style.border = '2px solid #d4af37';
                footer.style.borderRadius = '4px';
                footer.style.background = '#0f172a';
                footer.style.color = '#d4af37';
                footer.style.display = 'flex';
                footer.style.justifyContent = 'space-between';
                footer.style.alignItems = 'center';
                footer.style.fontSize = '11px';
                
                const timeStr = formatCurrentTime();
                footer.innerHTML = `<span>${LOAD_STAMP || 'Last data updated on: Unknown'}</span><span style="font-weight: 500;">PDF generated: ${timeStr}</span>`;
                
                const signature = document.createElement('div');
                signature.style.marginTop = '20px';
                signature.style.paddingTop = '15px';
                signature.style.borderTop = '1px solid #ddd';
                signature.style.textAlign = 'center';
                signature.style.color = '#000';
                signature.style.fontSize = '12px';
                signature.style.fontWeight = '500';
                signature.textContent = 'Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010';
                
                content.insertBefore(header, content.firstChild);
                content.appendChild(footer);
                content.appendChild(signature);
                
                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed';
                loadingMsg.style.top = '50%';
                loadingMsg.style.left = '50%';
                loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000';
                loadingMsg.style.color = 'white';
                loadingMsg.style.padding = '20px 40px';
                loadingMsg.style.borderRadius = '8px';
                loadingMsg.style.zIndex = '9999';
                loadingMsg.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
                loadingMsg.textContent = '📄 Preparing PDF... please wait';
                document.body.appendChild(loadingMsg);
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const canvas = await html2canvas(content, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: true,
                    useCORS: true
                });
                
                content.removeChild(header);
                content.removeChild(footer);
                content.removeChild(signature);
                document.body.removeChild(loadingMsg);
                
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                
                const w = canvas.width / 2 * 0.264583;
                const h = canvas.height / 2 * 0.264583;
                
                const pdf = new jsPDF({
                    orientation: w > h ? 'l' : 'p',
                    unit: 'mm',
                    format: [w + 40, h + 40]
                });
                
                pdf.addImage(imgData, 'PNG', 20, 20, w, h);
                
                const safeName = displayName(currentMember.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                pdf.save(`table_${safeName}_${Date.now()}.pdf`);
                
            } catch (err) {
                console.error('PDF Error:', err);
                alert('❌ PDF generation failed: ' + err.message);
            }
        };

        // =========================================================================
        // LOAD DATA & INIT
        // =========================================================================
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
            LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
        }

        document.addEventListener('DOMContentLoaded', function() {
            // mobile menu toggle
            document.getElementById('mobileMenuToggle')?.addEventListener('click', function() {
                document.querySelector('.fixed-header-section')?.classList.toggle('collapsed');
            });

            const savedMember = localStorage.getItem('tableViewMember');
            if (savedMember) {
                currentMember = JSON.parse(savedMember);
                document.getElementById('searchInput').value = displayName(currentMember.name) + ' (' + currentMember.gen + ')';
                localStorage.removeItem('tableViewMember');
                
                const savedFilters = localStorage.getItem('tableViewFilters');
                if (savedFilters) {
                    const filters = JSON.parse(savedFilters);
                    showSiblings = filters.showSiblings;
                    showDescendants = filters.showDescendants;
                    showAncestors = filters.showAncestors;
                    
                    document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
                    document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
                    document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
                    
                    localStorage.removeItem('tableViewFilters');
                }
                
                renderTable();
            } else {
                resetSearch();
            }
        });

        // expose globals
        window.switchToTree = switchToTree;
        window.goToDashboard = goToDashboard;
        window.resetSearch = resetSearch;
        window.handleRowClick = handleRowClick;
    })();
</script>
