<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Rizvi Family · Individual Table (Mobile)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --pink-bg: #fff0f5;
            --light-pink: #ffe4e9;
            --sisters-border: #fb7185;
            --border-sage: #c9d6c2;
            --light-sage: #f4f7f2;
            --dark-green: #1b5e20;
            --bronze: #bc8c4f;
            --pdf-grey: #6c757d;
            --dashboard-green: #1b5e20;
            --reset-red: #5a0000;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            padding: 5px;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
        }

        .app-container {
            background: white;
            height: calc(100vh - 10px);
            border-radius: 16px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            max-width: 100%;
            margin: 0 auto;
        }

        /* PC-style header with buttons on right */
        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 8px 15px;
            border-bottom: 3px solid var(--gold);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 50px;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* PC-style header buttons */
        .header-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .header-btn {
            padding: 5px 10px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            transition: all 0.2s;
            border-radius: 4px;
            min-height: 32px;
        }

        .header-btn:active {
            background: var(--gold);
            color: var(--dark-blue);
            transform: translateY(-1px);
        }

        .header-btn.tree {
            background: var(--bronze);
            color: white;
            border-color: transparent;
        }

        .header-btn.tree:active {
            background: #9e6f3a;
        }

        .header-btn.reset {
            background: var(--reset-red);
            color: white;
            border-color: transparent;
        }

        .header-btn.reset:active {
            background: #7a1f1f;
        }

        .header-btn.pdf {
            background: var(--pdf-grey);
            color: white;
            border-color: transparent;
        }

        .header-btn.pdf:active {
            background: #5a6268;
        }

        .header-btn.dashboard {
            background: var(--dashboard-green);
            color: white;
            border-color: transparent;
        }

        .header-btn.dashboard:active {
            background: #2e7d32;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fffcf8;
            overflow: hidden;
        }

        /* PC-style search section */
        .search-section {
            padding: 15px 15px 0 15px;
            background: #fffcf8;
            flex-shrink: 0;
        }

        /* PC-style search row */
        .search-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-label {
            font-weight: 700;
            color: var(--maroon);
            font-size: 13px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .search-wrapper {
            position: relative;
            flex: 2;
            min-width: 250px;
        }

        .search-input {
            width: 100%;
            padding: 8px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            font-size: 13px;
            height: 40px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        /* PC-style filter buttons inline */
        .filter-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border: 2px solid var(--gold);
            background: white;
            color: var(--dark-blue);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
            min-height: 40px;
        }

        .filter-btn.active {
            background: #d4edda;
            border-color: var(--dark-green);
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .result-item {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
        }

        .result-item:hover {
            background: #faebcd;
        }

        .result-item .main-name {
            font-weight: 700;
            color: var(--dark-blue);
        }

        .result-item .gen {
            color: var(--maroon);
            font-size: 11px;
            margin-left: 6px;
        }

        .border-line {
            border-top: 3px solid var(--gold);
            margin: 20px 0 0 0;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* Empty state box - exactly like File 7 */
        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            background: var(--light-sage);
            border: 2px solid var(--border-sage);
            border-radius: 16px;
            margin: 20px auto;
            max-width: 500px;
        }

        .empty-state .big-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .empty-state .main-message {
            font-size: 18px;
            font-weight: 600;
            color: var(--maroon);
            margin-bottom: 8px;
        }

        .empty-state .sub-message {
            font-size: 13px;
            color: #666;
        }

        /* Table container - wide and scrollable */
        .table-container {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 15px;
            overflow-x: auto;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .lineage-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 700px;
            table-layout: auto;
        }

        /* Table with visible borders */
        .lineage-table, 
        .lineage-table th, 
        .lineage-table td {
            border: 1px solid #d4af37;
        }

        .lineage-table th {
            background: #fdf6e3;
            padding: 12px 15px;
            border-bottom: 2px solid var(--gold);
            text-align: center;
            font-weight: 700;
            color: var(--maroon);
            white-space: nowrap;
        }

        .lineage-table td {
            padding: 10px 15px;
            border-bottom: 1px solid #f0e5ce;
            text-align: left;
            word-wrap: break-word;
            white-space: normal;
        }

        .lineage-table th:first-child,
        .lineage-table td:first-child {
            text-align: center;
            width: 80px;
        }

        .lineage-table th:last-child,
        .lineage-table td:last-child {
            text-align: center;
            width: 120px;  /* Wider for Generation column */
            font-weight: 600;
            color: var(--maroon);
        }

        .lineage-table th:nth-child(2),
        .lineage-table td:nth-child(2) {
            text-align: left;
        }

        .lineage-table tr:hover td {
            background: #faebcd;
            cursor: pointer;
        }

        .lineage-table .section-header td {
            background: var(--light-sage);
            font-weight: 700;
            color: var(--maroon);
            text-align: left;
            padding-left: 15px;
            border-top: 2px solid var(--gold);
            border-bottom: 2px solid var(--gold);
            white-space: nowrap;
        }

        .lineage-table .current-member td {
            background: #e8f5e9;
            font-weight: 700;
            border: 2px solid var(--dark-green);
        }

        .lineage-table .female-row td {
            background-color: var(--light-pink) !important;
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 10px;
            border-top: 2px solid var(--gold);
            flex-shrink: 0;
        }

        .hidden { display: none; }

        /* Mobile adjustments */
        @media screen and (max-width: 768px) {
            .search-row {
                gap: 10px;
            }
            
            .search-label {
                font-size: 12px;
            }
            
            .filter-btn {
                padding: 6px 10px;
                font-size: 12px;
            }
        }

        @media screen and (max-width: 600px) {
            .search-row {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .search-wrapper {
                min-width: 100%;
                order: -1;
            }
            
            .filter-buttons {
                width: 100%;
                justify-content: space-between;
            }
            
            .filter-btn {
                flex: 1;
                justify-content: center;
            }
        }

        @media screen and (max-width: 480px) {
            .header-title {
                font-size: 15px;
            }
            
            .header-icon {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }
            
            .header-btn {
                padding: 4px 8px;
                font-size: 11px;
            }
            
            .lineage-table {
                font-size: 13px;
                min-width: 600px;
            }
            
            .lineage-table th,
            .lineage-table td {
                padding: 8px 10px;
            }
            
            .lineage-table th:first-child,
            .lineage-table td:first-child {
                width: 60px;
            }
            
            .lineage-table th:last-child,
            .lineage-table td:last-child {
                width: 100px;  /* Still wider on mobile */
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- PC-style header with buttons on right and proper title -->
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">📋</span>
                <span>Rizvi Family - Table View</span>
            </div>
            <div class="header-actions">
                <div class="header-btn tree" onclick="switchToTree()">🌲 Tree</div>
                <div class="header-btn reset" onclick="resetSearch()">🔄 Reset</div>
                <div class="header-btn pdf" onclick="exportPDF()">📑 PDF</div>
                <div class="header-btn dashboard" onclick="goToDashboard()">🏠 Home</div>
            </div>
        </div>

        <div class="main-content">
            <div class="search-section">
                <!-- PC-style search row with label, wide search, and inline filters -->
                <div class="search-row">
                    <span class="search-label">SEARCH MEMBER</span>
                    <div class="search-wrapper">
                        <input type="text" id="searchInput" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value)" autocomplete="off">
                        <div id="dropdown" class="dropdown"></div>
                    </div>
                    <div class="filter-buttons">
                        <div id="filterSiblings" class="filter-btn active" onclick="toggleFilter('siblings')">👥 Siblings</div>
                        <div id="filterDescendants" class="filter-btn active" onclick="toggleFilter('descendants')">👶 Children</div>
                        <div id="filterAncestors" class="filter-btn" onclick="toggleFilter('ancestors')">🌳 Ancestors</div>
                    </div>
                </div>
                <div class="border-line"></div>
            </div>

            <div class="scrollable-content" id="tableView"></div>
        </div>

        <div class="app-footer">
            Imran Haider S/o Risalat H Rizvi | 0332-787-6010
        </div>
    </div>

    <script>
        // ======================================================================
        // ========================== GLOBAL VARIABLES ==========================
        // ======================================================================
        let db = [];
        let currentMember = null;
        let showSiblings = true;
        let showDescendants = true;
        let showAncestors = false;
        let LOAD_STAMP = '';

        // Prevent pull-to-refresh
        document.body.addEventListener('touchmove', function(e) {
            if (!e.target.closest('.scrollable-content')) {
                e.preventDefault();
            }
        }, { passive: false });

        // ======================================================================
        // ========================== HELPER FUNCTIONS ==========================
        // ======================================================================
        function displayName(str) {
            return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
        }

        function formatCurrentTime() {
            const d = new Date();
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('familyDB');
            if (saved) {
                db = JSON.parse(saved);
                LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
            }
        }

        function findParent(member) {
            if (!member || !member.father) return null;
            return db.find(x => x.name.toLowerCase() === member.father.toLowerCase());
        }

        function getAncestryChain(member) {
            if (!member) return [];
            let chain = [], cur = member, visited = new Set();
            while (cur && !visited.has(cur.name.toLowerCase())) {
                chain.push(cur);
                visited.add(cur.name.toLowerCase());
                cur = findParent(cur);
            }
            return chain;
        }

        function getSiblings(member) {
            if (!member || !member.father) return [];
            return db.filter(x => x.father?.toLowerCase() === member.father?.toLowerCase() && x.name !== member.name);
        }

        function getDescendants(member) {
            if (!member) return [];
            return db.filter(x => x.father?.toLowerCase() === member.name.toLowerCase());
        }

        // ======================================================================
        // ========================== NAVIGATION ================================
        // ======================================================================
        function switchToTree() {
            if (currentMember) {
                localStorage.setItem('tableViewMember', JSON.stringify(currentMember));
                localStorage.setItem('tableViewFilters', JSON.stringify({
                    showSiblings: showSiblings,
                    showDescendants: showDescendants,
                    showAncestors: showAncestors
                }));
            }
            window.location.href = '7-individual-tree-mobile.html';
        }

        function goToDashboard() {
            window.location.href = '6-dashboard-mobile.html';
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            currentMember = null;
            document.getElementById('tableView').innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">👤</div>
                    <div class="main-message">Select a member to view</div>
                    <div class="sub-message">Search and select a family member above to see their table</div>
                </div>
            `;
            document.getElementById('dropdown').style.display = 'none';
        }

        // ======================================================================
        // ========================== PDF EXPORT ================================
        // ======================================================================
        async function exportPDF() {
            if (!currentMember) {
                alert('Please select a member first');
                return;
            }
            
            const content = document.getElementById('tableView');
            
            try {
                const header = document.createElement('div');
                header.style.marginBottom = '20px';
                header.style.textAlign = 'center';
                header.innerHTML = `
                    <h1 style="color: #d4af37; font-size: 24px; font-family: 'Playfair Display', serif;">Rizvi Family - Table View</h1>
                    <h2 style="color: #5a0000; font-size: 18px; font-family: 'Playfair Display', serif;">${displayName(currentMember.name)}</h2>
                `;
                
                const footer = document.createElement('div');
                footer.style.marginTop = '20px';
                footer.style.padding = '10px';
                footer.style.borderTop = '1px solid #ddd';
                footer.style.textAlign = 'center';
                footer.style.fontSize = '10px';
                footer.innerHTML = `Imran Haider | 0332-787-6010 | ${formatCurrentTime()}`;
                
                content.insertBefore(header, content.firstChild);
                content.appendChild(footer);
                
                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed';
                loadingMsg.style.top = '50%';
                loadingMsg.style.left = '50%';
                loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000';
                loadingMsg.style.color = 'white';
                loadingMsg.style.padding = '15px 30px';
                loadingMsg.style.borderRadius = '8px';
                loadingMsg.style.zIndex = '9999';
                loadingMsg.textContent = '📄 Preparing PDF...';
                document.body.appendChild(loadingMsg);
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const canvas = await html2canvas(content, {
                    scale: 2,
                    backgroundColor: '#ffffff'
                });
                
                content.removeChild(header);
                content.removeChild(footer);
                document.body.removeChild(loadingMsg);
                
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                
                const w = canvas.width / 2 * 0.264583;
                const h = canvas.height / 2 * 0.264583;
                
                const pdf = new jsPDF({
                    orientation: w > h ? 'l' : 'p',
                    unit: 'mm',
                    format: [w + 30, h + 30]
                });
                
                pdf.addImage(imgData, 'PNG', 15, 15, w, h);
                
                const safeName = displayName(currentMember.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                pdf.save(`table_${safeName}_${new Date().getTime()}.pdf`);
                
            } catch (err) {
                console.error('PDF Error:', err);
                alert('❌ PDF generation failed: ' + err.message);
            }
        }

        // ======================================================================
        // ========================== SEARCH FUNCTIONS ==========================
        // ======================================================================
        function searchMember(query) {
            const drop = document.getElementById('dropdown');
            drop.innerHTML = '';
            
            if (!query || query.length < 1) {
                drop.style.display = 'none';
                return;
            }
            
            const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 6);
            if (found.length === 0) {
                drop.style.display = 'none';
                return;
            }
            
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div><span class="main-name">${displayName(p.name)}</span> <span class="gen">(${p.gen})</span></div>
                    <div style="font-size:11px;">${p.gender?.startsWith('F') ? 'D/o' : 'S/o'} ${displayName(p.father)}</div>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('searchInput').value = displayName(p.name) + ' (' + p.gen + ')';
                    currentMember = p;
                    renderTable();
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            
            drop.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                document.getElementById('dropdown').style.display = 'none';
            }
        });

        function handleRowClick(member) {
            currentMember = member;
            document.getElementById('searchInput').value = displayName(member.name) + ' (' + member.gen + ')';
            renderTable();
        }

        // ======================================================================
        // ========================== FILTER TOGGLE =============================
        // ======================================================================
        function toggleFilter(filter) {
            if (!currentMember) return;
            
            if (filter === 'siblings') {
                showSiblings = !showSiblings;
                document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
            } else if (filter === 'descendants') {
                showDescendants = !showDescendants;
                document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
            } else if (filter === 'ancestors') {
                showAncestors = !showAncestors;
                document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
            }
            
            renderTable();
        }

        // ======================================================================
        // ========================== RENDER TABLE ==============================
        // ======================================================================
        function renderTable() {
            if (!currentMember) return;
            
            let html = '<div class="table-container"><table class="lineage-table">';
            html += '<tr><th>S.No</th><th>Name</th><th>Generation</th></tr>';
            
            let sno = 1;
            const isCurrentFemale = currentMember.gender?.startsWith('F');
            const currentRowClass = isCurrentFemale ? 'current-member female-row' : 'current-member';
            
            html += `<tr class="${currentRowClass}" onclick='handleRowClick(${JSON.stringify(currentMember).replace(/'/g, "\\'")})'>`;
            html += `<td>${sno++}</td>`;
            html += `<td><strong>${displayName(currentMember.name)}</strong> (Selected)</td>`;
            html += `<td><strong>${currentMember.gen}</strong></td>`;
            html += `</tr>`;
            
            if (showAncestors) {
                const ancestors = getAncestryChain(currentMember).slice(1);
                if (ancestors.length > 0) {
                    html += `<tr class="section-header"><td colspan="3">🔺 ANCESTORS (${ancestors.length})</td></tr>`;
                    let aSno = 1;
                    ancestors.forEach(a => {
                        const isFemale = a.gender?.startsWith('F');
                        const rowClass = isFemale ? 'female-row' : '';
                        html += `<tr class="${rowClass}" onclick='handleRowClick(${JSON.stringify(a).replace(/'/g, "\\'")})'>`;
                        html += `<td>${aSno++}</td>`;
                        html += `<td>${displayName(a.name)}</td>`;
                        html += `<td>${a.gen}</td>`;
                        html += `</tr>`;
                    });
                }
            }
            
            if (showSiblings) {
                const siblings = getSiblings(currentMember);
                if (siblings.length > 0) {
                    const father = findParent(currentMember);
                    const fatherName = father ? displayName(father.name) : 'Unknown';
                    html += `<tr class="section-header"><td colspan="3">👥 SIBLINGS (${siblings.length}) - Children of ${fatherName}</td></tr>`;
                    let sSno = 1;
                    siblings.forEach(s => {
                        const isFemale = s.gender?.startsWith('F');
                        const rowClass = isFemale ? 'female-row' : '';
                        html += `<tr class="${rowClass}" onclick='handleRowClick(${JSON.stringify(s).replace(/'/g, "\\'")})'>`;
                        html += `<td>${sSno++}</td>`;
                        html += `<td>${displayName(s.name)}</td>`;
                        html += `<td>${s.gen}</td>`;
                        html += `</tr>`;
                    });
                }
            }
            
            if (showDescendants) {
                const descendants = getDescendants(currentMember);
                if (descendants.length > 0) {
                    html += `<tr class="section-header"><td colspan="3">👶 DESCENDANTS (${descendants.length}) - Children of ${displayName(currentMember.name)}</td></tr>`;
                    let dSno = 1;
                    descendants.forEach(d => {
                        const isFemale = d.gender?.startsWith('F');
                        const rowClass = isFemale ? 'female-row' : '';
                        html += `<tr class="${rowClass}" onclick='handleRowClick(${JSON.stringify(d).replace(/'/g, "\\'")})'>`;
                        html += `<td>${dSno++}</td>`;
                        html += `<td>${displayName(d.name)}</td>`;
                        html += `<td>${d.gen}</td>`;
                        html += `</tr>`;
                    });
                }
            }
            
            html += '</table></div>';
            document.getElementById('tableView').innerHTML = html;
        }

        // ======================================================================
        // ========================== INITIALIZATION ============================
        // ======================================================================
        loadFromStorage();
        
        const savedMember = localStorage.getItem('tableViewMember');
        if (savedMember) {
            currentMember = JSON.parse(savedMember);
            document.getElementById('searchInput').value = displayName(currentMember.name) + ' (' + currentMember.gen + ')';
            localStorage.removeItem('tableViewMember');
            
            const savedFilters = localStorage.getItem('tableViewFilters');
            if (savedFilters) {
                const filters = JSON.parse(savedFilters);
                showSiblings = filters.showSiblings;
                showDescendants = filters.showDescendants;
                showAncestors = filters.showAncestors;
                
                document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
                document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
                document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
                
                localStorage.removeItem('tableViewFilters');
            }
            renderTable();
        } else {
            document.getElementById('tableView').innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">👤</div>
                    <div class="main-message">Select a member to view</div>
                    <div class="sub-message">Search and select a family member above to see their table</div>
                </div>
            `;
        }
    </script>
</body>
</html>
