<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=0.5, minimum-scale=0.1, maximum-scale=5.0">
    <title>Rizvi Family · Root Table (Mobile)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>


/* Container to center the top box */
.report-section {
    display: flex;
    justify-content: center;
    width: 100%;
    margin-bottom: 20px;
}

/* The box itself - locked to the same width as the items below */
.stats-container, .summary-card {
    width: 550px !important; /* Forces it to match the width of one tree/table */
    margin: 0 auto;
}

html {
    overflow: hidden;
    height: 100%;
}

body {
    height: 100%;
    overflow-y: auto;       /* This moves the scroll inside the body */
    overscroll-behavior-y: none;
    -webkit-overflow-scrolling: touch; /* Makes scrolling smooth on iPhone */
}
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-pink: #ffe4e9;
            --light-sage: #f4f7f2;
            --border-sage: #c9d6c2;
            --bronze: #bc8c4f;
            --pdf-grey: #6c757d;
            --dashboard-green: #1b5e20;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 5px;
	overscroll-behavior-y: none;
        }


        .app-container {
            background: white;
            min-height: calc(100vh - 10px);
            border-radius: 16px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
		min-width: 1200px;
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 12px;
            border-bottom: 3px solid var(--gold);
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .button-row {
            display: flex;
            gap: 8px;
            padding: 8px 12px;
            background: #fffcf8;
            border-bottom: 1px solid var(--border-sage);
        }

        .action-btn {
            flex: 1;
            padding: 12px 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid var(--gold);
            background: white;
            color: var(--dark-blue);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 48px;
            transition: all 0.2s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

.action-btn.tree {
    background: #d4edda;  /* Light green background */
    color: var(--dark-blue);
    border: 2px solid var(--dark-green);
}

.action-btn.reset {
    background: var(--maroon);
    color: white;
    border-color: transparent;
}

.action-btn.pdf {
    background: var(--pdf-grey);
    color: white;
    border-color: transparent;
}

.action-btn.dashboard {
    background: var(--dashboard-green);
    color: white;
    border-color: transparent;
}        
        .action-btn span {
            font-size: 18px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fffcf8;
        }

        .search-section {
    padding: 12px;
    background: #fffcf8;
    position: sticky;   /* Keeps it on screen */
    top: 0;            /* Sticks it to the very top */
    z-index: 1000;      /* Ensures it stays above the tree lines */
}

        .search-row {
            margin-bottom: 12px;
        }

        .search-label {
            font-weight: 700;
            color: var(--maroon);
            font-size: 12px;
            margin-bottom: 5px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            height: 48px;
        }

        .search-input:focus {
            border-color: var(--gold);
            outline: none;
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .result-item {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
        }

        .result-item:hover {
            background: #faebcd;
        }

        .border-line {
            border-top: 3px solid var(--gold);
            margin: 10px 0 0 0;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .root-card {
            background: var(--light-sage);
            border: 2px solid var(--border-sage);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .root-title {
            color: var(--maroon);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
            text-align: center;
        }

        .root-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--dark-blue);
            text-align: center;
            margin-bottom: 10px;
        }

        .gap-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .gap-item {
            background: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid var(--border-sage);
            flex-wrap: wrap;
            justify-content: center;
        }

        .gap-value {
            font-weight: 700;
            background: var(--light-sage);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .gap-value.highlight {
            background: var(--bronze);
            color: white;
        }

.tables-container {
    display: flex !important;
    flex-direction: row !important; /* This forces side-by-side */
    justify-content: center;
    align-items: flex-start;
    gap: 20px;
    width: 100%;
    padding: 10px;
}

.table-wrapper {
    flex: 1;                /* Makes both tables take equal space */
    min-width: 500px;       /* Ensures tables don't get too squeezed */
    background: white;
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}
        .table-wrapper {
            background: white;
            border: 2px solid var(--gold);
            border-radius: 12px;
            padding: 10px;
            overflow-x: auto;
        }

        .table-wrapper h3 {
            color: var(--maroon);
            margin-bottom: 10px;
            font-size: 14px;
            text-align: center;
        }

      .lineage-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: auto !important; /* This allows columns to expand for long names */
    white-space: nowrap;           /* Keeps names on a single line */
}

/* Ensure the columns have enough breathing room */
.lineage-table th, .lineage-table td {
    padding: 12px 20px;
    min-width: 100px;
}

        .lineage-table td {
            padding: 6px 8px;
            border-bottom: 1px solid #f0e5ce;
            text-align: left;
        }

        .lineage-table td:first-child {
            text-align: center;
            width: 40px;
        }

        .lineage-table td:last-child {
            text-align: center;
            width: 70px;
        }

        .lineage-table tr:hover td {
            background: #faebcd;
            cursor: pointer;
        }

        .lineage-table .female-row td {
            background-color: var(--light-pink) !important;
        }

        .lineage-table .root-row td {
            background: #fff0f0;
            font-weight: 700;
            border: 2px solid var(--maroon);
        }

        .empty-state {
            text-align: center;
            color: #999;
            padding: 40px;
            background: var(--light-sage);
            border: 2px solid var(--border-sage);
            border-radius: 16px;
            margin: 20px;
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 10px;
            font-size: 10px;
            border-top: 2px solid var(--gold);
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-title">
                <span>📋</span> Rizvi Family - Root Table
            </div>
        </div>

        <!-- Button row 1 -->
        <div class="button-row">
            <button class="action-btn tree" onclick="switchToTree()">
                <span>🌲</span> Switch to Tree
            </button>
            <button class="action-btn reset" onclick="resetSearch()">
                <span>🔄</span> Reset
            </button>
        </div>

        <!-- Button row 2 -->
        <div class="button-row">
            <button class="action-btn pdf" onclick="exportPDF()">
                <span>📑</span> Save PDF
            </button>
            <button class="action-btn dashboard" onclick="goToDashboard()">
                <span>🏠</span> Home
            </button>
        </div>

        <div class="main-content">
            <div class="search-section">
                <div class="search-row">
                    <div class="search-label">MEMBER 1</div>
                    <div class="search-wrapper">
                        <input type="text" id="search1" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value, 1)" autocomplete="off">
                        <div id="dropdown1" class="dropdown"></div>
                    </div>
                </div>
                <div class="search-row">
                    <div class="search-label">MEMBER 2</div>
                    <div class="search-wrapper">
                        <input type="text" id="search2" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value, 2)" autocomplete="off">
                        <div id="dropdown2" class="dropdown"></div>
                    </div>
                </div>
                <div class="border-line"></div>
            </div>

            <div class="scrollable-content" id="tableView"></div>
        </div>

        <div class="app-footer">
            Imran Haider S/o Risalat H Rizvi | 0332-787-6010
        </div>
    </div>

    <script>
        // ======================================================================
        // ========================== GLOBAL VARIABLES ==========================
        // ======================================================================
        let db = [];
        let member1 = null;
        let member2 = null;
        let LOAD_STAMP = '';

        // ======================================================================
        // ========================== HELPER FUNCTIONS ==========================
        // ======================================================================
        function displayName(str) {
            return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
        }

        function formatCurrentTime() {
            const d = new Date();
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
        }

        function loadFromStorage() {
            const saved = localStorage.getItem('familyDB');
            if (saved) {
                db = JSON.parse(saved);
                LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
            }
        }

        function findParent(member) {
            if (!member || !member.father) return null;
            return db.find(x => x.name.toLowerCase() === member.father.toLowerCase());
        }

        function getAncestryChain(member) {
            if (!member) return [];
            let chain = [], cur = member, visited = new Set();
            while (cur && !visited.has(cur.name.toLowerCase())) {
                chain.push(cur);
                visited.add(cur.name.toLowerCase());
                cur = findParent(cur);
            }
            return chain;
        }

        function findCommonRoot(m1, m2) {
            const chain1 = getAncestryChain(m1);
            const chain2 = getAncestryChain(m2);
            for (let p of chain1) {
                if (chain2.some(x => x.name.toLowerCase() === p.name.toLowerCase())) return p;
            }
            return null;
        }

        function getGenNum(gen) {
            const match = String(gen).match(/\d+/);
            return match ? parseInt(match[0]) : 0;
        }

        // ======================================================================
        // ========================== NAVIGATION ================================
        // ======================================================================
        function switchToTree() {
            if (member1 && member2) {
                localStorage.setItem('rootMember1', JSON.stringify(member1));
                localStorage.setItem('rootMember2', JSON.stringify(member2));
            }
            window.location.href = '9-root-tree-mobile.html';
        }

        function goToDashboard() {
            window.location.href = '6-dashboard-mobile.html';
        }

        function resetSearch() {
            member1 = null;
            member2 = null;
            document.getElementById('search1').value = '';
            document.getElementById('search2').value = '';
            document.getElementById('tableView').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 40px; margin-bottom: 10px;">👥</div>
                    <div style="font-size: 16px; font-weight: 600; color: var(--maroon);">Select two members</div>
                    <div style="font-size: 12px; color: #666; margin-top: 5px;">Search and select two family members above</div>
                </div>
            `;
            document.getElementById('dropdown1').style.display = 'none';
            document.getElementById('dropdown2').style.display = 'none';
        }

        // ======================================================================
        // ========================== PDF EXPORT ================================
        // ======================================================================
        async function exportPDF() {
            if (!member1 || !member2) {
                alert('Please select both members first');
                return;
            }
            
            const content = document.getElementById('tableView');
            
            try {
                const header = document.createElement('div');
                header.style.marginBottom = '20px';
                header.style.textAlign = 'center';
                header.innerHTML = `
                    <h1 style="color: #d4af37; font-size: 24px; font-family: 'Playfair Display', serif;">Rizvi Family - Root Analysis</h1>
                    <h2 style="color: #5a0000; font-size: 18px; font-family: 'Playfair Display', serif;">${displayName(member1.name)} & ${displayName(member2.name)}</h2>
                `;
                
                const footer = document.createElement('div');
                footer.style.marginTop = '20px';
                footer.style.padding = '10px';
                footer.style.borderTop = '1px solid #ddd';
                footer.style.textAlign = 'center';
                footer.style.fontSize = '10px';
                footer.innerHTML = `Imran Haider | 0332-787-6010 | ${formatCurrentTime()}`;
                
                content.insertBefore(header, content.firstChild);
                content.appendChild(footer);
                
                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed';
                loadingMsg.style.top = '50%';
                loadingMsg.style.left = '50%';
                loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000';
                loadingMsg.style.color = 'white';
                loadingMsg.style.padding = '15px 30px';
                loadingMsg.style.borderRadius = '8px';
                loadingMsg.style.zIndex = '9999';
                loadingMsg.textContent = '📄 Preparing PDF...';
                document.body.appendChild(loadingMsg);
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const canvas = await html2canvas(content, {
                    scale: 2,
                    backgroundColor: '#ffffff'
                });
                
                content.removeChild(header);
                content.removeChild(footer);
                document.body.removeChild(loadingMsg);
                
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                
                const w = canvas.width / 2 * 0.264583;
                const h = canvas.height / 2 * 0.264583;
                
                const pdf = new jsPDF({
                    orientation: w > h ? 'l' : 'p',
                    unit: 'mm',
                    format: [w + 30, h + 30]
                });
                
                pdf.addImage(imgData, 'PNG', 15, 15, w, h);
                
                const safeName1 = displayName(member1.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const safeName2 = displayName(member2.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                pdf.save(`root_${safeName1}_${safeName2}_${new Date().getTime()}.pdf`);
                
            } catch (err) {
                console.error('PDF Error:', err);
                alert('❌ PDF generation failed: ' + err.message);
            }
        }

        // ======================================================================
        // ========================== SEARCH FUNCTIONS ==========================
        // ======================================================================
        function searchMember(query, num) {
            const drop = document.getElementById(`dropdown${num}`);
            drop.innerHTML = '';
            
            if (!query || query.length < 1) {
                drop.style.display = 'none';
                return;
            }
            
            const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 5);
            
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div><strong>${displayName(p.name)}</strong> <span style="color:var(--maroon);">(${p.gen})</span></div>
                    <div style="font-size:10px; color:#666;">${p.gender?.startsWith('F') ? 'D/o' : 'S/o'} ${displayName(p.father)}</div>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById(`search${num}`).value = displayName(p.name) + ' (' + p.gen + ')';
                    if (num === 1) member1 = p;
                    else member2 = p;
                    
                    if (member1 && member2) {
                        renderTables();
                    }
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            
            drop.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                document.getElementById('dropdown1').style.display = 'none';
                document.getElementById('dropdown2').style.display = 'none';
            }
        });

        // ======================================================================
        // ========================== RENDER TABLES =============================
        // ======================================================================
        function renderTables() {
            if (!member1 || !member2) return;
            
            const commonRoot = findCommonRoot(member1, member2);
            
            if (!commonRoot) {
                document.getElementById('tableView').innerHTML = `
                    <div class="root-card">
                        <div class="root-title">No Common Ancestor</div>
                        <div style="text-align:center; color:#666; padding:10px;">These members are not connected in the family tree.</div>
                    </div>
                `;
                return;
            }
            
            const chain1 = getAncestryChain(member1);
            const chain2 = getAncestryChain(member2);
            
            const path1 = chain1.slice(0, chain1.findIndex(p => p.name.toLowerCase() === commonRoot.name.toLowerCase()) + 1).reverse();
            const path2 = chain2.slice(0, chain2.findIndex(p => p.name.toLowerCase() === commonRoot.name.toLowerCase()) + 1).reverse();
            
            const gen1 = getGenNum(member1.gen);
            const gen2 = getGenNum(member2.gen);
            const genRoot = getGenNum(commonRoot.gen);
            const gap1 = Math.abs(gen1 - genRoot);
            const gap2 = Math.abs(gen2 - genRoot);
            const gap12 = Math.abs(gen1 - gen2);
            
            let html = `
                <div class="root-card">
                    <div class="root-title">Common Root Ancestor</div>
                    <div class="root-name">${displayName(commonRoot.name)} - ${commonRoot.gen}</div>
                    
                    <div class="gap-row">
                        <div class="gap-item">${displayName(member1.name)} → Root <span class="gap-value">${gap1} gen</span></div>
                        <div class="gap-item">${displayName(member2.name)} → Root <span class="gap-value">${gap2} gen</span></div>
                        <div class="gap-item">Between <span class="gap-value highlight">${gap12} gen</span></div>
                    </div>
                </div>
                
                <div class="tables-container">
                    <div class="table-wrapper">
                        <h3>${displayName(member1.name)}'s Path to Root</h3>
                        <table class="lineage-table">
                            <tr><th>#</th><th>Name</th><th>Gen</th></tr>
            `;
            
            path1.forEach((member, index) => {
                const isRoot = member.name.toLowerCase() === commonRoot.name.toLowerCase();
                const isFemale = member.gender?.startsWith('F');
                const rowClass = isRoot ? 'root-row' : (isFemale ? 'female-row' : '');
                
                html += `<tr class="${rowClass}">`;
                html += `<td>${index + 1}</td>`;
                html += `<td>${displayName(member.name)}${isRoot ? ' (Root)' : ''}</td>`;
                html += `<td>${member.gen}</td>`;
                html += `</tr>`;
            });
            
            html += `
                        </table>
                    </div>
                    
                    <div class="table-wrapper">
                        <h3>${displayName(member2.name)}'s Path to Root</h3>
                        <table class="lineage-table">
                            <tr><th>#</th><th>Name</th><th>Gen</th></tr>
            `;
            
            path2.forEach((member, index) => {
                const isRoot = member.name.toLowerCase() === commonRoot.name.toLowerCase();
                const isFemale = member.gender?.startsWith('F');
                const rowClass = isRoot ? 'root-row' : (isFemale ? 'female-row' : '');
                
                html += `<tr class="${rowClass}">`;
                html += `<td>${index + 1}</td>`;
                html += `<td>${displayName(member.name)}${isRoot ? ' (Root)' : ''}</td>`;
                html += `<td>${member.gen}</td>`;
                html += `</tr>`;
            });
            
            html += `
                        </table>
                    </div>
                </div>
            `;
            
            document.getElementById('tableView').innerHTML = html;
        }

        // ======================================================================
        // ========================== INITIALIZATION ============================
        // ======================================================================
        loadFromStorage();
        
        const saved1 = localStorage.getItem('rootMember1');
        const saved2 = localStorage.getItem('rootMember2');
        if (saved1 && saved2) {
            member1 = JSON.parse(saved1);
            member2 = JSON.parse(saved2);
            document.getElementById('search1').value = displayName(member1.name) + ' (' + member1.gen + ')';
            document.getElementById('search2').value = displayName(member2.name) + ' (' + member2.gen + ')';
            localStorage.removeItem('rootMember1');
            localStorage.removeItem('rootMember2');
            renderTables();
        } else {
            document.getElementById('tableView').innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 40px; margin-bottom: 10px;">👥</div>
                    <div style="font-size: 16px; font-weight: 600; color: var(--maroon);">Select two members</div>
                    <div style="font-size: 12px; color: #666; margin-top: 5px;">Search and select two family members above</div>
                </div>
            `;
        }
    </script>
</body>
</html>
