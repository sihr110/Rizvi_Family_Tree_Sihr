<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Rizvi Family · Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .password-container {
            background: white;
            padding: 30px 20px;
            border-radius: 20px;
            border: 3px solid var(--gold);
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--dark-blue);
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--maroon);
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .device-selector {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .device-btn {
            padding: 12px 10px;
            border: 2px solid var(--gold);
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 50px;
            -webkit-appearance: none;
            appearance: none;
        }

        .device-btn.active {
            background: var(--gold);
            color: var(--dark-blue);
            border-color: var(--dark-blue);
        }

        .device-btn:active {
            transform: scale(0.98);
            background: #faebcd;
        }

        .password-wrapper {
            position: relative;
            margin: 20px 0;
        }

        .password-wrapper input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            -webkit-appearance: none;
            appearance: none;
        }

        .password-wrapper input:focus {
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px rgba(90, 0, 0, 0.1);
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--maroon);
            font-weight: bold;
            font-size: 15px;
            background: white;
            padding: 5px 10px;
            border-radius: 4px;
            user-select: none;
            min-height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-btn:active {
            background: #f0f0f0;
        }

        .unlock-btn {
            background: var(--maroon);
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 17px;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            -webkit-appearance: none;
            appearance: none;
            min-height: 55px;
        }

        .unlock-btn:active {
            background: #7a1f1f;
            transform: scale(0.98);
        }

        .error-msg {
            color: var(--maroon);
            margin-top: 15px;
            display: none;
            font-size: 15px;
            font-weight: 600;
            padding: 10px;
            background: #ffe6e6;
            border-radius: 4px;
        }

        .footer-note {
            margin-top: 25px;
            font-size: 13px;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .footer-note p {
            margin: 5px 0;
        }

        .footer-note strong {
            color: var(--dark-blue);
        }

        .blinking-text {
            color: var(--maroon);
            animation: blink 1.5s infinite;
            font-weight: 600;
            margin-top: 10px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .family-seal {
            font-size: 48px;
            margin-bottom: 10px;
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="family-seal">🌿</div>
        <h1>Rizvi Family Tree</h1>
        <div class="subtitle">Honoring our past, preserving our future</div>
        
        <div class="device-selector">
            <button class="device-btn active" id="pcBtn">
                <span>💻</span> Desktop
            </button>
            <button class="device-btn" id="mobileBtn">
                <span>📱</span> Mobile
            </button>
        </div>
        
        <div class="password-wrapper">
            <input type="password" id="passwordField" placeholder="Enter Secure Password" autofocus>
            <span class="toggle-btn" id="toggleBtn">Show</span>
        </div>

        <button class="unlock-btn" id="unlockBtn">
            <span>🔓</span> Unlock Dashboard
        </button>
        <div id="passwordError" class="error-msg">
            ❌ Access Denied. Please verify the password.
        </div>

        <div class="footer-note">
            <p>Designed & Developed by:</p>
            <p><strong>Imran Haider</strong></p>
            <p>S/o Syed Risalat Hussain Rizvi</p>
            <p><span style="color: var(--gold);">📞</span> 0332-787-6010</p>
            <p class="blinking-text">⚠️ Private family access only ⚠️</p>
        </div>
    </div>

    <script>
        const CONFIG = { password: 'sihr110' };
        let deviceType = 'pc';

        // Wait for DOM to be fully loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Page loaded, setting up event listeners...');
            
            // Get elements
            const pcBtn = document.getElementById('pcBtn');
            const mobileBtn = document.getElementById('mobileBtn');
            const toggleBtn = document.getElementById('toggleBtn');
            const unlockBtn = document.getElementById('unlockBtn');
            const passwordField = document.getElementById('passwordField');
            const errorMsg = document.getElementById('passwordError');

            // Device selection - PC
            if (pcBtn) {
                pcBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('PC button clicked');
                    deviceType = 'pc';
                    pcBtn.classList.add('active');
                    mobileBtn.classList.remove('active');
                });
            }

            // Device selection - Mobile
            if (mobileBtn) {
                mobileBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Mobile button clicked');
                    deviceType = 'mobile';
                    mobileBtn.classList.add('active');
                    pcBtn.classList.remove('active');
                });
            }

            // Toggle password visibility
            if (toggleBtn) {
                toggleBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Toggle button clicked');
                    const type = passwordField.type === 'password' ? 'text' : 'password';
                    passwordField.type = type;
                    toggleBtn.textContent = type === 'password' ? 'Show' : 'Hide';
                });
            }

            // Unlock button
            if (unlockBtn) {
                unlockBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    console.log('Unlock button clicked');
                    checkPassword();
                });
            }

            // Enter key in password field
            if (passwordField) {
                passwordField.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        console.log('Enter key pressed');
                        checkPassword();
                    }
                });

                // Clear error when typing
                passwordField.addEventListener('input', function() {
                    errorMsg.style.display = 'none';
                });
            }

            // Focus on password field
            passwordField.focus();
        });

        function checkPassword() {
            const passwordField = document.getElementById('passwordField');
            const errorMsg = document.getElementById('passwordError');
            const enteredPwd = passwordField.value;
            
            console.log('Checking password...');
            
            if (enteredPwd === CONFIG.password) {
                console.log('Password correct, redirecting to', deviceType);
                // Clear any existing data on fresh login
                localStorage.removeItem('familyDB');
                
                // Navigate to appropriate dashboard
                const dashboard = deviceType === 'pc' ? '1-dashboard-pc.html' : '6-dashboard-mobile.html';
                window.location.href = dashboard;
            } else {
                console.log('Password incorrect');
                // Show error message
                errorMsg.style.display = 'block';
                passwordField.value = '';
                passwordField.focus();
                
                // Hide error after 3 seconds
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
