<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Rizvi Family · Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .login-container {
            background: white;
            padding: 20px 20px 15px 20px;
            border-radius: 20px;
            border: 3px solid var(--gold);
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .family-seal {
            font-size: 42px;
            margin-bottom: 5px;
            color: var(--gold);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--dark-blue);
            font-size: 26px;
            margin-bottom: 2px;
        }

        .subtitle {
            color: var(--maroon);
            font-size: 12px;
            margin-bottom: 12px;
            font-style: italic;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 5px;
            text-align: left;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 12px;
        }

        .selector-btn {
            padding: 10px 5px;
            border: 2px solid var(--gold);
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
        }

        .selector-btn.active {
            background: var(--gold);
            color: var(--dark-blue);
            border-color: var(--dark-blue);
        }

        .selector-btn:active {
            transform: scale(0.98);
            background: #faebcd;
        }

        .password-wrapper {
            position: relative;
            margin: 8px 0 10px 0;
        }

        .password-wrapper input {
            width: 100%;
            padding: 12px 70px 12px 12px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            font-family: 'Inter', sans-serif;
            -webkit-appearance: none;
            appearance: none;
        }

        .password-wrapper input:focus {
            border-color: var(--maroon);
            box-shadow: 0 0 0 2px rgba(90, 0, 0, 0.1);
        }

        .toggle-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--maroon);
            font-weight: bold;
            font-size: 13px;
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            user-select: none;
            border: 1px solid #ddd;
        }

        .unlock-btn {
            background: var(--maroon);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: all 0.2s;
            margin: 5px 0 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            -webkit-appearance: none;
            appearance: none;
            min-height: 48px;
        }

        .unlock-btn:active {
            background: #7a1f1f;
            transform: scale(0.98);
        }

        .error-msg {
            color: var(--maroon);
            margin-top: 8px;
            display: none;
            font-size: 13px;
            font-weight: 600;
            padding: 6px;
            background: #ffe6e6;
            border-radius: 4px;
        }

        .footer-note {
            margin-top: 8px;
            font-size: 11px;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 8px;
            line-height: 1.3;
        }

        .footer-note p {
            margin: 2px 0;
        }

        .footer-note strong {
            color: var(--dark-blue);
        }

        .blinking-text {
            color: var(--maroon);
            animation: blink 1.5s infinite;
            font-weight: 600;
            font-size: 10px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="family-seal">🌿</div>
        <h1>Rizvi Family Tree</h1>
        <div class="subtitle">Honoring our past, preserving our future</div>
        
        <!-- LANGUAGE SELECTION -->
        <div class="section-label">SELECT LANGUAGE</div>
        <div class="btn-group">
            <button class="selector-btn" id="englishBtn">
                <span>🇬🇧</span> English
            </button>
            <button class="selector-btn active" id="urduBtn">
                <span>🇵🇰</span> Urdu
            </button>
        </div>

        <!-- DEVICE SELECTION -->
        <div class="section-label">SELECT DEVICE</div>
        <div class="btn-group">
            <button class="selector-btn" id="desktopBtn">
                <span>💻</span> Desktop
            </button>
            <button class="selector-btn active" id="mobileBtn">
                <span>📱</span> Mobile
            </button>
        </div>
        
        <!-- PASSWORD FIELD -->
        <div class="password-wrapper">
            <input type="password" id="passwordField" placeholder="Enter Secure Password" autofocus>
            <span class="toggle-btn" id="toggleBtn">Show</span>
        </div>

        <!-- UNLOCK BUTTON -->
        <button class="unlock-btn" id="unlockBtn">
            <span>🔓</span> Unlock Dashboard
        </button>
        
        <!-- ERROR MESSAGE -->
        <div id="passwordError" class="error-msg">
            ❌ Access Denied. Please verify the password.
        </div>

        <!-- FOOTER -->
        <div class="footer-note">
            <p>Designed & Developed by:</p>
            <p><strong>Imran Haider</strong> S/o Syed Risalat Hussain Rizvi</p>
            <p><span style="color: var(--gold);">📞</span> 0332-787-6010</p>
            <p class="blinking-text">⚠️ Private family access only ⚠️</p>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = { password: 'sihr110' };
        
        // Default selections
        let language = 'urdu';      // Urdu selected by default
        let device = 'mobile';       // Mobile selected by default

        // DOM ready
        document.addEventListener('DOMContentLoaded', function() {
            // Elements
            const englishBtn = document.getElementById('englishBtn');
            const urduBtn = document.getElementById('urduBtn');
            const desktopBtn = document.getElementById('desktopBtn');
            const mobileBtn = document.getElementById('mobileBtn');
            const toggleBtn = document.getElementById('toggleBtn');
            const unlockBtn = document.getElementById('unlockBtn');
            const passwordField = document.getElementById('passwordField');
            const errorMsg = document.getElementById('passwordError');

            // --- Language selection ---
            englishBtn.addEventListener('click', function(e) {
                e.preventDefault();
                language = 'english';
                englishBtn.classList.add('active');
                urduBtn.classList.remove('active');
            });

            urduBtn.addEventListener('click', function(e) {
                e.preventDefault();
                language = 'urdu';
                urduBtn.classList.add('active');
                englishBtn.classList.remove('active');
            });

            // --- Device selection ---
            desktopBtn.addEventListener('click', function(e) {
                e.preventDefault();
                device = 'pc';
                desktopBtn.classList.add('active');
                mobileBtn.classList.remove('active');
            });

            mobileBtn.addEventListener('click', function(e) {
                e.preventDefault();
                device = 'mobile';
                mobileBtn.classList.add('active');
                desktopBtn.classList.remove('active');
            });

            // Toggle password visibility
            toggleBtn.addEventListener('click', function(e) {
                e.preventDefault();
                const type = passwordField.type === 'password' ? 'text' : 'password';
                passwordField.type = type;
                toggleBtn.textContent = type === 'password' ? 'Show' : 'Hide';
            });

            // Unlock button click
            unlockBtn.addEventListener('click', function(e) {
                e.preventDefault();
                checkPassword();
            });

            // Enter key in password field
            passwordField.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    checkPassword();
                }
            });

            // Clear error when typing
            passwordField.addEventListener('input', function() {
                errorMsg.style.display = 'none';
            });

            // Initial focus
            passwordField.focus();
        });

        // Password check and redirect
        function checkPassword() {
            const passwordField = document.getElementById('passwordField');
            const errorMsg = document.getElementById('passwordError');
            const enteredPwd = passwordField.value;
            
            if (enteredPwd === CONFIG.password) {
                // Clear any leftover data
                localStorage.removeItem('familyDB');
                
                // Redirect based on language and device
                let dashboard;
                if (language === 'english') {
                    dashboard = `1-dashboard.html?device=${device}`;
                } else {
                    dashboard = `11-dashboard.html?device=${device}`;
                }
                
                window.location.href = dashboard;
            } else {
                errorMsg.style.display = 'block';
                passwordField.value = '';
                passwordField.focus();
                
                // Auto-hide error after 3 seconds
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
