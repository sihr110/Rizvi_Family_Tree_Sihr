<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rizvi Family · Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .password-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid var(--gold);
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--dark-blue);
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: var(--maroon);
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .device-selector {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .device-btn {
            padding: 10px 20px;
            border: 2px solid var(--gold);
            background: white;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .device-btn:hover {
            background: #faebcd;
        }

        .device-btn.active {
            background: var(--gold);
            color: var(--dark-blue);
            border-color: var(--dark-blue);
        }

        .password-wrapper {
            position: relative;
            margin: 20px 0;
        }

        .password-wrapper input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid var(--gold);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .password-wrapper input:focus {
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px rgba(90, 0, 0, 0.1);
        }

        .toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--maroon);
            font-weight: bold;
            font-size: 14px;
            background: white;
            padding: 2px 8px;
            border-radius: 4px;
            user-select: none;
        }

        .toggle-btn:hover {
            background: #f0f0f0;
        }

        .unlock-btn {
            background: var(--maroon);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: all 0.2s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .unlock-btn:hover {
            background: #7a1f1f;
            transform: translateY(-2px);
        }

        .error-msg {
            color: var(--maroon);
            margin-top: 15px;
            display: none;
            font-size: 14px;
            font-weight: 600;
            padding: 8px;
            background: #ffe6e6;
            border-radius: 4px;
        }

        .footer-note {
            margin-top: 25px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }

        .footer-note p {
            margin: 5px 0;
        }

        .footer-note strong {
            color: var(--dark-blue);
        }

        .blinking-text {
            color: var(--maroon);
            animation: blink 1.5s infinite;
            font-weight: 600;
            margin-top: 10px;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .family-seal {
            font-size: 48px;
            margin-bottom: 10px;
            color: var(--gold);
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="family-seal">🌿</div>
        <h1>Rizvi Family Tree</h1>
        <div class="subtitle">Honoring our past, preserving our future</div>
        
        <div class="device-selector">
            <button class="device-btn active" onclick="setDevice('pc')">
                <span>💻</span> Desktop
            </button>
            <button class="device-btn" onclick="setDevice('mobile')">
                <span>📱</span> Mobile
            </button>
        </div>
        
        <div class="password-wrapper">
            <input type="password" id="passwordField" placeholder="Enter Secure Password" autofocus>
            <span class="toggle-btn" onclick="togglePassword()">Show</span>
        </div>

        <button onclick="checkPassword()" class="unlock-btn">
            <span>🔓</span> Unlock Dashboard
        </button>
        <div id="passwordError" class="error-msg">
            ❌ Access Denied. Please verify the password.
        </div>

        <div class="footer-note">
            <p>Designed & Developed by:</p>
            <p><strong>Imran Haider</strong></p>
            <p>S/o Syed Risalat Hussain Rizvi</p>
            <p><span style="color: var(--gold);">📞</span> 0332-787-6010</p>
            <p class="blinking-text">⚠️ Private family access only ⚠️</p>
        </div>
    </div>

    <script>
        const CONFIG = { password: 'sihr110' };
        let deviceType = 'pc';

        function setDevice(type) {
            deviceType = type;
            document.querySelectorAll('.device-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function togglePassword() {
            const pwd = document.getElementById('passwordField');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            document.querySelector('.toggle-btn').textContent = pwd.type === 'password' ? 'Show' : 'Hide';
        }

        function checkPassword() {
            const enteredPwd = document.getElementById('passwordField').value;
            
            if (enteredPwd === CONFIG.password) {
                // CRITICAL FIX: Clear any existing data on fresh login
                localStorage.removeItem('familyDB');
                
                // Navigate to appropriate dashboard
                const dashboard = deviceType === 'pc' ? '1-dashboard-pc.html' : '6-dashboard-mobile.html';
                window.location.href = dashboard;
            } else {
                // Show error message
                document.getElementById('passwordError').style.display = 'block';
                document.getElementById('passwordField').value = '';
                document.getElementById('passwordField').focus();
                
                // Hide error after 3 seconds
                setTimeout(() => {
                    document.getElementById('passwordError').style.display = 'none';
                }, 3000);
            }
        }

        // Allow Enter key to submit
        document.getElementById('passwordField').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // Clear error when user starts typing
        document.getElementById('passwordField').addEventListener('input', function() {
            document.getElementById('passwordError').style.display = 'none';
        });

        // Focus on password field when page loads
        window.addEventListener('load', function() {
            document.getElementById('passwordField').focus();
        });
    </script>
</body>
</html>
