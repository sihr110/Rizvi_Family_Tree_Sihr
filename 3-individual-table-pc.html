<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rizvi Family · Table View</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        /* ========== CSS STYLES ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #d4edda;
            --pink-bg: #fff0f5;
            --light-pink: #ffe4e9;
            --dark-pink: #fb7185;
            --light-sage: #f4f7f2;
            --border-sage: #c9d6c2;
            --sisters-border: #fb7185;
            --summary-border: #e6c87c;
            --table-header-bg: #fdf6e3;
            --bronze: #bc8c4f;
            --reset-red: #5a0000;
            --reset-red-dark: #7a1f1f;
            --pdf-grey: #6c757d;
            --pdf-grey-dark: #5a6268;
            --dashboard-green: #1b5e20;
            --sisters-box-bg: #fff0f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            position: relative;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 6px 14px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            border: 2px solid var(--gold);
            background: transparent;
            color: var(--gold);
            transition: all 0.2s;
            border-radius: 4px;
        }

        .header-btn:hover {
            background: var(--gold);
            color: var(--dark-blue);
            transform: translateY(-2px);
        }

        .header-btn.dashboard {
            background: var(--dashboard-green);
            color: white;
            border-color: transparent;
            border-radius: 4px;
        }

        .header-btn.dashboard:hover {
            background: #2e7d32;
        }

        .header-btn.reset {
            background: var(--reset-red);
            color: white;
            border-color: transparent;
            border-radius: 4px;
        }

        .header-btn.reset:hover {
            background: var(--reset-red-dark);
        }

        .header-btn.pdf {
            background: var(--pdf-grey);
            color: white;
            border-color: transparent;
            border-radius: 4px;
        }

        .header-btn.pdf:hover {
            background: var(--pdf-grey-dark);
        }

        .header-btn.tree {
            background: var(--green);
            color: white;
            border-color: transparent;
            border-radius: 4px;
        }

        .header-btn.tree:hover {
            background: #2e7d32;
        }

        .menu-toggle {
            display: none;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #fffcf8;
        }

        #individualSection {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
            flex: 1;
        }

        .fixed-header-section {
            padding: 15px 15px 0 15px;
            background: #fffcf8;
            flex-shrink: 0;
        }

        .border-line {
            border-top: 3px solid var(--gold);
            margin: 20px 0 0 0;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: auto;
            padding: 0 15px 15px 15px;
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-label {
            font-weight: 700;
            color: var(--maroon);
            font-size: 13px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .search-wrapper {
            position: relative;
            flex: 2;
            min-width: 300px;
        }

        .search-input {
            width: 100%;
            padding: 8px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 4px;
            font-size: 13px;
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 0 0 4px 4px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .result-item {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
        }

        .result-item:hover {
            background: #faebcd;
        }

        .result-item .main-name {
            font-weight: 700;
            color: var(--dark-blue);
        }

        .result-item .gen {
            color: var(--maroon);
            font-size: 11px;
            margin-left: 6px;
        }

        .filter-buttons {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border: 2px solid var(--gold);
            background: white;
            color: var(--dark-blue);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .filter-btn.active {
            background: #d4edda;
            border-color: var(--dark-green);
        }

        .table-container {
            overflow-x: auto;
            background: white;
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 15px;
            margin: 0 auto;
            width: fit-content;
            max-width: 100%;
        }

        .lineage-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 400px;
            font-size: 13px;
            margin: 0 auto;
        }

        .lineage-table th {
            background: #fdf6e3;
            padding: 10px;
            border-bottom: 2px solid var(--gold);
            text-align: center;
            font-weight: 700;
            color: var(--maroon);
        }

        .lineage-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #f0e5ce;
            text-align: left;
        }

        .lineage-table td:first-child {
            text-align: center;
            width: 60px;
        }

        .lineage-table td:nth-child(2) {
            text-align: left;
        }

        .lineage-table td:last-child {
            text-align: center;
            width: 100px;
        }

        .lineage-table tr:hover td {
            background: #faebcd !important;
            cursor: pointer;
        }

        .lineage-table .section-header {
            background: var(--light-sage);
            font-weight: 700;
            color: var(--maroon);
            border-top: 2px solid var(--gold);
            border-bottom: 1px solid var(--gold);
        }

        .lineage-table .section-header td {
            background: var(--light-sage);
            padding: 8px 15px;
            text-align: left;
            font-weight: 700;
        }

        .lineage-table .current-member td {
            background: #e8f5e9;
            font-weight: 700;
            border: 2px solid var(--dark-green);
        }

        .lineage-table .female-row td {
            background-color: var(--light-pink) !important;
        }

        .lineage-table .female-row:hover td {
            background-color: #ffd6dc !important;
        }

        .hidden {
            display: none !important;
        }

        .app-footer {
            background: var(--dark-blue);
            color: var(--gold);
            text-align: center;
            padding: 8px;
            font-size: 11px;
            border-top: 2px solid var(--gold);
        }

        .toggle-view-btn {
            position: fixed; bottom: 20px; left: 20px; z-index: 9999;
            background: #5a0000; color: white; border: 2px solid #d4af37;
            border-radius: 50px; padding: 10px 20px; font-size: 14px;
            font-weight: bold; cursor: pointer; display: flex; align-items: center;
            gap: 8px; opacity: 0.8;
        }
        .toggle-view-btn:hover {
            opacity: 1;
        }
        body.canvas-only .app-header,
        body.canvas-only .app-footer,
        body.canvas-only .fixed-header-section,
        body.canvas-only .filter-buttons,
        body.canvas-only .search-row,
        body.canvas-only .border-line,
        body.canvas-only .toggle-view-btn {
            display: none !important;
        }
        body.canvas-only .main-content {
            height: 100vh;
        }

        /* Mobile styles */
        @media screen and (max-width: 768px) {
            body {
                overflow: auto;
                -webkit-overflow-scrolling: touch;
                height: auto;
                min-height: 100vh;
                padding: 5px;
            }
            
            .app-container {
                height: auto;
                min-height: calc(100vh - 10px);
                border-radius: 16px;
            }
            
            .app-header {
                position: relative;
                padding: 10px 15px;
            }
            
            .header-title {
                font-size: 18px;
                width: calc(100% - 50px);
            }
            
            .menu-toggle {
                display: flex !important;
                position: absolute;
                top: 50%;
                right: 15px;
                transform: translateY(-50%);
                background: var(--gold);
                color: black;
                border: none;
                border-radius: 50%;
                width: 44px;
                height: 44px;
                font-size: 26px;
                font-weight: bold;
                cursor: pointer;
                z-index: 2000;
                align-items: center;
                justify-content: center;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            }
            
            .fixed-header-section {
                transition: max-height 0.3s ease;
                overflow: hidden;
                max-height: 500px;
                padding: 15px 15px 10px 15px;
            }
            
            .fixed-header-section.collapsed {
                max-height: 0;
                padding-top: 0;
                padding-bottom: 0;
                margin: 0;
            }
            
            .search-row {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
            }
            
            .search-wrapper {
                min-width: 100%;
            }
            
            .search-input {
                font-size: 16px;
                padding: 12px 15px;
                height: 48px;
            }
            
            .filter-buttons {
                width: 100%;
                justify-content: space-between;
                gap: 8px;
            }
            
            .filter-btn {
                flex: 1;
                padding: 10px 5px;
                font-size: 12px;
                justify-content: center;
                height: 44px;
            }
            
            .header-actions {
                width: 100%;
                justify-content: space-between;
                gap: 5px;
            }
            
            .header-btn {
                flex: 1;
                padding: 10px 5px;
                font-size: 11px;
                justify-content: center;
                height: 44px;
            }
            
            .toggle-view-btn {
                bottom: 15px;
                left: 15px;
                padding: 10px 18px;
                font-size: 14px;
                height: 48px;
            }
            
            .table-container {
                width: 100%;
                padding: 10px;
            }
            
            .lineage-table {
                min-width: 300px;
            }
            
            .lineage-table th,
            .lineage-table td {
                padding: 6px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌿</span>
                <span id="mainTitle">Rizvi Family - Table View</span>
            </div>
            <button class="menu-toggle" id="mobileMenuToggle">☰</button>
            <div class="header-actions" id="headerActions"></div>
        </div>

        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">

        <div class="main-content" id="mainContent">
            <div id="individualSection">
                <div class="fixed-header-section">
                    <div class="search-row">
                        <span class="search-label">SEARCH MEMBER</span>
                        <div class="search-wrapper">
                            <input type="text" id="individualSearch" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value)" autocomplete="off">
                            <div id="individualDropdown" class="dropdown"></div>
                        </div>
                        <div class="filter-buttons">
                            <div id="filterSiblings" class="filter-btn active" onclick="toggleFilter('siblings')">👥 Siblings</div>
                            <div id="filterDescendants" class="filter-btn active" onclick="toggleFilter('descendants')">👶 Descendants</div>
                            <div id="filterAncestors" class="filter-btn" onclick="toggleFilter('ancestors')">🌳 Ancestors</div>
                        </div>
                    </div>
                    <div class="border-line"></div>
                </div>
                <div class="scrollable-content">
                    <div id="individualTable" class="table-container"></div>
                </div>
            </div>
        </div>

        <div class="app-footer">
            Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010
        </div>
    </div>

    <div class="toggle-view-btn" id="toggleViewBtn" onclick="toggleCanvasView()">
        <span>👁️</span> <span>Full Screen</span>
    </div>

    <script>
        // ======================================================================
        // ========================== GLOBAL VARIABLES ==========================
        // ======================================================================
        let db = [];
        let currentMember = null;
        let showSiblings = true;
        let showDescendants = true;
        let showAncestors = false;
        let LOAD_STAMP = '';

        // ======================================================================
        // ========================== HELPER FUNCTIONS ==========================
        // ======================================================================
        function displayName(str) {
            return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
        }

        function formatCurrentTime() {
            const d = new Date();
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
        }

        function getGenNum(gen) {
            const match = String(gen).match(/\d+/);
            return match ? parseInt(match[0]) : 0;
        }

        // ======================================================================
        // ========================== VIEW TOGGLE ===============================
        // ======================================================================
        function switchToTreeView() {
            // Save current member to localStorage for the tree view to load
            if (currentMember) {
                localStorage.setItem('tableViewMember', JSON.stringify(currentMember));
                localStorage.setItem('tableViewFilters', JSON.stringify({
                    showSiblings: showSiblings,
                    showDescendants: showDescendants,
                    showAncestors: showAncestors
                }));
            }
            // Navigate to tree view file
            window.location.href = '2-individual-tree-pc.html';
        }

        function updateHeaderButtons() {
            const headerActions = document.getElementById('headerActions');
            headerActions.innerHTML = `
                <div class="header-btn tree" onclick="switchToTreeView()">🌲 Switch to Tree</div>
                <div class="header-btn reset" onclick="resetSearch()">🔄 Reset</div>
                <div class="header-btn pdf" onclick="exportTablePDF()">📑 Save PDF</div>
                <div class="header-btn dashboard" onclick="showDashboard()">🏠 Dashboard</div>
            `;
        }

        function showDashboard() {
            window.location.href = '1-dashboard-pc.html';
        }

        // ======================================================================
        // ========================== FILTER TOGGLE =============================
        // ======================================================================
        function toggleFilter(filter) {
            if (!currentMember) return;
            
            if (filter === 'siblings') {
                showSiblings = !showSiblings;
                document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
            } else if (filter === 'descendants') {
                showDescendants = !showDescendants;
                document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
            } else if (filter === 'ancestors') {
                showAncestors = !showAncestors;
                document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
            }
            
            renderTable();
        }

        // ======================================================================
        // ========================== DATA LOADING ==============================
        // ======================================================================
        // Load from localStorage automatically
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
            LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
        }

        // Hidden file input for updates
        document.getElementById('fileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const wb = XLSX.read(data, { type: 'array' });
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                    
                    db = rows.map(r => ({
                        name: String(r.Name || r.name || '').trim(),
                        father: String(r.Father || r.father || '').trim(),
                        gen: String(r.Gen || r.gen || '').trim(),
                        gender: String(r.Gender || r.gender || 'M').trim().toUpperCase()
                    })).filter(p => p.name);

                    LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
                    localStorage.setItem('familyDB', JSON.stringify(db));
                    
                    alert(`✅ Loaded ${db.length} members`);
                    
                    // Re-render if a member is selected
                    if (currentMember) {
                        // Find updated member data
                        const updated = db.find(m => m.name === currentMember.name);
                        if (updated) {
                            currentMember = updated;
                            renderTable();
                        }
                    }
                } catch (err) {
                    alert('❌ Error: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        };

        // ======================================================================
        // ========================== SEARCH FUNCTIONS ==========================
        // ======================================================================
        function findParent(member) {
            if (!member || !member.father) return null;
            return db.find(x => x.name.toLowerCase() === member.father.toLowerCase());
        }

        function getAncestryChain(member) {
            if (!member) return [];
            let chain = [], cur = member, visited = new Set();
            while (cur && !visited.has(cur.name.toLowerCase())) {
                chain.push(cur);
                visited.add(cur.name.toLowerCase());
                cur = findParent(cur);
            }
            return chain;
        }

        function getDescendants(member) {
            if (!member) return [];
            return db.filter(x => x.father && x.father.toLowerCase() === member.name.toLowerCase());
        }

        function getSiblings(member) {
            if (!member || !member.father) return [];
            return db.filter(x => x.father && x.father.toLowerCase() === member.father.toLowerCase() && x.name !== member.name);
        }

        function searchMember(query) {
            const drop = document.getElementById('individualDropdown');
            drop.innerHTML = '';
            
            if (!query || query.length < 1) {
                drop.style.display = 'none';
                return;
            }
            
            const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
            if (found.length === 0) {
                drop.style.display = 'none';
                return;
            }
            
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div><span class="main-name">${displayName(p.name)}</span> <span class="gen">(${p.gen})</span></div>
                    <div style="font-size:11px;">${p.gender?.startsWith('F') ? 'D/o' : 'S/o'} ${displayName(p.father)}</div>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('individualSearch').value = displayName(p.name) + ' (' + p.gen + ')';
                    currentMember = p;
                    renderTable();
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            
            drop.style.display = 'block';
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
            }
        });

        function handleRowClick(member) {
            currentMember = member;
            document.getElementById('individualSearch').value = displayName(member.name) + ' (' + member.gen + ')';
            renderTable();
        }

        // ======================================================================
        // ========================== TABLE RENDERING ===========================
        // ======================================================================
        function renderTable() {
            if (!currentMember) {
                document.getElementById('individualTable').innerHTML = '<div style="text-align:center; color:#999; padding:60px;">Select a member to view</div>';
                return;
            }
            
            let html = '<table class="lineage-table">';
            
            // Header - only Sno, Name, Generation
            html += '<tr><th>Sno</th><th>Name</th><th>Generation</th></tr>';
            
            // Current member (highlighted)
            const isCurrentFemale = currentMember.gender?.startsWith('F');
            const currentRowClass = isCurrentFemale ? 'current-member female-row' : 'current-member';
            
            html += `<tr class="${currentRowClass}" onclick='handleRowClick(${JSON.stringify(currentMember).replace(/'/g, "\\'")})' style="cursor: pointer;">`;
            html += `<td>1</td>`;
            html += `<td><strong>${displayName(currentMember.name)}</strong> (Selected)</td>`;
            html += `<td><strong>${currentMember.gen}</strong></td>`;
            html += `</tr>`;
            
            // Ancestors if enabled
            if (showAncestors) {
                const ancestors = getAncestryChain(currentMember).slice(1);
                if (ancestors.length > 0) {
                    html += `<tr class="section-header"><td colspan="3">🔺 ANCESTORS (${ancestors.length})</td></tr>`;
                    let sno = 1;
                    ancestors.forEach(a => {
                        const isFemale = a.gender?.startsWith('F');
                        const rowClass = isFemale ? 'female-row' : '';
                        html += `<tr class="${rowClass}" onclick='handleRowClick(${JSON.stringify(a).replace(/'/g, "\\'")})' style="cursor: pointer;">`;
                        html += `<td>${sno++}</td>`;
                        html += `<td>${displayName(a.name)}</td>`;
                        html += `<td>${a.gen}</td>`;
                        html += `</tr>`;
                    });
                }
            }
            
            // Siblings if enabled
            if (showSiblings) {
                const siblings = getSiblings(currentMember);
                if (siblings.length > 0) {
                    const father = findParent(currentMember);
                    const fatherName = father ? displayName(father.name) : 'Unknown';
                    html += `<tr class="section-header"><td colspan="3">👥 SIBLINGS (${siblings.length}) - Children of ${fatherName}</td></tr>`;
                    let sno = 1;
                    siblings.forEach(s => {
                        const isFemale = s.gender?.startsWith('F');
                        const rowClass = isFemale ? 'female-row' : '';
                        html += `<tr class="${rowClass}" onclick='handleRowClick(${JSON.stringify(s).replace(/'/g, "\\'")})' style="cursor: pointer;">`;
                        html += `<td>${sno++}</td>`;
                        html += `<td>${displayName(s.name)}</td>`;
                        html += `<td>${s.gen}</td>`;
                        html += `</tr>`;
                    });
                }
            }
            
            // Descendants if enabled
            if (showDescendants) {
                const descendants = getDescendants(currentMember);
                if (descendants.length > 0) {
                    html += `<tr class="section-header"><td colspan="3">👶 DESCENDANTS (${descendants.length}) - Children of ${displayName(currentMember.name)}</td></tr>`;
                    let sno = 1;
                    descendants.forEach(d => {
                        const isFemale = d.gender?.startsWith('F');
                        const rowClass = isFemale ? 'female-row' : '';
                        html += `<tr class="${rowClass}" onclick='handleRowClick(${JSON.stringify(d).replace(/'/g, "\\'")})' style="cursor: pointer;">`;
                        html += `<td>${sno++}</td>`;
                        html += `<td>${displayName(d.name)}</td>`;
                        html += `<td>${d.gen}</td>`;
                        html += `</tr>`;
                    });
                }
            }
            
            html += '</table>';
            document.getElementById('individualTable').innerHTML = html;
        }

        // ======================================================================
        // ========================== RESET FUNCTION ============================
        // ======================================================================
        function resetSearch() {
            document.getElementById('individualSearch').value = '';
            currentMember = null;
            document.getElementById('individualTable').innerHTML = '<div style="text-align:center; color:#999; padding:60px;">Select a member to view</div>';
            document.getElementById('individualDropdown').style.display = 'none';
        }

        // ======================================================================
        // ========================== PDF EXPORT ================================
        // ======================================================================
        async function exportTablePDF() {
            if (!currentMember) {
                alert('Please select a member first');
                return;
            }
            
            const content = document.getElementById('individualTable');
            if (!content || content.innerHTML.trim() === '' || content.innerHTML.includes('Select a member')) {
                return alert('No content to export');
            }
            
            try {
                const header = document.createElement('div');
                header.style.marginBottom = '30px';
                header.style.textAlign = 'center';
                header.innerHTML = `
                    <h1 style="color: #d4af37; font-size: 36px; font-family: 'Playfair Display', serif; margin: 0 0 10px 0;">Rizvi Family - Table View</h1>
                    <h2 style="color: #5a0000; font-size: 24px; font-family: 'Playfair Display', serif; margin: 0;">${displayName(currentMember.name)}</h2>
                `;
                
                const footer = document.createElement('div');
                footer.style.marginTop = '40px';
                footer.style.padding = '15px 20px';
                footer.style.border = '2px solid #d4af37';
                footer.style.borderRadius = '4px';
                footer.style.background = '#0f172a';
                footer.style.color = '#d4af37';
                footer.style.display = 'flex';
                footer.style.justifyContent = 'space-between';
                footer.style.alignItems = 'center';
                footer.style.fontSize = '11px';
                
                const timeStr = formatCurrentTime();
                footer.innerHTML = `
                    <span>${LOAD_STAMP || 'Last data updated on: Unknown'}</span>
                    <span style="font-weight: 500;">PDF generated: ${timeStr}</span>
                `;
                
                const signature = document.createElement('div');
                signature.style.marginTop = '20px';
                signature.style.paddingTop = '15px';
                signature.style.borderTop = '1px solid #ddd';
                signature.style.textAlign = 'center';
                signature.style.color = '#000';
                signature.style.fontSize = '12px';
                signature.style.fontWeight = '500';
                signature.textContent = 'Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010';
                
                content.insertBefore(header, content.firstChild);
                content.appendChild(footer);
                content.appendChild(signature);
                
                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed';
                loadingMsg.style.top = '50%';
                loadingMsg.style.left = '50%';
                loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000';
                loadingMsg.style.color = 'white';
                loadingMsg.style.padding = '20px 40px';
                loadingMsg.style.borderRadius = '8px';
                loadingMsg.style.zIndex = '9999';
                loadingMsg.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
                loadingMsg.textContent = '📄 Preparing PDF... please wait';
                document.body.appendChild(loadingMsg);
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const canvas = await html2canvas(content, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    logging: false,
                    allowTaint: true,
                    useCORS: true
                });
                
                content.removeChild(header);
                content.removeChild(footer);
                content.removeChild(signature);
                document.body.removeChild(loadingMsg);
                
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                
                const w = canvas.width / 2 * 0.264583;
                const h = canvas.height / 2 * 0.264583;
                
                const pdf = new jsPDF({
                    orientation: w > h ? 'l' : 'p',
                    unit: 'mm',
                    format: [w + 40, h + 40]
                });
                
                pdf.addImage(imgData, 'PNG', 20, 20, w, h);
                
                const safeName = displayName(currentMember.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                pdf.save(`table_${safeName}_${new Date().getTime()}.pdf`);
                
            } catch (err) {
                console.error('PDF Error:', err);
                alert('❌ PDF generation failed: ' + err.message);
            }
        }

        // ======================================================================
        // ========================== TOGGLE CANVAS VIEW ========================
        // ======================================================================
        function toggleCanvasView() {
            document.body.classList.toggle('canvas-only');
            const btn = document.getElementById('toggleViewBtn');
            if (document.body.classList.contains('canvas-only')) {
                btn.innerHTML = '<span>🔍</span> <span>Exit</span>';
            } else {
                btn.innerHTML = '<span>👁️</span> <span>Full Screen</span>';
            }
        }

        // ======================================================================
        // ========================== INITIALIZATION ============================
        // ======================================================================
        document.addEventListener('DOMContentLoaded', function() {
            // Mobile menu toggle
            const menuToggle = document.getElementById('mobileMenuToggle');
            const topSection = document.querySelector('.fixed-header-section');
            
            if (menuToggle && topSection) {
                menuToggle.addEventListener('click', function() {
                    topSection.classList.toggle('collapsed');
                });
            }
            
            // Set initial filter states
            document.getElementById('filterSiblings').classList.add('active');
            document.getElementById('filterDescendants').classList.add('active');
            document.getElementById('filterAncestors').classList.remove('active');
            
            // Check if coming from tree view with a member
            const treeMember = localStorage.getItem('tableViewMember');
            if (treeMember) {
                currentMember = JSON.parse(treeMember);
                document.getElementById('individualSearch').value = displayName(currentMember.name) + ' (' + currentMember.gen + ')';
                localStorage.removeItem('tableViewMember'); // Clear it
                
                // Also restore filters if available
                const savedFilters = localStorage.getItem('tableViewFilters');
                if (savedFilters) {
                    const filters = JSON.parse(savedFilters);
                    showSiblings = filters.showSiblings;
                    showDescendants = filters.showDescendants;
                    showAncestors = filters.showAncestors;
                    
                    // Update UI to match
                    document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
                    document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
                    document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
                    
                    localStorage.removeItem('tableViewFilters');
                }
            }
            
            // Set up header buttons
            updateHeaderButtons();
            
            // Render table if member exists
            if (currentMember) {
                renderTable();
            } else {
                document.getElementById('individualTable').innerHTML = '<div style="text-align:center; color:#999; padding:60px;">Select a member to view</div>';
            }
        });
    </script>
</body>
