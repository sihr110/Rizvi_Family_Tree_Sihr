<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rizvi Family · Individual Tree (Mobile - Masterpiece Layout)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --pink-bg: #fff0f5;
            --light-pink: #ffe4e9;
            --sisters-border: #fb7185;
            --border-sage: #c9d6c2;
            --light-sage: #f4f7f2;
            --dark-green: #1b5e20;
            --bronze: #bc8c4f;
            --pdf-grey: #6c757d;
            --dashboard-green: #1b5e20;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            min-height: 100vh;
            padding: 5px;
            /* MODIFIED: Ensure body allows horizontal overflow like a PC page */
            overflow-x: auto;
        }

        .app-container {
            background: white;
            min-height: calc(100vh - 10px);
            border-radius: 16px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            /* MODIFIED: Fixed minimum width to force PC-style horizontal layout on mobile */
            min-width: 1000px;
        }

        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 12px;
            border-bottom: 3px solid var(--gold);
        }

        /* MODIFIED: Combined all buttons into one masterpiece row like RFT-viewer */
        .header-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fffcf8;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border-sage);
            gap: 15px;
        }

        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 900;
            white-space: nowrap;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 8px 15px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid var(--gold);
            background: white;
            color: var(--dark-blue);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .action-btn.table { background: var(--dark-blue); color: white; border-color: transparent; }
        .action-btn.reset { background: var(--maroon); color: white; border-color: transparent; }
        .action-btn.pdf { background: var(--pdf-grey); color: white; border-color: transparent; }
        .action-btn.dashboard { background: var(--dashboard-green); color: white; border-color: transparent; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fffcf8;
        }

        /* MODIFIED: Horizontal Search Bar for PC-feel */
        .search-section {
            padding: 15px;
            background: #fffcf8;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 2px solid var(--gold);
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
        }

        .filter-buttons {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            border: 2px solid var(--gold);
            background: white;
            white-space: nowrap;
        }

        .filter-btn.active {
            background: #d4edda;
            border-color: var(--dark-green);
        }

        .scrollable-content {
            flex: 1;
            overflow: auto;
            padding: 30px;
            background: white;
        }

        /* All other rendering logic remains identical to your original file 7 */
        .tree-root-layout { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        .family-group { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .children-row { display: flex; gap: 20px; justify-content: center; }
        .box { border: 2px solid var(--gold); border-radius: 10px; background: white; min-width: 180px; text-align: center; }
        /* ... [Rest of the original File 7 Styles & Scripts] ... */
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header-toolbar">
            <div class="header-title">🌿 Rizvi Family Tree</div>
            <div class="button-group">
                <button class="action-btn dashboard" onclick="goToDashboard()">🏠 Home</button>
                <button class="action-btn table" onclick="switchToTable()">📋 Table</button>
                <button class="action-btn pdf" onclick="exportPDF()">📑 PDF</button>
                <button class="action-btn reset" onclick="resetSearch()">🔄 Reset</button>
            </div>
        </div>

        <div class="main-content">
            <div class="search-section">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" class="search-input" placeholder="Search Member..." onkeyup="searchMember(this.value)">
                    <div id="dropdown" class="dropdown"></div>
                </div>
                <div class="filter-buttons">
                    <div id="filterSiblings" class="filter-btn active" onclick="toggleFilter('siblings')">👥 Siblings</div>
                    <div id="filterDescendants" class="filter-btn active" onclick="toggleFilter('descendants')">👶 Children</div>
                    <div id="filterAncestors" class="filter-btn" onclick="toggleFilter('ancestors')">🌳 Ancestors</div>
                </div>
            </div>

            <div class="scrollable-content" id="treeView">
                </div>
        </div>
    </div>
    </body>
</html>
