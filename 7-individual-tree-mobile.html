<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover">
    <title>Rizvi family · structured tree (mobile→pc layout)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
<!-- ========================================= -->
<!-- CSS START                                 -->
<!-- ========================================= -->

    <style>
        /* ===== GLOBAL RESET & VARIABLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #d4edda;
            --pink-bg: #fff0f5;
            --light-pink: #ffe4e9;
            --light-sage: #f4f7f2;
            --border-sage: #c9d6c2;
            --sisters-border: #fb7185;
            --summary-border: #e6c87c;
            --table-header-bg: #fdf6e3;
            --bronze: #bc8c4f;
            --reset-red: #5a0000;
            --reset-red-dark: #7a1f1f;
            --pdf-grey: #6c757d;
            --pdf-grey-dark: #5a6268;
            --dashboard-green: #1b5e20;
            --sisters-box-bg: #fff0f5;
        }

        /* ----- BASE LAYOUT ----- */
        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: 100vh;
            overflow: hidden;
            margin: 0;
            padding: 10px;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: hidden;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }
        
        /* ----- HEADER SECTION ----- */
        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            position: relative;
        }
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-icon {
            background: var(--gold);
            color: var(--dark-blue);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        
        /* Top row - Reset button */
        .top-reset-btn {
            background: var(--reset-red);
            color: white;
            border: 2px solid var(--gold);
            border-radius: 4px;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .top-reset-btn:hover {
            background: var(--reset-red-dark);
            transform: translateY(-2px);
        }
        
        /* Bottom row - Three equal buttons */
        .action-buttons-row {
            display: flex;
            gap: 8px;
            width: 100%;
            padding: 10px 20px;
            background: var(--dark-blue);
            border-bottom: 2px solid var(--gold);
        }
        .action-btn {
            flex: 1;
            padding: 8px 5px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            border: 2px solid var(--gold);
            border-radius: 4px;
            transition: all 0.2s;
            min-width: 0;
            text-align: center;
        }
        .action-btn.table {
            background: var(--bronze);
            color: white;
            border-color: transparent;
        }
        .action-btn.pdf {
            background: var(--pdf-grey);
            color: white;
            border-color: transparent;
        }
        .action-btn.dashboard {
            background: var(--dashboard-green);
            color: white;
            border-color: transparent;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
        
        .menu-toggle { display: none; }
        
        /* ----- MAIN CONTENT ----- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fffcf8; }
        #individualSection { display: flex; flex-direction: column; height: 100%; overflow: hidden; flex: 1; }
        .fixed-header-section { padding: 15px 15px 0 15px; background: #fffcf8; flex-shrink: 0; }
        .border-line { border-top: 3px solid var(--gold); margin: 20px 0 0 0; }
        .scrollable-content { flex: 1; overflow-y: auto; overflow-x: auto; padding: 0 15px 15px 15px; }
        
        /* ----- SEARCH SECTION ----- */
        .search-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .search-label { font-weight: 700; color: var(--maroon); font-size: 13px; text-transform: uppercase; white-space: nowrap; }
        .search-wrapper { position: relative; flex: 2; min-width: 300px; }
        .search-input { width: 100%; padding: 8px 15px; border: 2px solid #cbd5e1; border-radius: 4px; font-size: 13px; outline: none; transition: all 0.3s; }
        .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid var(--gold); border-radius: 0 0 4px 4px; max-height: 200px; overflow-y: auto; display: none; z-index: 1000; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .result-item { padding: 8px 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .result-item:hover { background: #faebcd; }
        .result-item .main-name { font-weight: 700; color: var(--dark-blue); }
        .result-item .gen { color: var(--maroon); font-size: 11px; margin-left: 6px; }
        
        /* ----- FILTER BUTTONS ----- */
        .filter-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; border-radius: 4px; font-weight: 600; font-size: 13px; cursor: pointer; border: 2px solid var(--gold); background: white; color: var(--dark-blue); white-space: nowrap; display: flex; align-items: center; gap: 4px; }
        .filter-btn.active { background: #d4edda; border-color: var(--dark-green); }
        
        /* ----- TREE LAYOUT ----- */
        .tree-root-layout { display: flex; flex-direction: column; align-items: center; gap: 15px; width: fit-content; margin: 0 auto; padding: 15px; }
        .family-group { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        .children-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 5px; }
        .relation-label { font-size: 11px; color: var(--gold); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; background: var(--dark-blue); padding: 4px 12px; border-radius: 4px; color: white; margin: 5px 0; text-align: center; display: inline-block; width: auto; }
        .descendant-heading { font-size: 14px; color: var(--maroon); font-weight: 800; margin: 15px 0 5px 0; font-family: 'Playfair Display', serif; text-align: center; width: 100%; border-bottom: 2px solid var(--gold); padding-bottom: 5px; }
        
        /* ----- SISTERS GROUP BOX ----- */
        .sisters-group-box { border: 2px solid var(--sisters-border); border-radius: 12px; background: var(--sisters-box-bg); min-width: 300px; max-width: 380px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); padding: 12px; margin: 10px auto; }
        .sisters-group-box .sisters-header { font-size: 14px; font-weight: 800; color: var(--maroon); padding-bottom: 6px; margin-bottom: 6px; text-align: left; border-bottom: 2px solid var(--sisters-border); font-family: 'Playfair Display', serif; }
        
        /* ----- MEMBER BOX ----- */
        .box { border: 2px solid var(--gold); border-radius: 12px; background: white; min-width: 240px; max-width: 280px; text-align: center; cursor: pointer; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .box:hover { transform: translateY(-3px); }
        .box.blinking-box { animation: blinkBoxLightGreen 1.5s infinite; border-width: 4px; z-index: 10; transform: scale(1.02); }
        @keyframes blinkBoxLightGreen { 0%,100%{ border-color:#2e7d32; background:#e8f5e9; box-shadow:0 0 15px rgba(46,125,50,0.4); } 50%{ border-color:#4caf50; background:#c8e6c9; box-shadow:0 0 30px rgba(76,175,80,0.6); transform:scale(1.05); } }
        .box-header { display: flex; justify-content: space-between; padding: 6px 10px; background: #f8fafc; font-size: 10px; font-weight: 800; border-bottom: 1px solid #ddd; }
        .box-body { padding: 12px; }
        .member-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 16px; display: block; }
        .father-name { font-size: 11px; color: #64748b; margin-top: 4px; }
        .female-box { background-color: var(--light-pink) !important; border-color: #fb7185 !important; }
        .v-line { width: 3px; height: 25px; background: var(--gold); margin: 5px auto; }
        .golden-heart { position: absolute; bottom: 5px; right: 8px; color: var(--gold); font-size: 16px; }
        .hidden { display: none !important; }
        
        /* ----- FOOTER ----- */
        .app-footer { background: var(--dark-blue); color: var(--gold); text-align: center; padding: 8px; font-size: 11px; border-top: 2px solid var(--gold); }
        
        /* ----- MOBILE RESPONSIVE ----- */
        @media screen and (max-width: 768px) {
            body { overflow: auto; -webkit-overflow-scrolling: touch; height: auto; min-height: 100vh; padding: 5px; }
            .app-container { height: auto; min-height: calc(100vh - 10px); border-radius: 16px; overflow: hidden; }
            .app-header { position: relative; padding: 10px 15px; }
            .header-title { font-size: 18px; width: calc(100% - 50px); }
            .menu-toggle { display: flex !important; position: absolute; top: 50%; right: 15px; transform: translateY(-50%); background: var(--gold); color: black; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 26px; font-weight: bold; cursor: pointer; z-index: 2000; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
            
            .action-buttons-row {
                padding: 8px 10px;
                gap: 5px;
            }
            .action-btn {
                font-size: 10px;
                padding: 8px 2px;
            }
            
            .fixed-header-section { transition: max-height 0.3s ease, padding 0.3s ease, margin 0.3s ease; overflow: hidden; max-height: 500px; padding: 15px 15px 10px 15px; background: #fffcf8; }
            .fixed-header-section.collapsed { max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; border-bottom: none; }
            .search-row { flex-direction: column; align-items: stretch; gap: 12px; }
            .search-wrapper { min-width: 100%; width: 100%; }
            .search-input { width: 100%; font-size: 16px; padding: 12px 15px; height: 48px; }
            .filter-buttons { width: 100%; justify-content: space-between; gap: 8px; }
            .filter-btn { flex: 1; padding: 10px 5px; font-size: 12px; justify-content: center; height: 44px; }
            
            .box { min-width: 200px; max-width: 260px; margin: 0 auto; }
            .member-name { font-size: 18px !important; }
            .father-name { font-size: 11px; }
            .children-row { gap: 12px; }
            .sisters-group-box { min-width: 240px; max-width: 300px; width: 100%; margin: 8px auto; }
            .v-line { height: 20px; }
            .relation-label { font-size: 11px; padding: 5px 15px; }
            .scrollable-content { overflow-y: visible; -webkit-overflow-scrolling: touch; padding: 0 12px 20px 12px; }
            #individualSection { overflow-y: auto; -webkit-overflow-scrolling: touch; }
            .main-content { overflow-y: auto; -webkit-overflow-scrolling: touch; }
            .dropdown { max-height: 200px; font-size: 14px; }
            .result-item { padding: 12px 15px; }
            .app-footer { padding: 10px; font-size: 10px; }
        }
        @media screen and (max-width: 380px) {
            .box { min-width: 160px; max-width: 220px; }
            .member-name { font-size: 16px !important; }
            .filter-btn { font-size: 11px; padding: 8px 4px; }
            .action-btn { font-size: 9px; }
        }

        /* Better vertical mode handling */
        @media screen and (max-width: 480px) and (orientation: portrait) {
            .scrollable-content {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                padding: 10px 5px;
            }
            .tree-root-layout {
                min-width: 600px;
                transform: none;
                margin: 0;
                padding: 10px;
            }
            .box { min-width: 160px; }
        }

        /* Prevent pull-to-refresh */
        body {
            overscroll-behavior-y: contain;
            -webkit-overflow-scrolling: touch;
        }

        /* Ensure tree stays after scroll */
        #individualTree { min-height: 100%; }
    </style>

<!-- ========================================= -->
<!-- CSS END                                   -->
<!-- ========================================= -->

</head>
<body>
    <!-- ⑦ INDIVIDUAL TREE – MOBILE WIDE -->
    <div class="app-container">
        <!-- HEADER - TOP ROW with Reset on right -->
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌿</span> 
                <span>Rizvi family - Tree View</span>
            </div>
            <div class="top-reset-btn" onclick="resetIndividual()">🔄 Reset</div>
            <button class="menu-toggle" id="mobileMenuToggle">☰</button>
        </div>
        
        <!-- SECOND ROW - Three equal buttons -->
        <div class="action-buttons-row">
            <div class="action-btn table" onclick="switchToTableView()">📋 Show Table</div>
            <div class="action-btn pdf" onclick="exportIndividualPDF()">📑 Save PDF</div>
            <div class="action-btn dashboard" onclick="showDashboard()">🏠 Dashboard</div>
        </div>
        
        <!-- hidden file input -->
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">
        
        <!-- main area -->
        <div class="main-content" id="mainContent">
            <div id="individualSection">
                <!-- fixed header with search & filters -->
                <div class="fixed-header-section">
                    <div class="search-row">
                        <span class="search-label">SEARCH MEMBER</span>
                        <div class="search-wrapper">
                            <input type="text" id="individualSearch" class="search-input" placeholder="Type name..." onkeyup="searchIndividual(this.value)" autocomplete="off">
                            <div id="individualDropdown" class="dropdown"></div>
                        </div>
                        <div class="filter-buttons">
                            <div id="filterSiblings" class="filter-btn active" onclick="toggleFilter('siblings')">👥 Siblings</div>
                            <div id="filterDescendants" class="filter-btn active" onclick="toggleFilter('descendants')">👶 Descendants</div>
                            <div id="filterAncestors" class="filter-btn" onclick="toggleFilter('ancestors')">🌳 Ancestors</div>
                        </div>
                    </div>
                    <div class="border-line"></div>
                </div>
                <!-- scrollable tree area -->
                <div class="scrollable-content">
                    <div id="individualTree" class="tree-root-layout"></div>
                </div>
            </div>
        </div>
        <!-- footer -->
        <div class="app-footer">Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010</div>
    </div>

    <!-- hidden markers for html editing -->
    <div class="section-marker" data-section="1-header"></div>
    <div class="section-marker" data-section="2-main"></div>
    <div class="section-marker" data-section="3-search-filters"></div>
    <div class="section-marker" data-section="4-tree-container"></div>
    <div class="section-marker" data-section="5-footer"></div>

<!-- ========================================= -->
<!-- JAVASCRIPT Start                          -->
<!-- ========================================= -->

<script>
    (function(){
        // =========================================================================
        // STATE PRESERVATION - MUST RUN FIRST
        // =========================================================================
        let currentIndividual = null;
        let db = [];
        let showSiblings = true;
        let showDescendants = true;
        let showAncestors = false;
        let LOAD_STAMP = '';
        
        // Check if coming from dashboard
        const fromDashboard = sessionStorage.getItem('fromDashboard') === 'true';

        // Check if this is a page refresh (not from dashboard)
        const isPageRefresh = !document.referrer || document.referrer.includes(window.location.host);

        if (fromDashboard) {
            // Clear ALL storage when coming from dashboard
            sessionStorage.removeItem('tempIndividual');
            sessionStorage.removeItem('tempScroll');
            sessionStorage.removeItem('fromDashboard');
            currentIndividual = null;
        } else if (isPageRefresh) {
            // This is a page refresh - restore tree if available
            const tempIndividual = sessionStorage.getItem('tempIndividual');
            if (tempIndividual) {
                try {
                    currentIndividual = JSON.parse(tempIndividual);
                    // Don't remove tempIndividual yet - we'll need it after DOM loads
                } catch (e) {}
            }
        } else {
            // Normal navigation - restore if available
            const tempIndividual = sessionStorage.getItem('tempIndividual');
            if (tempIndividual) {
                try {
                    currentIndividual = JSON.parse(tempIndividual);
                    sessionStorage.removeItem('tempIndividual');
                } catch (e) {}
            }
        }

        // =========================================================================
        // UTILITIES
        // =========================================================================
        function displayName(str) {
            return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
        }

        function formatCurrentTime() {
            const d = new Date();
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
        }

        // =========================================================================
        // NAVIGATION
        // =========================================================================
        function switchToTableView() {
            if (currentIndividual) {
                localStorage.setItem('tableViewMember', JSON.stringify(currentIndividual));
                localStorage.setItem('tableViewFilters', JSON.stringify({ showSiblings, showDescendants, showAncestors }));
            }
            window.location.href = '8-individual-table-mobile.html';
        }

        function showDashboard() {
            // Set flag before going to dashboard
            sessionStorage.setItem('fromDashboard', 'true');
            // Clear all state
            sessionStorage.removeItem('tempIndividual');
            sessionStorage.removeItem('tempScroll');
            window.location.href = '6-dashboard-mobile.html';
        }

        function resetIndividual() {
            document.getElementById('individualSearch').value = '';
            currentIndividual = null;
            document.getElementById('individualTree').innerHTML = 
                '<div style="text-align:center; color:#999; padding:60px; background: var(--light-sage); border: 2px solid var(--border-sage); border-radius: 16px; margin:20px auto; max-width:500px;">' +
                '<div style="font-size:48px; margin-bottom:15px; opacity:0.5;">👤</div>' +
                '<div style="font-size:18px; font-weight:600; color:var(--maroon); margin-bottom:8px;">Select a member to view</div>' +
                '<div style="font-size:13px; color:#666;">Search and select a family member above to see their tree</div></div>';
            sessionStorage.removeItem('tempIndividual');
        }

        // =========================================================================
        // FILTER TOGGLE
        // =========================================================================
        window.toggleFilter = function(filter) {
            if (!currentIndividual) return;
            if (filter === 'siblings') { showSiblings = !showSiblings; document.getElementById('filterSiblings').classList.toggle('active', showSiblings); }
            else if (filter === 'descendants') { showDescendants = !showDescendants; document.getElementById('filterDescendants').classList.toggle('active', showDescendants); }
            else if (filter === 'ancestors') { showAncestors = !showAncestors; document.getElementById('filterAncestors').classList.toggle('active', showAncestors); }
            renderIndividualTree();
        };

        // =========================================================================
        // TREE HELPERS
        // =========================================================================
        function findParent(p) {
            if (!p || !p.father) return null;
            return db.find(x => x.name.toLowerCase() === p.father.toLowerCase());
        }

        function getAncestryChain(p) {
            if (!p) return [];
            let chain = [], cur = p, visited = new Set();
            while (cur && !visited.has(cur.name.toLowerCase())) {
                chain.push(cur);
                visited.add(cur.name.toLowerCase());
                cur = findParent(cur);
            }
            return chain;
        }

        // =========================================================================
        // SEARCH DROPDOWN
        // =========================================================================
        window.searchIndividual = function(query) {
            if (!db.length) return;
            const drop = document.getElementById('individualDropdown');
            if (!drop) return;
            drop.innerHTML = '';
            if (!query || query.length < 1) { drop.style.display = 'none'; return; }
            const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
            if (found.length === 0) { drop.style.display = 'none'; return; }
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div><span class="main-name">${displayName(p.name)}</span> <span class="gen">(${p.gen})</span></div>
                    <div style="font-size:11px;">${p.gender?.startsWith('F') ? 'D/o' : 'S/o'} ${displayName(p.father)}</div>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('individualSearch').value = displayName(p.name) + ' (' + p.gen + ')';
                    currentIndividual = p;
                    renderIndividualTree();
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            drop.style.display = 'block';
        };

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
            }
        });

        // =========================================================================
        // BOX CLICK HANDLER
        // =========================================================================
        window.handleBoxClick = function(member) {
            if (!member || !member.name) return;
            currentIndividual = member;
            document.getElementById('individualSearch').value = displayName(member.name) + ' (' + member.gen + ')';
            renderIndividualTree();
        };

        // =========================================================================
        // GROUP SISTERS - FIXED VERSION with Gen under name
        // =========================================================================


function groupSisters(sistersArray, fatherName, type) {
    if (!sistersArray || sistersArray.length === 0) return '';
    let headerText = type === 'siblings' ? 'SISTERS' : 'DAUGHTERS';
    let html = `<div class="sisters-group-box"><div class="sisters-header"># ${headerText}</div>`;
    
    // Table with two columns - Name and Gen
    html += `<table style="width:100%; border-collapse: collapse; margin: 8px 0; table-layout: fixed;">`;
    
    // Table header - center justified
    html += `<tr style="border-bottom: 2px solid var(--sisters-border);">
                <th style="text-align: center; padding: 8px 4px 4px 8px; font-size: 11px; color: var(--maroon); width: 60%;">Name</th>
                <th style="text-align: center; padding: 8px 8px 4px 4px; font-size: 11px; color: var(--maroon); width: 40%;">Gen</th>
            </tr>`;
    
    // Table rows - left aligned
    sistersArray.forEach(sister => {
        const memberData = encodeURIComponent(JSON.stringify(sister));
        html += `<tr onclick='handleBoxClick(JSON.parse(decodeURIComponent("${memberData}")))' style="cursor: pointer;">
                    <td style="text-align: left; padding: 8px 4px 8px 8px; border-bottom: 1px dashed #fecaca; font-weight: 600; transition: background 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" onmouseover="this.style.background='#faebcd'" onmouseout="this.style.background='transparent'">${displayName(sister.name)}</td>
                    <td style="text-align: left; padding: 8px 8px 8px 4px; border-bottom: 1px dashed #fecaca; color: var(--maroon); transition: background 0.2s; white-space: nowrap;" onmouseover="this.style.background='#faebcd'" onmouseout="this.style.background='transparent'">${sister.gen}</td>
                </tr>`;
    });
    
    html += `</table>`;
    
    // Father name at the bottom - left aligned
    html += `<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--sisters-border); font-size: 11px; color: #64748b; text-align: left;">
                ${sistersArray[0]?.gender?.startsWith('F') ? 'D/o' : 'S/o'}: ${displayName(fatherName)}
            </div>`;
    
    html += `</div>`;
    return html;
}


        // =========================================================================
        // RENDER TREE
        // =========================================================================
        function renderIndividualTree() {
            if (!currentIndividual) return;
            let html = '<div>';

            if (showAncestors) {
                const ancestors = getAncestryChain(currentIndividual).slice(1);
                if (ancestors.length > 0) {
                    html += '<div class="family-group">';
                    html += '<div class="relation-label">ANCESTORS</div>';
                    [...ancestors].reverse().forEach((a, idx) => {
                        const hasChildren = db.some(x => x.father && x.father.toLowerCase() === a.name.toLowerCase());
                        html += renderBox(a, idx === 0 ? 'Earliest' : 'Ancestor', false, hasChildren);
                        if (idx < ancestors.length - 1) html += '<div class="v-line"></div>';
                    });
                    html += '<div class="v-line"></div>';
                    html += '</div>';
                }
            }

            const father = findParent(currentIndividual);
            const ancestors = showAncestors ? getAncestryChain(currentIndividual).slice(1) : [];
            const fatherInAncestors = father && ancestors.some(a => a.name === father.name);

            if (father && !fatherInAncestors) {
                const fatherHasChildren = db.some(x => x.father && x.father.toLowerCase() === father.name.toLowerCase());
                html += '<div class="family-group">';
                html += renderBox(father, 'Father', false, fatherHasChildren);
                html += '<div class="v-line"></div>';
                const currentHasChildren = db.some(x => x.father && x.father.toLowerCase() === currentIndividual.name.toLowerCase());
                html += renderBox(currentIndividual, 'Selected', true, currentHasChildren);
                html += '</div>';
            } else {
                const currentHasChildren = db.some(x => x.father && x.father.toLowerCase() === currentIndividual.name.toLowerCase());
                html += '<div class="family-group">';
                html += renderBox(currentIndividual, 'Selected', true, currentHasChildren);
                html += '</div>';
            }

            if (showSiblings && father) {
                const siblings = db.filter(s => s.father && s.father.toLowerCase() === currentIndividual.father.toLowerCase() && s.name !== currentIndividual.name);
                if (siblings.length > 0) {
                    const maleSiblings = siblings.filter(s => !s.gender?.startsWith('F'));
                    const femaleSiblings = siblings.filter(s => s.gender?.startsWith('F'));
                    html += '<div class="family-group">';
                    html += `<div class="descendant-heading">DESCENDANTS OF ${displayName(father.name).toUpperCase()}</div>`;
                    html += '<div class="relation-label">SIBLINGS</div>';
                    if (maleSiblings.length > 0) {
                        html += '<div class="children-row">';
                        maleSiblings.forEach(s => {
                            const hasChildren = db.some(x => x.father && x.father.toLowerCase() === s.name.toLowerCase());
                            html += renderBox(s, 'Brother', false, hasChildren);
                        });
                        html += '</div>';
                    }
                    if (femaleSiblings.length > 0) {
                        html += groupSisters(femaleSiblings, father.name, 'siblings');
                    }
                    html += '</div>';
                }
            }

            if (showDescendants) {
                const children = db.filter(c => c.father && c.father.toLowerCase() === currentIndividual.name.toLowerCase());
                if (children.length > 0) {
                    const maleChildren = children.filter(c => !c.gender?.startsWith('F'));
                    const femaleChildren = children.filter(c => c.gender?.startsWith('F'));
                    html += '<div class="family-group">';
                    html += '<div class="v-line"></div>';
                    html += `<div class="descendant-heading">DESCENDANTS OF ${displayName(currentIndividual.name).toUpperCase()}</div>`;
                    html += '<div class="relation-label">CHILDREN</div>';
                    if (maleChildren.length > 0) {
                        html += '<div class="children-row">';
                        maleChildren.forEach(c => {
                            const hasChildren = db.some(x => x.father && x.father.toLowerCase() === c.name.toLowerCase());
                            html += renderBox(c, 'Son', false, hasChildren);
                        });
                        html += '</div>';
                    }
                    if (femaleChildren.length > 0) {
                        html += groupSisters(femaleChildren, currentIndividual.name, 'children');
                    }
                    html += '</div>';
                }
            }

            html += '</div>';
            document.getElementById('individualTree').innerHTML = html;
        }

        function renderBox(p, label, isSelected, hasChildren) {
            const isFemale = p.gender?.startsWith('F');
            const blinkClass = isSelected ? 'blinking-box' : '';
            const memberData = encodeURIComponent(JSON.stringify(p));
            
            return `<div class="box ${isFemale ? 'female-box' : ''} ${blinkClass}" onclick='handleBoxClick(JSON.parse(decodeURIComponent("${memberData}")))'>
                <div class="box-header"><span>${label}</span></div>
                <div class="box-body">
                    <span class="member-name">${displayName(p.name)}</span>
                    <span style="font-size: 11px; color: #64748b; display: block; margin: 2px 0 4px 0;">${p.gen}</span>
                    <span class="father-name">${isFemale ? 'D/o' : 'S/o'}: ${displayName(p.father)}</span>
                    ${hasChildren ? '<div class="golden-heart">❤️</div>' : ''}
                </div>
            </div>`;
        }

        // =========================================================================
        // PDF EXPORT
        // =========================================================================
        window.exportIndividualPDF = async function() {
            if (!currentIndividual) { alert('Please select a member first'); return; }
            const content = document.getElementById('individualTree');
            if (!content) return alert('No content to export');
            const treeElement = content.querySelector('.tree-root-layout') || content;
            try {
                const header = document.createElement('div');
                header.style.marginBottom = '30px'; header.style.textAlign = 'center';
                header.innerHTML = `<h1 style="color: #d4af37; font-size: 36px; font-family: 'Playfair Display', serif; margin:0 0 10px 0;">Rizvi Family Tree</h1><h2 style="color:#5a0000; font-size:24px; font-family:'Playfair Display', serif; margin:0;">${displayName(currentIndividual.name)}</h2>`;
                const footer = document.createElement('div');
                footer.style.marginTop = '40px'; footer.style.padding = '15px 20px'; footer.style.border = '2px solid #d4af37'; footer.style.borderRadius = '4px';
                footer.style.background = '#0f172a'; footer.style.color = '#d4af37'; footer.style.display = 'flex'; footer.style.justifyContent = 'space-between'; footer.style.alignItems = 'center'; footer.style.fontSize = '11px';
                const timeStr = formatCurrentTime();
                footer.innerHTML = `<span>${LOAD_STAMP || 'Last data updated on: Unknown'}</span><span style="font-weight: 500;">PDF generated: ${timeStr}</span>`;
                const signature = document.createElement('div');
                signature.style.marginTop = '20px'; signature.style.paddingTop = '15px'; signature.style.borderTop = '1px solid #ddd'; signature.style.textAlign = 'center'; signature.style.color = '#000'; signature.style.fontSize = '12px'; signature.style.fontWeight = '500';
                signature.textContent = 'Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010';

                treeElement.insertBefore(header, treeElement.firstChild);
                treeElement.appendChild(footer);
                treeElement.appendChild(signature);

                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed'; loadingMsg.style.top = '50%'; loadingMsg.style.left = '50%'; loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000'; loadingMsg.style.color = 'white'; loadingMsg.style.padding = '20px 40px'; loadingMsg.style.borderRadius = '8px'; loadingMsg.style.zIndex = '9999'; loadingMsg.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
                loadingMsg.textContent = '📄 Preparing PDF... please wait';
                document.body.appendChild(loadingMsg);
                await new Promise(resolve => setTimeout(resolve, 500));

                const canvas = await html2canvas(treeElement, { scale: 2, backgroundColor: '#ffffff', logging: false, allowTaint: true, useCORS: true });
                
                treeElement.removeChild(header); treeElement.removeChild(footer); treeElement.removeChild(signature);
                document.body.removeChild(loadingMsg);

                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const w = canvas.width / 2 * 0.264583;
                const h = canvas.height / 2 * 0.264583;
                const pdf = new jsPDF({ orientation: w > h ? 'l' : 'p', unit: 'mm', format: [w + 40, h + 40] });
                pdf.addImage(imgData, 'PNG', 20, 20, w, h);
                const safeName = displayName(currentIndividual.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                pdf.save(`family_${safeName}_${Date.now()}.pdf`);
            } catch (err) {
                console.error('PDF Error:', err);
                alert('❌ PDF generation failed: ' + err.message);
            }
        };

        // =========================================================================
        // LOAD DATA & INIT
        // =========================================================================
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
            LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
        }

        document.addEventListener('DOMContentLoaded', function() {
            // mobile menu toggle
            document.getElementById('mobileMenuToggle')?.addEventListener('click', function() {
                document.querySelector('.fixed-header-section')?.classList.toggle('collapsed');
            });

            const tableMember = localStorage.getItem('tableViewMember');
            if (tableMember) {
                currentIndividual = JSON.parse(tableMember);
                document.getElementById('individualSearch').value = displayName(currentIndividual.name) + ' (' + currentIndividual.gen + ')';
                localStorage.removeItem('tableViewMember');
                const savedFilters = localStorage.getItem('tableViewFilters');
                if (savedFilters) {
                    const filters = JSON.parse(savedFilters);
                    showSiblings = filters.showSiblings;
                    showDescendants = filters.showDescendants;
                    showAncestors = filters.showAncestors;
                    document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
                    document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
                    document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
                    localStorage.removeItem('tableViewFilters');
                }
            }

            if (currentIndividual) {
                renderIndividualTree();
                document.getElementById('individualSearch').value = displayName(currentIndividual.name) + ' (' + currentIndividual.gen + ')';
                // Clear tempIndividual after rendering
                sessionStorage.removeItem('tempIndividual');
            } else {
                resetIndividual();
                document.getElementById('individualSearch').value = '';
            }
        });

        // =========================================================================
        // STATE PRESERVATION FOR REFRESH
        // =========================================================================
        let scrollTop = 0;

        window.addEventListener('scroll', function() {
            scrollTop = window.pageYOffset || document.documentElement.scrollTop;
        });

        window.addEventListener('beforeunload', function() {
            if (currentIndividual && !fromDashboard) {
                sessionStorage.setItem('tempIndividual', JSON.stringify(currentIndividual));
                sessionStorage.setItem('tempScroll', scrollTop);
            }
        });

        window.addEventListener('load', function() {
            const tempScroll = sessionStorage.getItem('tempScroll');
            if (tempScroll && !fromDashboard) {
                setTimeout(() => {
                    window.scrollTo(0, parseInt(tempScroll));
                    sessionStorage.removeItem('tempScroll');
                }, 100);
            }
        });

        // expose globals
        window.switchToTableView = switchToTableView;
        window.showDashboard = showDashboard;
        window.resetIndividual = resetIndividual;
    })();
</script>
