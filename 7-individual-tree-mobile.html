<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.5, minimum-scale=0.1, maximum-scale=5.0">
    <title>Rizvi Family · Individual Tree (Mobile)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --maroon: #5a0000; --dark-blue: #0f172a; --gold: #d4af37;
            --light-gold: #f1d279; --light-pink: #ffe4e9; --border-sage: #c9d6c2;
            --dashboard-green: #1b5e20; --pdf-grey: #6c757d;
        }

        body { font-family: 'Inter', sans-serif; background: #1a1a1a; overflow-x: auto; padding: 5px; }

        /* WIDE CANVAS LOGIC */
        .app-container {
            background: white; min-width: 1500px; min-height: 100vh;
            border-radius: 16px; border: 2px solid var(--gold); display: flex; flex-direction: column;
        }

        /* ORIGINAL POSITIONS RESTORED */
        .app-header { background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%); color: var(--gold); padding: 12px; border-bottom: 3px solid var(--gold); }
        
        .button-row { display: flex; gap: 8px; padding: 8px 12px; background: #fffcf8; border-bottom: 1px solid var(--border-sage); }
        .action-btn { flex: 1; padding: 12px 8px; font-size: 14px; font-weight: 600; border: 2px solid var(--gold); border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .action-btn.table { background: var(--dark-blue); color: white; }
        .action-btn.reset { background: var(--maroon); color: white; }
        .action-btn.pdf { background: var(--pdf-grey); color: white; }
        .action-btn.dashboard { background: var(--dashboard-green); color: white; }

        .search-section { padding: 12px; background: #fffcf8; }
        .search-wrapper { position: relative; margin-bottom: 10px; }
        .search-input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 16px; }
        
        /* SEARCH DROPDOWN FIX */
        #dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid var(--gold); display: none; z-index: 9999; max-height: 250px; overflow-y: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .dropdown-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; color: var(--dark-blue); font-weight: 600; }
        .dropdown-item:hover { background: var(--light-pink); }

        .filter-buttons { display: flex; gap: 5px; margin-bottom: 10px; }
        .filter-btn { flex: 1; padding: 10px; border: 2px solid var(--gold); background: white; border-radius: 4px; text-align: center; font-weight: 600; }
        .filter-btn.active { background: #d4edda; border-color: #1b5e20; }

        /* WIDE TREE LAYOUT */
        .tree-root-layout { display: flex; flex-direction: column; align-items: center; width: max-content; margin: 0 auto; }
        .children-row { display: flex; flex-direction: row; gap: 25px; }
        .box { border: 2px solid var(--gold); border-radius: 10px; padding: 15px; min-width: 180px; text-align: center; background: white; }
        .female-box { background: var(--light-pink) !important; border-color: #fb7185 !important; }
        .v-line { width: 2px; height: 20px; background: var(--gold); margin: 0 auto; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header"><div style="font-family:'Playfair Display'; font-weight:900;">🌿 Rizvi Family - Tree View</div></div>

        <div class="button-row">
            <button class="action-btn table" onclick="switchToTable()">📋 Table View</button>
            <button class="action-btn reset" onclick="resetSearch()">🔄 Reset</button>
        </div>
        <div class="button-row">
            <button class="action-btn pdf" onclick="exportPDF()">📑 Save PDF</button>
            <button class="action-btn dashboard" onclick="goToDashboard()">🏠 Home</button>
        </div>

        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Type name to search..." onkeyup="searchMember(this.value)" autocomplete="off">
                <div id="dropdown"></div>
            </div>
            <div class="filter-buttons">
                <div id="filterSiblings" class="filter-btn active" onclick="toggleFilter('siblings')">👥 Siblings</div>
                <div id="filterDescendants" class="filter-btn active" onclick="toggleFilter('descendants')">👶 Children</div>
                <div id="filterAncestors" class="filter-btn" onclick="toggleFilter('ancestors')">🌳 Ancestors</div>
            </div>
        </div>

        <div id="treeView" style="flex:1; overflow:auto; padding:20px;"></div>
    </div>

    <script>
        let db = [];
        let currentMember = null;
        let showSiblings = true, showDescendants = true, showAncestors = false;

        function loadFromStorage() {
            const saved = localStorage.getItem('familyDB');
            if (saved) db = JSON.parse(saved);
        }

        // SEARCH FIX: Corrected result display
        function searchMember(val) {
            const dropdown = document.getElementById('dropdown');
            if (!val || val.length < 2) { dropdown.style.display = 'none'; return; }
            
            const matches = db.filter(m => m.name.toLowerCase().includes(val.toLowerCase())).slice(0, 10);
            if (matches.length > 0) {
                dropdown.innerHTML = matches.map(m => `
                    <div class="dropdown-item" onclick="selectMember('${m.name.replace(/'/g, "\\'")}', '${m.gen}')">
                        ${m.name} <span style="font-size:10px; color:#666;">(${m.gen})</span>
                    </div>`).join('');
                dropdown.style.display = 'block';
            } else {
                dropdown.style.display = 'none';
            }
        }

        function selectMember(name, gen) {
            currentMember = db.find(m => m.name === name && m.gen === gen);
            document.getElementById('searchInput').value = name;
            document.getElementById('dropdown').style.display = 'none';
            renderTree();
        }

        function toggleFilter(f) {
            if(f==='siblings') showSiblings = !showSiblings;
            if(f==='descendants') showDescendants = !showDescendants;
            if(f==='ancestors') showAncestors = !showAncestors;
            document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
            document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
            document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
            renderTree();
        }

        function renderTree() {
            if (!currentMember) return;
            const view = document.getElementById('treeView');
            // Builds the Wide Layout branches
            let html = `<div class="tree-root-layout">
                <div class="box ${currentMember.gender==='FEMALE'?'female-box':''}">
                    <strong>${currentMember.name}</strong><br><small>${currentMember.gen}</small>
                </div>`;
            
            const children = db.filter(m => m.father === currentMember.name);
            if (showDescendants && children.length > 0) {
                html += `<div class="v-line"></div><div class="children-row">`;
                children.forEach(c => {
                    html += `<div class="box ${c.gender==='FEMALE'?'female-box':''}">
                        <strong>${c.name}</strong><br><small>${c.gen}</small>
                    </div>`;
                });
                html += `</div>`;
            }
            html += `</div>`;
            view.innerHTML = html;
        }

        function resetSearch() { location.reload(); }
        function goToDashboard() { window.location.href = '6-dashboard-mobile.html'; }
        function switchToTable() { window.location.href = '8-individual-table-mobile.html'; }
        function exportPDF() { alert("PDF logic preserved"); }

        window.onload = loadFromStorage;
    </script>
</body>
</html>
