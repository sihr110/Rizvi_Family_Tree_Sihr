<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover">
    <title>Rizvi family · structured tree (mobile→pc layout)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Load external family data -->
    <script src="family-data.js"></script>
    
<style>
/* ===== GLOBAL RESET & VARIABLES ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
    --maroon: #5a0000;
    --dark-blue: #0f172a;
    --gold: #d4af37;
    --light-gold: #f1d279;
    --green: #2e7d32;
    --dark-green: #1b5e20;
    --light-green: #d4edda;
    --pink-bg: #fff0f5;
    --light-pink: #ffe4e9;
    --light-sage: #f4f7f2;
    --border-sage: #c9d6c2;
    --sisters-border: #fb7185;
    --summary-border: #e6c87c;
    --table-header-bg: #fdf6e3;
    --bronze: #bc8c4f;
    --reset-red: #5a0000;
    --reset-red-dark: #7a1f1f;
    --pdf-grey: #6c757d;
    --pdf-grey-dark: #5a6268;
    --dashboard-green: #1b5e20;
}

/* ----- BASE LAYOUT ----- */
body {
    font-family: 'Inter', sans-serif;
    background: #1a1a1a;
    height: 100vh;
    overflow: hidden;
    margin: 0;
    padding: 10px;
    overscroll-behavior-y: contain;
    -webkit-overflow-scrolling: touch;
}

.app-container {
    max-width: 1400px;
    margin: 0 auto;
    background: white;
    height: 100%;
    display: flex;
    flex-direction: column;
    border-radius: 20px;
    border: 2px solid var(--gold);
    overflow: hidden;
    box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
}

/* ----- HEADER SECTION ----- */
.app-header {
    background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
    color: var(--gold);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid var(--gold);
    position: relative;
}
.header-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 900;
    display: flex;
    align-items: center;
    gap: 8px;
}
.header-icon {
    background: var(--gold);
    color: var(--dark-blue);
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}

.top-reset-btn {
    background: var(--reset-red);
    color: white;
    border: 2px solid var(--gold);
    border-radius: 4px;
    padding: 6px 14px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: all 0.2s;
}
.top-reset-btn:hover {
    background: var(--reset-red-dark);
    transform: translateY(-2px);
}

.action-buttons-row {
    display: flex;
    gap: 8px;
    width: 100%;
    padding: 10px 20px;
    background: var(--dark-blue);
    border-bottom: 2px solid var(--gold);
}
.action-btn {
    flex: 1;
    padding: 8px 5px;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    white-space: nowrap;
    border: 2px solid var(--gold);
    border-radius: 4px;
    transition: all 0.2s;
    min-width: 0;
    text-align: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
}
.action-btn.table { background: var(--bronze); color: white; border-color: transparent; }
.action-btn.pdf { background: var(--pdf-grey); color: white; border-color: transparent; }
.action-btn.dashboard { background: var(--dashboard-green); color: white; border-color: transparent; }
.action-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

/* ----- MAIN CONTENT ----- */
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fffcf8; }
#individualSection { display: block; height: 100%; overflow: auto; flex: 1; }

.fixed-header-section { 
    padding: 15px 15px 0 15px; 
    background: #fffcf8; 
    flex-shrink: 0;
    position: relative;
    z-index: 2000; 
    overflow: visible !important; 
}

.border-line { border-top: 3px solid var(--gold); margin: 20px 0 0 0; }
.scrollable-content { 
    position: relative;
    z-index: 1;
}

.search-row { 
    margin-bottom: 15px; 
    width: 100%; 
    position: relative;
    z-index: 2001;
}
.search-label { 
    font-weight: 700; 
    color: var(--maroon); 
    font-size: 13px; 
    text-transform: uppercase; 
    margin-bottom: 6px; 
    white-space: nowrap; 
}
.search-wrapper { 
    position: relative; 
    width: 100%; 
    z-index: 2002;
}
.search-input { 
    width: 100%; 
    padding: 12px 15px; 
    border: 2px solid #cbd5e1; 
    border-radius: 8px; 
    font-size: 14px; 
    outline: none; 
    transition: all 0.3s; 
    background: white; 
    color: var(--dark-blue); 
    font-weight: 500;
}
.search-input:focus { 
    border-color: var(--gold); 
    box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); 
}

/* DROPDOWN */
.dropdown { 
    position: absolute; 
    top: 100%; 
    left: 0; 
    right: 0; 
    background: white; 
    border: 2px solid var(--gold); 
    border-radius: 0 0 8px 8px; 
    max-height: 260px !important; 
    overflow-y: auto; 
    display: none; 
    z-index: 99999 !important; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
    margin-top: 2px;
}

.result-item { 
    padding: 12px 15px; 
    border-bottom: 1px solid #eee; 
    cursor: pointer; 
    font-size: 14px; 
    transition: background 0.2s; 
}
.result-item:last-child { border-bottom: none; }
.result-item:hover { background: #faebcd; }
.result-item .main-name { 
    font-weight: 700; 
    color: var(--dark-blue); 
    font-size: 15px; 
    display: inline-block; 
}
.result-item .gen { 
    color: var(--maroon); 
    font-size: 13px; 
    margin-left: 8px; 
    font-weight: 600; 
    display: inline-block; 
}
.result-item .father-info { 
    font-size: 12px; 
    color: #64748b; 
    margin-top: 5px; 
}

/* ----- FILTER BUTTONS ----- */
.filter-buttons { 
    display: flex; 
    gap: 6px; 
    flex-wrap: wrap; 
    margin: 15px 0 5px 0;
}
.filter-btn { 
    padding: 8px 14px; 
    border-radius: 4px; 
    font-weight: 600; 
    font-size: 13px; 
    cursor: pointer; 
    border: 2px solid var(--gold); 
    background: white; 
    color: var(--dark-blue); 
    white-space: nowrap; 
    display: flex; 
    align-items: center; 
    gap: 4px; 
}
.filter-btn.active { 
    background: #d4edda; 
    border-color: var(--dark-green); 
}

/* ----- TREE LAYOUT ----- */
.tree-root-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
    padding: 40px;
    width: max-content;
    min-width: 100%;
    zoom: 0.5;
    position: relative;
}

@media screen and (max-width: 480px) {
    .tree-root-layout { zoom: 0.4; }
}
@media screen and (max-width: 360px) {
    .tree-root-layout { zoom: 0.35; }
}

.family-group { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 15px;
    width: 100%; 
    margin-bottom: 30px;
}

.children-row { 
    display: flex; 
    gap: 20px; 
    flex-wrap: wrap; 
    justify-content: center; 
    margin: 20px 0 25px 0;
    max-width: 1200px; 
    margin-left: auto;
    margin-right: auto;
}

.v-line { 
    width: 3px; 
    height: 30px;
    background: var(--gold); 
    margin: 15px auto;
}

.relation-label { 
    font-size: 11px; 
    color: var(--gold); 
    font-weight: bold; 
    text-transform: uppercase; 
    letter-spacing: 1px; 
    background: var(--dark-blue); 
    padding: 6px 16px;
    border-radius: 4px; 
    color: white; 
    margin: 20px 0 25px 0;
    text-align: center; 
    display: inline-block; 
    width: auto; 
}

.descendant-heading { 
    font-size: 14px; 
    color: var(--maroon); 
    font-weight: 800; 
    margin: 40px 0 20px 0;
    font-family: 'Playfair Display', serif; 
    text-align: center; 
    width: 100%; 
    border-bottom: 2px solid var(--gold); 
    padding-bottom: 8px;
}

/* ----- MEMBER BOX - COMPLETE FILE 2 STYLING ----- */
.box { 
    border: 2px solid var(--gold); 
    border-radius: 12px; 
    background: white; 
    min-width: 260px;
    max-width: 280px;
    text-align: left;
    cursor: pointer;
    position: relative; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.05); 
    transition: transform 0.2s; 
    display: inline-block;
    overflow: visible !important;
    margin: 0 auto;
}

.box:hover { transform: translateY(-3px); }

.box.blinking-box { 
    animation: blinkBoxLightGreen 1.5s infinite; 
    border-width: 4px; 
    z-index: 10; 
    transform: scale(1.02); 
}

@keyframes blinkBoxLightGreen { 
    0%,100%{ border-color:#2e7d32; background:#e8f5e9; box-shadow:0 0 15px rgba(46,125,50,0.4); } 
    50%{ border-color:#4caf50; background:#c8e6c9; box-shadow:0 0 30px rgba(76,175,80,0.6); transform:scale(1.05); } 
}

.female-box { 
    background-color: var(--light-pink) !important; 
    border-color: #fb7185 !important; 
}

.box-header { 
    display: flex; 
    justify-content: space-between; 
    padding: 6px 10px; 
    background: #f8fafc; 
    font-size: 10px; 
    font-weight: 800; 
    border-bottom: 1px solid #ddd; 
}

.box-body { 
    padding: 12px;
    text-align: left;
}

.member-name { 
    font-family: 'Playfair Display', serif; 
    font-weight: 700; 
    font-size: 16px; 
    display: block;
    margin-bottom: 8px;
}

.father-name { 
    font-size: 11px; 
    color: #64748b; 
    margin-top: 4px;
}

.golden-heart { 
    position: absolute; 
    bottom: 5px; 
    right: 8px; 
    color: var(--gold); 
    font-size: 16px;
    line-height: 1;
}

.hidden { display: none !important; }

/* ----- FOOTER ----- */
.app-footer { background: var(--dark-blue); color: var(--gold); text-align: center; padding: 8px; font-size: 11px; border-top: 2px solid var(--gold); }

/* ===== MOBILE RESPONSIVE ===== */
@media screen and (max-width: 768px) {
    body { overflow: auto; -webkit-overflow-scrolling: touch; height: auto; min-height: 100vh; padding: 5px; }
    .app-container { height: auto; min-height: calc(100vh - 10px); border-radius: 16px; overflow: hidden; }
    
    .app-header { position: relative; padding: 10px 15px; }
    .header-title { font-size: 18px; width: calc(100% - 50px); }
    .menu-toggle { display: flex !important; position: absolute; top: 50%; right: 15px; transform: translateY(-50%); background: var(--gold); color: black; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 26px; font-weight: bold; cursor: pointer; z-index: 2000; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    
    .action-buttons-row { padding: 8px 10px; gap: 5px; }
    .action-btn { font-size: 10px; padding: 8px 2px; }
    
    .fixed-header-section { transition: max-height 0.3s ease; overflow: hidden; max-height: 500px; padding: 15px 15px 10px 15px; }
    .fixed-header-section.collapsed { max-height: 0; padding-top: 0; padding-bottom: 0; margin: 0; border-bottom: none; }
    
    .search-input { 
        width: 100%; 
        font-size: 16px; 
        padding: 14px 15px; 
        height: 52px; 
    }
    
    .dropdown { 
        max-height: 280px; 
        font-size: 14px;
        z-index: 9999;
        position: absolute;
    }
    
    .filter-buttons { 
        width: 100%; 
        justify-content: space-between; 
        gap: 5px; 
        margin: 10px 0 5px 0;
    }
    .filter-btn { 
        flex: 1; 
        padding: 10px 2px; 
        font-size: 11px; 
        justify-content: center; 
        height: 44px; 
    }
}

#individualTree { min-height: 100%; }
</style>

</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">🌿</span> 
                <span>Rizvi family - Tree View</span>
            </div>
            <div class="top-reset-btn" onclick="resetIndividual()">🔄 Reset</div>
            
        </div>
        
        <div class="action-buttons-row">
            <div class="action-btn table" onclick="switchToTableView()">📋 Show Table</div>
            <div class="action-btn pdf" onclick="exportIndividualPDF()">📑 Save PDF</div>
            <div class="action-btn dashboard" onclick="showDashboard()">🏠 Dashboard</div>
        </div>
        
        <div class="main-content" id="mainContent">
            <div id="individualSection">
                <div class="fixed-header-section">
                    <!-- SEARCH -->
                    <div class="search-row">
                        <div class="search-label">SEARCH MEMBER</div>
                        <div class="search-wrapper">
                            <input type="text" id="individualSearch" class="search-input" placeholder="Type name..." onkeyup="searchIndividual(this.value)" autocomplete="off">
                            <div id="individualDropdown" class="dropdown"></div>
                        </div>
                    </div>
                    
                    <!-- FILTER BUTTONS -->
                    <div class="filter-buttons">
                        <div id="filterSiblings" class="filter-btn active" onclick="toggleFilter('siblings')">👥 Siblings</div>
                        <div id="filterDescendants" class="filter-btn active" onclick="toggleFilter('descendants')">👶 Descendants</div>
                        <div id="filterAncestors" class="filter-btn" onclick="toggleFilter('ancestors')">🌳 Ancestors</div>
                    </div>
                    
                    <div class="border-line"></div>
                </div>

                <div class="scrollable-content">
                    <div id="individualTree" class="tree-root-layout"></div>
                </div>
            </div>
        </div>
        <div class="app-footer">Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010</div>
    </div>

<script>
(function(){
    let currentIndividual = null;
    let db = [];
    let showSiblings = true;
    let showDescendants = true;
    let showAncestors = false;
    let LOAD_STAMP = '';
    
    if (typeof FAMILY_DATA !== 'undefined' && FAMILY_DATA.length > 0) {
        db = FAMILY_DATA;
        LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
    } else {
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
            LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
        }
    }
    
    const fromDashboard = sessionStorage.getItem('fromDashboard') === 'true';
    const isPageRefresh = !document.referrer || document.referrer.includes(window.location.host);

    if (fromDashboard) {
        sessionStorage.removeItem('tempIndividual');
        sessionStorage.removeItem('tempScroll');
        sessionStorage.removeItem('fromDashboard');
        currentIndividual = null;
    } else if (isPageRefresh) {
        const tempIndividual = sessionStorage.getItem('tempIndividual');
        if (tempIndividual) {
            try { currentIndividual = JSON.parse(tempIndividual); } catch (e) {}
        }
    } else {
        const tempIndividual = sessionStorage.getItem('tempIndividual');
        if (tempIndividual) {
            try { currentIndividual = JSON.parse(tempIndividual); sessionStorage.removeItem('tempIndividual'); } catch (e) {}
        }
    }

    function displayName(str) {
        return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
    }

    function formatCurrentTime() {
        const d = new Date();
        const day = d.getDate();
        const month = d.getMonth() + 1;
        const year = d.getFullYear();
        const hours = d.getHours();
        const minutes = String(d.getMinutes()).padStart(2, '0');
        const ampm = hours >= 12 ? 'pm' : 'am';
        const displayHours = hours % 12 || 12;
        return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
    }

    function switchToTableView() {
        if (currentIndividual) {
            localStorage.setItem('tableViewMember', JSON.stringify(currentIndividual));
            localStorage.setItem('tableViewFilters', JSON.stringify({ showSiblings, showDescendants, showAncestors }));
        }
        window.location.href = '8-individual-table-mobile.html';
    }

    function showDashboard() {
        sessionStorage.setItem('fromDashboard', 'true');
        sessionStorage.removeItem('tempIndividual');
        sessionStorage.removeItem('tempScroll');
        window.location.href = '6-dashboard-mobile.html';
    }

    function resetIndividual() {
        document.getElementById('individualSearch').value = '';
        currentIndividual = null;
        document.getElementById('individualTree').innerHTML = 
            '<div style="text-align:center; color:#999; padding:60px; background: var(--light-sage); border: 2px solid var(--border-sage); border-radius: 16px; margin:20px auto; max-width:500px;">' +
            '<div style="font-size:48px; margin-bottom:15px; opacity:0.5;">👤</div>' +
            '<div style="font-size:18px; font-weight:600; color:var(--maroon); margin-bottom:8px;">Select a member to view</div>' +
            '<div style="font-size:13px; color:#666;">Search and select a family member above to see their tree</div></div>';
        sessionStorage.removeItem('tempIndividual');
    }

    window.toggleFilter = function(filter) {
        if (!currentIndividual) return;
        if (filter === 'siblings') { showSiblings = !showSiblings; document.getElementById('filterSiblings').classList.toggle('active', showSiblings); }
        else if (filter === 'descendants') { showDescendants = !showDescendants; document.getElementById('filterDescendants').classList.toggle('active', showDescendants); }
        else if (filter === 'ancestors') { showAncestors = !showAncestors; document.getElementById('filterAncestors').classList.toggle('active', showAncestors); }
        renderIndividualTree();
    };

    function findParent(p) {
        if (!p || !p.father) return null;
        return db.find(x => x.name.toLowerCase() === p.father.toLowerCase());
    }

    function getAncestryChain(p) {
        if (!p) return [];
        let chain = [], cur = p, visited = new Set();
        while (cur && !visited.has(cur.name.toLowerCase())) {
            chain.push(cur);
            visited.add(cur.name.toLowerCase());
            cur = findParent(cur);
        }
        return chain;
    }

    // SEARCH FUNCTION
    window.searchIndividual = function(query) {
        if (!db.length) return;
        const drop = document.getElementById('individualDropdown');
        if (!drop) return;
        drop.innerHTML = '';
        
        if (!query || query.length < 1) { 
            drop.style.display = 'none'; 
            return; 
        }
        
        const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
        if (found.length === 0) { 
            drop.style.display = 'none'; 
            return; 
        }
        
        found.forEach(p => {
            const div = document.createElement('div');
            div.className = 'result-item';
            
            const nameDisplay = displayName(p.name);
            const fatherDisplay = displayName(p.father);
            const relation = p.gender?.startsWith('F') ? 'D/o' : 'S/o';
            
            div.innerHTML = `
                <div>
                    <span class="main-name">${nameDisplay}</span> 
                    <span class="gen">${p.gen}</span>
                </div>
                <div class="father-info">${relation} ${fatherDisplay}</div>
            `;
            
            div.onclick = (e) => {
                e.stopPropagation();
                document.getElementById('individualSearch').value = `${nameDisplay} (${p.gen})`;
                currentIndividual = p;
                renderIndividualTree();
                drop.style.display = 'none';
            };
            drop.appendChild(div);
        });
        
        drop.style.display = 'block';
        drop.style.zIndex = '9999';
    };

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.search-wrapper')) {
            document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
        }
    });

    window.handleBoxClick = function(member) {
        if (!member || !member.name) return;
        currentIndividual = member;
        document.getElementById('individualSearch').value = displayName(member.name) + ' (' + member.gen + ')';
        renderIndividualTree();
    };

    // RENDER BOX FUNCTION - COMPLETE FROM FILE 2
    function renderBox(p, label, isSelected, hasChildren) {
        const isFemale = p.gender?.startsWith('F');
        const blinkClass = isSelected ? 'blinking-box' : '';
        const memberData = encodeURIComponent(JSON.stringify(p));
        
        // Find mother (spouse of father)
        let motherName = '';
        if (p.father) {
            const father = db.find(f => f.name.toLowerCase() === p.father.toLowerCase());
            if (father && father.spouse) {
                motherName = father.spouse;
            }
        }
        
        // Rose for vital status
        const roseIcon = p.alive === 'No' ? '🥀' : '🌹';
        const roseColor = p.alive === 'No' ? '#666' : '#e31b23';
        
        // Marital status display
        let maritalDisplay = '';
        if (p.maritalStatus === 'Married') maritalDisplay = '💍';
        else if (p.maritalStatus === 'Unmarried') maritalDisplay = '';
        else if (p.maritalStatus === 'Widow' || p.maritalStatus === 'Widower') maritalDisplay = '👤';
        else if (p.maritalStatus === 'Divorced') maritalDisplay = '⚖️';
        
        // Family icon
        const familyIcon = '👪';
        
        return `<div class="box ${isFemale ? 'female-box' : ''} ${blinkClass}" onclick='handleBoxClick(JSON.parse(decodeURIComponent("${memberData}")))'>
            <div class="box-header">
                <span>${label}</span>
                <span>${p.gen}</span>
            </div>
            <div class="box-body">
                <!-- Name with rose in front -->
                <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 8px;">
                    <span style="color: ${roseColor}; font-size: 20px;">${roseIcon}</span>
                    <span class="member-name">${displayName(p.name)}</span>
                </div>
                
                <!-- Father -->
                <div style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
                    <span style="font-size: 14px; min-width: 50px;">Father :</span>
                    <span class="father-name">${displayName(p.father)}</span>
                </div>
                
                <!-- Mother (if found) -->
                ${motherName ? `<div style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
                    <span style="font-size: 14px; min-width: 50px;">Mother :</span>
                    <span class="father-name" style="color: #b85c5c;">${displayName(motherName)}</span>
                </div>` : ''}
                
                <!-- Spouse (if exists) -->
                ${p.spouse ? `<div style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
                    <span style="font-size: 14px; min-width: 50px;">Spouse :</span>
                    <span class="father-name" style="color: #8B4513;">${displayName(p.spouse)}</span>
                </div>` : ''}
                
                <!-- Status -->
                <div style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
                    <span style="font-size: 14px; min-width: 50px;">Status :</span>
                    <span style="font-size: 14px;">${maritalDisplay}</span>
                    <span class="father-name">${p.maritalStatus || 'Married'}</span>
                </div>
                
                <!-- Family icon for children -->
                ${hasChildren ? `<div class="golden-heart" style="font-size: 18px;">${familyIcon}</div>` : ''}
            </div>
        </div>`;
    }

    // RENDER INDIVIDUAL TREE - WITH ALL SIBLINGS AS INDIVIDUAL BOXES
    function renderIndividualTree() {
        if (!currentIndividual) return;
        let html = '<div>';

        // ANCESTORS SECTION
        if (showAncestors) {
            const ancestors = getAncestryChain(currentIndividual).slice(1);
            if (ancestors.length > 0) {
                html += '<div class="family-group">';
                html += '<div class="relation-label">ANCESTORS</div>';
                [...ancestors].reverse().forEach((a, idx) => {
                    const hasChildren = db.some(x => x.father && x.father.toLowerCase() === a.name.toLowerCase());
                    html += renderBox(a, idx === 0 ? 'Earliest' : 'Ancestor', false, hasChildren);
                    if (idx < ancestors.length - 1) html += '<div class="v-line"></div>';
                });
                html += '<div class="v-line"></div>';
                html += '</div>';
            }
        }

        // CURRENT MEMBER AND FATHER
        const father = findParent(currentIndividual);
        const ancestors = showAncestors ? getAncestryChain(currentIndividual).slice(1) : [];
        const fatherInAncestors = father && ancestors.some(a => a.name === father.name);

        if (father && !fatherInAncestors) {
            const fatherHasChildren = db.some(x => x.father && x.father.toLowerCase() === father.name.toLowerCase());
            html += '<div class="family-group">';
            html += renderBox(father, 'Father', false, fatherHasChildren);
            html += '<div class="v-line"></div>';
            const currentHasChildren = db.some(x => x.father && x.father.toLowerCase() === currentIndividual.name.toLowerCase());
            html += renderBox(currentIndividual, 'Selected', true, currentHasChildren);
            html += '</div>';
        } else {
            const currentHasChildren = db.some(x => x.father && x.father.toLowerCase() === currentIndividual.name.toLowerCase());
            html += '<div class="family-group">';
            html += renderBox(currentIndividual, 'Selected', true, currentHasChildren);
            html += '</div>';
        }

        // SIBLINGS SECTION - ALL as individual boxes (NO TABLES)
        if (showSiblings && father) {
            const siblings = db.filter(s => s.father && s.father.toLowerCase() === currentIndividual.father.toLowerCase() && s.name !== currentIndividual.name);
            if (siblings.length > 0) {
                html += '<div class="family-group">';
                html += `<div class="descendant-heading">DESCENDANTS OF ${displayName(father.name).toUpperCase()}</div>`;
                html += '<div class="relation-label">SIBLINGS</div>';
                
                // ALL siblings in children-row (both male and female as individual boxes)
                html += '<div class="children-row">';
                siblings.forEach(s => {
                    const hasChildren = db.some(x => x.father && x.father.toLowerCase() === s.name.toLowerCase());
                    const siblingLabel = s.gender?.startsWith('F') ? 'Sister' : 'Brother';
                    html += renderBox(s, siblingLabel, false, hasChildren);
                });
                html += '</div>';
                
                html += '</div>';
            }
        }

        // DESCENDANTS SECTION - ALL as individual boxes
        if (showDescendants) {
            const children = db.filter(c => c.father && c.father.toLowerCase() === currentIndividual.name.toLowerCase());
            if (children.length > 0) {
                html += '<div class="family-group">';
                html += '<div class="v-line"></div>';
                html += `<div class="descendant-heading">DESCENDANTS OF ${displayName(currentIndividual.name).toUpperCase()}</div>`;
                html += '<div class="relation-label">CHILDREN</div>';
                
                // ALL children in children-row (both male and female as individual boxes)
                html += '<div class="children-row">';
                children.forEach(c => {
                    const hasChildren = db.some(x => x.father && x.father.toLowerCase() === c.name.toLowerCase());
                    const childLabel = c.gender?.startsWith('F') ? 'Daughter' : 'Son';
                    html += renderBox(c, childLabel, false, hasChildren);
                });
                html += '</div>';
                
                html += '</div>';
            }
        }

        html += '</div>';
        document.getElementById('individualTree').innerHTML = html;
    }
   
    // PDF FUNCTION
    window.exportIndividualPDF = async function() {
        if (!currentIndividual) {
            alert('Please select a member first');
            return;
        }
        
        const content = document.getElementById('individualTree');
        const treeLayout = document.querySelector('.tree-root-layout');
        
        const originalZoom = treeLayout.style.zoom;
        
        try {
            treeLayout.style.zoom = "1";
            
            const header = document.createElement('div');
            header.style.cssText = "margin-bottom:30px; text-align:center; width:100%;";
            header.innerHTML = `
                <h1 style="color: #d4af37; font-size: 36px; font-family: 'Playfair Display', serif; margin:0 0 10px 0;">Rizvi Family Tree</h1>
                <h2 style="color:#5a0000; font-size:24px; font-family:'Playfair Display', serif; margin:0;">${displayName(currentIndividual.name)}</h2>
            `;
            
            const footer = document.createElement('div');
            footer.style.cssText = "margin-top:40px; padding:15px; border:2px solid #d4af37; background:#0f172a; color:#d4af37; display:flex; justify-content:space-between; font-size:12px; width:100%;";
            footer.innerHTML = `<span>Generated: ${formatCurrentTime()}</span><span>Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010</span>`;
            
            content.insertBefore(header, content.firstChild);
            content.appendChild(footer);

            const canvas = await html2canvas(content, {
                scale: 2,
                backgroundColor: '#ffffff',
                useCORS: true,
                logging: false,
                width: content.scrollWidth,
                windowWidth: content.scrollWidth
            });

            treeLayout.style.zoom = originalZoom;
            content.removeChild(header);
            content.removeChild(footer);

            const { jsPDF } = window.jspdf;
            const imgData = canvas.toDataURL('image/png');
            
            const pdfW = (canvas.width / 2) * 0.264583;
            const pdfH = (canvas.height / 2) * 0.264583;

            const pdf = new jsPDF({
                orientation: pdfW > pdfH ? 'l' : 'p',
                unit: 'mm',
                format: [pdfW + 20, pdfH + 20]
            });

            pdf.addImage(imgData, 'PNG', 10, 10, pdfW, pdfH);
            
            const clean = (str) => str.trim().replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');
            const name1 = clean(currentIndividual.name);
            const fileName = `Family-Tree-${name1}.pdf`;
            pdf.save(fileName);

        } catch (err) {
            treeLayout.style.zoom = originalZoom;
            console.error('PDF Error:', err);
            alert('❌ Error: ' + err.message);
        }
    };

    document.addEventListener('DOMContentLoaded', function() {
     
        const tableMember = localStorage.getItem('tableViewMember');
        if (tableMember) {
            currentIndividual = JSON.parse(tableMember);
            document.getElementById('individualSearch').value = displayName(currentIndividual.name) + ' (' + currentIndividual.gen + ')';
            localStorage.removeItem('tableViewMember');
            const savedFilters = localStorage.getItem('tableViewFilters');
            if (savedFilters) {
                const filters = JSON.parse(savedFilters);
                showSiblings = filters.showSiblings;
                showDescendants = filters.showDescendants;
                showAncestors = filters.showAncestors;
                document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
                document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
                document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
                localStorage.removeItem('tableViewFilters');
            }
        }

        if (currentIndividual) {
            renderIndividualTree();
            document.getElementById('individualSearch').value = displayName(currentIndividual.name) + ' (' + currentIndividual.gen + ')';
            sessionStorage.removeItem('tempIndividual');
        } else {
            resetIndividual();
            document.getElementById('individualSearch').value = '';
        }
    });

    let scrollTop = 0;
    window.addEventListener('scroll', function() {
        scrollTop = window.pageYOffset || document.documentElement.scrollTop;
    });

    window.addEventListener('beforeunload', function() {
        if (currentIndividual && !fromDashboard) {
            sessionStorage.setItem('tempIndividual', JSON.stringify(currentIndividual));
            sessionStorage.setItem('tempScroll', scrollTop);
        }
    });

    window.addEventListener('load', function() {
        const tempScroll = sessionStorage.getItem('tempScroll');
        if (tempScroll && !fromDashboard) {
            setTimeout(() => {
                window.scrollTo(0, parseInt(tempScroll));
                sessionStorage.removeItem('tempScroll');
            }, 100);
        }
    });

    window.switchToTableView = switchToTableView;
    window.showDashboard = showDashboard;
    window.resetIndividual = resetIndividual;
})();
</script>
