<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.4, minimum-scale=0.1, maximum-scale=5.0, user-scalable=yes">
    <title>Rizvi Family · Tree View (Mobile Wide)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --maroon: #5a0000; --dark-blue: #0f172a; --gold: #d4af37;
            --btn-table: #c5a059; --btn-pdf: #94a3b8; --btn-dash: #3f6212;
            --light-sage: #f4f7f2;
        }

        body { background: #1a1a1a; font-family: 'Inter', sans-serif; overflow: auto; }
        .app-container { background: white; width: max-content; min-width: 100vw; min-height: 100vh; display: flex; flex-direction: column; border: 8px solid var(--gold); }

        /* ROW 1: HEADER MATCHED TO IMAGE */
        .app-header { background: var(--dark-blue); color: var(--gold); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); position: sticky; left: 0; top: 0; z-index: 1000; width: 100vw; }
        .header-actions { display: flex; gap: 10px; }
        .header-btn { padding: 8px 15px; border-radius: 6px; font-weight: 700; color: white; border: none; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* ROW 2 & 3: INTEGRATED SEARCH & FILTERS MATCHED TO IMAGE */
        .nav-section { display: flex; align-items: center; gap: 15px; padding: 15px 25px; background: white; position: sticky; left: 0; width: 100vw; border-bottom: 3px solid var(--gold); }
        .search-label { font-weight: 800; color: var(--maroon); font-size: 14px; white-space: nowrap; }
        .search-input { flex-grow: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 14px; }
        
        .filter-group { display: flex; gap: 10px; }
        .filter-btn { padding: 8px 18px; border-radius: 6px; font-weight: 700; border: 2px solid #1b5e20; background: #d4edda; color: #1b5e20; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .filter-btn.ancestors { background: white; border-color: var(--gold); color: #000; }

        /* PLACEHOLDER CARD MATCHED TO IMAGE */
        .placeholder-wrap { display: flex; justify-content: center; padding: 60px; }
        .placeholder-card { background: #f1f5f0; border: 2px solid #cbd5e1; border-radius: 30px; padding: 80px; text-align: center; width: 650px; }
        .placeholder-card h2 { color: var(--maroon); font-family: 'Playfair Display'; font-size: 28px; margin: 15px 0; }
        .placeholder-card p { color: #666; font-size: 16px; }

        .toggle-view-btn { position: fixed; bottom: 30px; left: 30px; z-index: 2000; background: var(--maroon); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; border: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div class="toggle-view-btn" onclick="document.body.classList.toggle('canvas-only')">👁️</div>

    <div class="app-container">
        <header class="app-header">
            <div style="font-family:'Playfair Display'; font-size:22px; font-weight:900;">🌿 Rizvi Family - Tree View</div>
            <div class="header-actions">
                <button class="header-btn" style="background:var(--btn-table)">📑 Switch to Table</button>
                <button class="header-btn" style="background:var(--maroon)">🔄 Reset</button>
                <button class="header-btn" style="background:var(--btn-pdf)">💾 Save PDF</button>
                <button class="header-btn" style="background:var(--btn-dash)">🏠 Dashboard</button>
            </div>
        </header>

        <div class="nav-section">
            <span class="search-label">SEARCH MEMBER</span>
            <input type="text" class="search-input" placeholder="Type name...">
            <div class="filter-group">
                <button class="filter-btn">👥 Siblings</button>
                <button class="filter-btn">👶 Descendants</button>
                <button class="filter-btn ancestors">🌳 Ancestors</button>
            </div>
        </div>

        <div class="placeholder-wrap">
            <div class="placeholder-card">
                <div style="font-size: 80px; opacity: 0.3; color: #6b21a8;">👤</div>
                <h2>Select a member to view</h2>
                <p>Search and select a family member above to see their tree</p>
            </div>
        </div>
    </div>

</body>
</html>
