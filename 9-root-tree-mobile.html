<style>

	/* Prevent pull-to-refresh */
	body {
    	overscroll-behavior-y: contain;
    	-webkit-overflow-scrolling: touch;
	}


        /* ===== GLOBAL RESET & VARIABLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #d4edda;
            --pink-bg: #fff0f5;
            --light-pink: #ffe4e9;
            --light-sage: #f4f7f2;

            --sisters-border: #fb7185;
            --summary-border: #e6c87c;
            --table-header-bg: #fdf6e3;
            --bronze: #bc8c4f;
            --reset-red: #5a0000;
            --reset-red-dark: #7a1f1f;
            --pdf-grey: #6c757d;
            --pdf-grey-dark: #5a6268;

            --sisters-box-bg: #fff0f5;
        }

        /* ----- BASE LAYOUT ----- */
      body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            height: auto;      /* CHANGE THIS from 100vh */
            overflow: auto;    /* This is now correct */
            margin: 0;
            padding: 10px;
        }
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            min-height: calc(100vh - 20px);
            display: flex;
            flex-direction: column;
            border-radius: 20px;
            border: 2px solid var(--gold);
            overflow: visible;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
        }
        
        /* ----- HEADER SECTION ----- */
        .app-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
            color: var(--gold);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            position: relative;

        }
        .header-title {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header-icon {
            background: var(--gold);

            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        
        .top-reset-btn {
            background: var(--reset-red);

            border: 2px solid var(--gold);

            transition: all 0.2s;
        }
        .top-reset-btn:hover {
            background: var(--reset-red-dark);

        }
        
        .action-buttons-row {
            display: flex;
            gap: 8px;

            padding: 10px 20px;
            background: var(--dark-blue);

        }
        .action-btn {
            flex: 1;
            padding: 8px 5px;

            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            border: 2px solid var(--gold);
            border-radius: 4px;
            transition: all 0.2s;
            min-width: 0;
            text-align: center;
.action-btn {
    /* ... your other styles ... */
    user-select: none;         /* Stops text selection */
    -webkit-user-select: none;  /* Stops text selection on Safari/Chrome */
    touch-action: manipulation; /* Optimizes for mobile tapping */
}
        }
        .action-btn.table { background: var(--bronze); color: white; border-color: transparent; }
        .action-btn.pdf { background: var(--pdf-grey); color: white; border-color: transparent; }
        .action-btn.dashboard { background: var(--dashboard-green); color: white; border-color: transparent; }
        .action-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        .menu-toggle { display: none; }
        
        /* ----- MAIN CONTENT ----- */
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: visible;
            background: #fffcf8;
            position: relative;
        }
        #rootSection { 
            display: flex; 
            flex-direction: column; 
            height: auto;
            overflow: visible; /* FIXED: Removed hidden lock */
            flex: 1;
            position: relative;
        }
        .fixed-header-section { 
            padding: 15px 15px 0 15px; 
            background: #fffcf8; 
            flex-shrink: 0;
            position: relative;
            z-index: 2000;
        }
        .border-line { border-top: 3px solid var(--gold); margin: 20px 0 0 0; }
.scrollable-content {
    flex: 1;
    overflow: auto;
    padding: 10px;
    display: flex;
    /* Aligns the tree to the top-left so it doesn't float in the middle */
    align-items: flex-start; 
}
        
        /* ----- SEARCH SECTION ----- */
        .search-row { margin-bottom: 15px; width: 100%; position: relative; }
        .search-label { font-weight: 700; color: var(--maroon); font-size: 13px; text-transform: uppercase; margin-bottom: 6px; white-space: nowrap; }
        .search-wrapper { position: relative; width: 100%; }
        .search-input { width: 100%; padding: 12px 15px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; transition: all 0.3s; background: white; color: var(--dark-blue); font-weight: 500; }
        .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        
        .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid var(--gold); border-radius: 0 0 8px 8px; max-height: 300px; overflow-y: auto; display: none; z-index: 9999; box-shadow: 0 8px 20px rgba(0,0,0,0.25); margin-top: 2px; }
        .result-item { padding: 12px 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        .result-item:last-child { border-bottom: none; }
        .result-item:hover { background: #faebcd; }
        .result-item .main-name { font-weight: 700; color: var(--dark-blue); font-size: 15px; display: inline-block; }
        .result-item .gen { color: var(--maroon); font-size: 13px; margin-left: 8px; font-weight: 600; display: inline-block; }
        .result-item .father-info { font-size: 12px; color: #64748b; margin-top: 5px; }
        
        /* ----- ROOT CARD STYLES ----- */
        .root-card { background: var(--light-sage); border: 2px solid var(--border-sage); border-radius: 16px; padding: 20px; margin-bottom: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .root-title { color: var(--maroon); font-size: 16px; font-weight: 700; margin-bottom: 5px; text-align: center; text-transform: uppercase; }
        .root-name { font-size: 20px; font-weight: 700; color: var(--dark-blue); text-align: center; margin-bottom: 15px; font-family: 'Playfair Display', serif; }
        .gap-row { display: flex; gap: 15px; justify-content: center; margin: 15px 0 5px; flex-wrap: wrap; }
        .gap-item { background: white; padding: 10px 15px; border-radius: 30px; font-size: 12px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--border-sage); flex-wrap: wrap; justify-content: center; }
        .gap-value { font-weight: 700; background: var(--light-sage); padding: 3px 10px; border-radius: 20px; }
        .gap-value.highlight { background: var(--bronze); color: white; }
        
        /* ----- WIDE TREE LAYOUT (SIDE BY SIDE) ----- */
.tree-wide-layout {
    display: inline-flex;
    align-items: flex-start;
    flex-direction: row;
    gap: 30px;
    padding: 20px;
    /* This makes the canvas shrink and wrap tightly around the trees */
    zoom: 0.5; 
    width: max-content;
}
        .tree-column {
            flex: 0 0 320px;
            min-width: 280px;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .tree-column h3 { color: var(--maroon); margin-bottom: 20px; font-size: 14px; text-align: center; border-bottom: 2px solid var(--gold); padding-bottom: 8px; width: 100%; font-family: 'Playfair Display', serif; font-weight: 700; }
        .path-chain { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        /* ----- MEMBER BOX ----- */
        .box { border: 2px solid var(--gold); border-radius: 12px; background: white; min-width: 260px; max-width: 320px; width: 100%; text-align: center; cursor: pointer; position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.05); transition: transform 0.2s; margin: 0 auto; }
        .box:hover { transform: translateY(-3px); }
        .box.blinking-box { animation: blinkBoxLightGreen 1.5s infinite; border-width: 4px; z-index: 10; transform: scale(1.02); }
        .box.root-box { border-color: var(--maroon); border-width: 3px; background: #fff0f0; }
        @keyframes blinkBoxLightGreen {
            0%,100%{ border-color:#2e7d32; background:#e8f5e9; box-shadow:0 0 15px rgba(46,125,50,0.4); }
            50%{ border-color:#4caf50; background:#c8e6c9; box-shadow:0 0 30px rgba(76,175,80,0.6); transform:scale(1.05); }
        }
        .box-header { display: flex; justify-content: space-between; padding: 6px 10px; background: #f8fafc; font-size: 10px; font-weight: 800; border-bottom: 1px solid #ddd; }
        .box-body { padding: 12px; }
        .member-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 16px; display: block; white-space: normal; word-break: break-word; }
        .father-name { font-size: 11px; color: #64748b; margin-top: 4px; white-space: normal; word-break: break-word; }
        .female-box { background-color: var(--light-pink) !important; border-color: #fb7185 !important; }
        .v-line { width: 3px; height: 25px; background: var(--gold); margin: 10px auto; }
        .golden-heart { position: absolute; bottom: 5px; right: 8px; color: var(--gold); font-size: 16px; }
        
        /* ----- FOOTER ----- */
        .app-footer { background: var(--dark-blue); color: var(--gold); text-align: center; padding: 8px; font-size: 11px; border-top: 2px solid var(--gold); }
        .empty-state { text-align: center; color: #999; padding: 60px; background: var(--light-sage); border: 2px solid var(--border-sage); border-radius: 16px; margin: 20px auto; max-width: 500px; }
        
        /* ----- RESPONSIVE STACKING ----- */
        @media screen and (max-width: 650px) {
            .tree-column { flex: 0 0 320px; width: 320px; max-width: 350px; } /* FIXED: Keeps side-by-side on mobile */
            body { overflow: auto; height: auto; padding: 5px; }
            .app-container { height: auto; border-radius: 16px; }
            .fixed-header-section { padding: 15px 15px 10px 15px; }
            .search-input { font-size: 16px; height: 48px; }
        }

    </style>

<body>
    <!-- ⑨ ROOT TREE – MOBILE WIDE -->
    <div class="app-container">
        <!-- HEADER - TOP ROW with Reset on right -->
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">👥</span> 
                <span>Rizvi family - Root Tree</span>
            </div>
            <div class="top-reset-btn" onclick="resetSearch()">🔄 Reset</div>
           
        </div>
        
        <!-- SECOND ROW - Three equal buttons -->
        <div class="action-buttons-row">
            <div class="action-btn table" onclick="switchToTable()">📋 Show Table</div>
            <div class="action-btn pdf" onclick="exportPDF()">📑 Save PDF</div>
            <div class="action-btn dashboard" onclick="goToDashboard()">🏠 Dashboard</div>
        </div>
        
        <!-- main area -->
        <div class="main-content" id="mainContent">
            <div id="rootSection">
                <!-- fixed header with two search rows -->
                <div class="fixed-header-section">
                    <div class="search-row">
                        <div class="search-label">MEMBER 1</div>
                        <div class="search-wrapper">
                            <input type="text" id="search1" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value, 1)" autocomplete="off">
                            <div id="dropdown1" class="dropdown"></div>
                        </div>
                    </div>
                    <div class="search-row">
                        <div class="search-label">MEMBER 2</div>
                        <div class="search-wrapper">
                            <input type="text" id="search2" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value, 2)" autocomplete="off">
                            <div id="dropdown2" class="dropdown"></div>
                        </div>
                    </div>
                    <div class="border-line"></div>
                </div>
                <!-- scrollable tree area -->
                <div class="scrollable-content">
                    <div id="rootTree"></div>
                </div>
            </div>
        </div>
        <!-- footer -->
        <div class="app-footer">Designed by : Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010</div>
    </div>

    <!-- hidden markers for html editing -->
    <div class="section-marker" data-section="1-header"></div>
    <div class="section-marker" data-section="2-main"></div>
    <div class="section-marker" data-section="3-search-filters"></div>
    <div class="section-marker" data-section="4-tree-container"></div>
    <div class="section-marker" data-section="5-footer"></div>

<!-- JAVASCRIPT Start                          -->
<!-- ========================================= -->

<script>
    (function(){
        // =========================================================================
        // GLOBAL VARIABLES
        // =========================================================================
        let db = [];
        let member1 = null;
        let member2 = null;
        let LOAD_STAMP = '';

        // =========================================================================
        // UTILITIES
        // =========================================================================
        function displayName(str) {
            return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
        }

        function formatCurrentTime() {
            const d = new Date();
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
        }

        function findParent(member) {
            if (!member || !member.father) return null;
            return db.find(x => x.name.toLowerCase() === member.father.toLowerCase());
        }

        function getAncestryChain(member) {
            if (!member) return [];
            let chain = [], cur = member, visited = new Set();
            while (cur && !visited.has(cur.name.toLowerCase())) {
                chain.push(cur);
                visited.add(cur.name.toLowerCase());
                cur = findParent(cur);
            }
            return chain;
        }

        function getGenNum(gen) {
            const match = String(gen).match(/\d+/);
            return match ? parseInt(match[0]) : 0;
        }

        function findCommonRoot(m1, m2) {
            const chain1 = getAncestryChain(m1);
            const chain2 = getAncestryChain(m2);
            for (let p of chain1) {
                if (chain2.some(x => x.name.toLowerCase() === p.name.toLowerCase())) return p;
            }
            return null;
        }

        // =========================================================================
        // NAVIGATION
        // =========================================================================
        function switchToTable() {
            if (member1 && member2) {
                localStorage.setItem('rootMember1', JSON.stringify(member1));
                localStorage.setItem('rootMember2', JSON.stringify(member2));
            }
            window.location.href = '10-root-table-mobile.html';
        }

        function goToDashboard() {
            window.location.href = '6-dashboard-mobile.html';
        }

        function resetSearch() {
            member1 = null;
            member2 = null;
            document.getElementById('search1').value = '';
            document.getElementById('search2').value = '';
            document.getElementById('rootTree').innerHTML = `
                <div class="empty-state">
                    <div style="font-size:48px; margin-bottom:15px; opacity:0.5;">👥</div>
                    <div style="font-size:18px; font-weight:600; color:var(--maroon); margin-bottom:8px;">Select two members</div>
                    <div style="font-size:13px; color:#666;">Search and select two family members above to find their common root</div>
                </div>
            `;
            document.getElementById('dropdown1').style.display = 'none';
            document.getElementById('dropdown2').style.display = 'none';
        }

        // =========================================================================
        // SEARCH DROPDOWN
        // =========================================================================
        window.searchMember = function(query, num) {
            const drop = document.getElementById(`dropdown${num}`);
            drop.innerHTML = '';
            
            if (!query || query.length < 1) {
                drop.style.display = 'none';
                return;
            }
            
            const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
            if (found.length === 0) {
                drop.style.display = 'none';
                return;
            }
            
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                
                const nameDisplay = displayName(p.name);
                const fatherDisplay = displayName(p.father);
                const relation = p.gender?.startsWith('F') ? 'D/o' : 'S/o';
                
                div.innerHTML = `
                    <div>
                        <span class="main-name">${nameDisplay}</span> 
                        <span class="gen">${p.gen}</span>
                    </div>
                    <div class="father-info">${relation} ${fatherDisplay}</div>
                `;
                
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById(`search${num}`).value = `${nameDisplay} (${p.gen})`;
                    if (num === 1) member1 = p;
                    else member2 = p;
                    
                    if (member1 && member2) {
                        renderRootTree();
                    }
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            
            drop.style.display = 'block';
            drop.style.zIndex = '9999';
        };

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                document.getElementById('dropdown1').style.display = 'none';
                document.getElementById('dropdown2').style.display = 'none';
            }
        });

        // =========================================================================
        // RENDER BOX
        // =========================================================================
        function renderBox(member, label, isRoot, isSelected) {
            const isFemale = member.gender?.startsWith('F');
            const blinkClass = isSelected ? 'blinking-box' : '';
            const rootClass = isRoot ? 'root-box' : '';
            
            const hasChildren = db.some(x => x.father && x.father.toLowerCase() === member.name.toLowerCase());
            
            const memberStr = JSON.stringify(member).replace(/"/g, '&quot;');
            
            return `<div class="box ${isFemale ? 'female-box' : ''} ${blinkClass} ${rootClass}" onclick='handleBoxClick(${memberStr})'>
                <div class="box-header"><span>${label}</span></div>
                <div class="box-body">
                    <span class="member-name">${displayName(member.name)}</span>
                    <span style="font-size: 11px; color: #64748b; display: block; margin: 2px 0 4px 0;">${member.gen}</span>
                    <span class="father-name">${isFemale ? 'D/o' : 'S/o'}: ${displayName(member.father)}</span>
                    ${hasChildren ? '<div class="golden-heart">❤️</div>' : ''}
                </div>
            </div>`;
        }

        // =========================================================================
        // BOX CLICK HANDLER
        // =========================================================================
        window.handleBoxClick = function(member) {
            if (!member || !member.name) return;
            console.log('Box clicked:', member);
        };

        // =========================================================================
        // RENDER ROOT TREE
        // =========================================================================
        function renderRootTree() {
            if (!member1 || !member2) return;
            
            const commonRoot = findCommonRoot(member1, member2);
            
            if (!commonRoot) {
                document.getElementById('rootTree').innerHTML = `
                    <div class="root-card">
                        <div class="root-title">No Common Ancestor</div>
                        <div style="text-align:center; color:#666; padding:20px;">These members are not connected in the family tree.</div>
                    </div>
                `;
                return;
            }
            
            const chain1 = getAncestryChain(member1);
            const chain2 = getAncestryChain(member2);
            
            const rootIndex1 = chain1.findIndex(p => p.name.toLowerCase() === commonRoot.name.toLowerCase());
            const rootIndex2 = chain2.findIndex(p => p.name.toLowerCase() === commonRoot.name.toLowerCase());
            
            const path1 = chain1.slice(0, rootIndex1 + 1);
            const path2 = chain2.slice(0, rootIndex2 + 1);
            
            const gen1 = getGenNum(member1.gen);
            const gen2 = getGenNum(member2.gen);
            const genRoot = getGenNum(commonRoot.gen);
            const gap1 = Math.abs(gen1 - genRoot);
            const gap2 = Math.abs(gen2 - genRoot);
            const gap12 = Math.abs(gen1 - gen2);
            
            let html = `
                <div class="root-card">
                    <div class="root-title">Common Root Ancestor</div>
                    <div class="root-name">${displayName(commonRoot.name)}</div>
                    
                    <div class="gap-row">
                        <div class="gap-item">${displayName(member1.name)} → Root <span class="gap-value">${gap1} gen</span></div>
                        <div class="gap-item">${displayName(member2.name)} → Root <span class="gap-value">${gap2} gen</span></div>
                        <div class="gap-item">Between them <span class="gap-value highlight">${gap12} gen</span></div>
                    </div>
                </div>
                
                <div class="tree-wide-layout">
                    <div class="tree-column">
                        <h3>${displayName(member1.name)}'s Path to Root</h3>
                        <div class="path-chain">
            `;
            
            [...path1].reverse().forEach((member, index) => {
                const isRoot = member.name.toLowerCase() === commonRoot.name.toLowerCase();
                const label = index === 0 ? 'Selected' : (isRoot ? 'Root' : '');
                const isSelected = index === 0;
                
                html += renderBox(member, label, isRoot, isSelected);
                if (index < path1.length - 1) {
                    html += '<div class="v-line"></div>';
                }
            });
            
            html += `
                        </div>
                    </div>
                    <div class="tree-column">
                        <h3>${displayName(member2.name)}'s Path to Root</h3>
                        <div class="path-chain">
            `;
            
            [...path2].reverse().forEach((member, index) => {
                const isRoot = member.name.toLowerCase() === commonRoot.name.toLowerCase();
                const label = index === 0 ? 'Selected' : (isRoot ? 'Root' : '');
                const isSelected = index === 0;
                
                html += renderBox(member, label, isRoot, isSelected);
                if (index < path2.length - 1) {
                    html += '<div class="v-line"></div>';
                }
            });
            
            html += `
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('rootTree').innerHTML = html;
        }

        // =========================================================================
        // PDF EXPORT
        // =========================================================================

window.exportPDF = async function() {
    if (!member1 || !member2) {
        alert('Please select both members first');
        return;
    }
    
    const content = document.getElementById('rootTree');
    const treeLayout = document.querySelector('.tree-wide-layout');
    
    // SAVE ORIGINAL STATE
    const originalZoom = treeLayout.style.zoom;
    
    try {
        // 1. Prepare for high-res capture: Remove the 0.5 zoom
        treeLayout.style.zoom = "1"; 
        
        // Add Header/Footer for PDF
        const header = document.createElement('div');
        header.style.cssText = "margin-bottom:30px; text-align:center; width:100%;";
        header.innerHTML = `
            <h1 style="color: #d4af37; font-size: 36px; font-family: 'Playfair Display', serif; margin:0 0 10px 0;">Rizvi Family - Root Analysis</h1>
            <h2 style="color:#5a0000; font-size:24px; font-family:'Playfair Display', serif; margin:0;">${displayName(member1.name)} & ${displayName(member2.name)}</h2>
        `;
        
        const footer = document.createElement('div');
        footer.style.cssText = "margin-top:40px; padding:15px; border:2px solid #d4af37; background:#0f172a; color:#d4af37; display:flex; justify-content:space-between; font-size:12px; width:100%;";
        footer.innerHTML = `<span>Generated: ${formatCurrentTime()}</span><span>Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010</span>`;
        
        content.insertBefore(header, content.firstChild);
        content.appendChild(footer);

        // 2. Capture using the full "un-zoomed" width to prevent cutting
        const canvas = await html2canvas(content, {
            scale: 2, 
            backgroundColor: '#ffffff',
            useCORS: true,
            logging: false,
            width: content.scrollWidth,    // Captures the full horizontal spread
            windowWidth: content.scrollWidth 
        });

        // 3. RESTORE original mobile layout immediately
        treeLayout.style.zoom = originalZoom;
        content.removeChild(header);
        content.removeChild(footer);

        // 4. Create PDF
        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL('image/png');
        
        // Calculate dimensions in mm (1px = 0.264583mm)
        const pdfW = (canvas.width / 2) * 0.264583;
        const pdfH = (canvas.height / 2) * 0.264583;

        const pdf = new jsPDF({
            orientation: pdfW > pdfH ? 'l' : 'p',
            unit: 'mm',
            format: [pdfW + 20, pdfH + 20] // Adds a small margin
        });

        pdf.addImage(imgData, 'PNG', 10, 10, pdfW, pdfH);
       
// 1. Create a clean filename (Safe for GitHub & PC)
const clean = (str) => str.trim().replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');

const name1 = clean(member1.name);
const name2 = clean(member2.name);

// 2. This creates: Root-Tree-Name1-and-Name2.pdf
const fileName = `Root-Tree-${name1}-and-${name2}.pdf`;

// 3. Save the PDF with the new name
pdf.save(fileName);



    } catch (err) {
        // Safety: Ensure zoom is restored even if it fails
        treeLayout.style.zoom = originalZoom;
        console.error('PDF Error:', err);
        alert('❌ Error: ' + err.message);
    }
};

        // =========================================================================
        // LOAD DATA & INIT
        // =========================================================================
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
            LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
        }

        

        // expose globals
        window.switchToTable = switchToTable;
        window.goToDashboard = goToDashboard;
        window.resetSearch = resetSearch;

// 3. FINAL LOGIC: State Preservation & Initialization
        const fromDashboard = sessionStorage.getItem('fromDashboard') === 'true';

        document.addEventListener('DOMContentLoaded', function() {
            // Mobile menu toggle
        
            if (fromDashboard) {
                // CLEANUP: If coming from dashboard, wipe all temporary data
                sessionStorage.removeItem('tempRoot1');
                sessionStorage.removeItem('tempRoot2');
                sessionStorage.removeItem('fromDashboard');
                resetSearch();
            } else {
                // RESTORE: Check for state from dashboard click OR page refresh
                const saved1 = localStorage.getItem('rootMember1');
                const saved2 = localStorage.getItem('rootMember2');
                const temp1 = sessionStorage.getItem('tempRoot1');
                const temp2 = sessionStorage.getItem('tempRoot2');

                if (saved1 && saved2) {
                    member1 = JSON.parse(saved1);
                    member2 = JSON.parse(saved2);
                    localStorage.removeItem('rootMember1');
                    localStorage.removeItem('rootMember2');
                    updateInputsAndRender();
                } else if (temp1 && temp2) {
                    member1 = JSON.parse(temp1);
                    member2 = JSON.parse(temp2);
                    updateInputsAndRender();
                } else {
                    resetSearch();
                }
            }
        });

        function updateInputsAndRender() {
            if (member1) document.getElementById('search1').value = displayName(member1.name) + ' (' + member1.gen + ')';
            if (member2) document.getElementById('search2').value = displayName(member2.name) + ' (' + member2.gen + ')';
            renderRootTree();
        }

        // SAVE STATE: Store data before refresh (pull-to-refresh protection)
        window.addEventListener('beforeunload', function() {
            if (member1 && member2 && !fromDashboard) {
                sessionStorage.setItem('tempRoot1', JSON.stringify(member1));
                sessionStorage.setItem('tempRoot2', JSON.stringify(member2));
            }
        });

        // RESET: Ensure everything is cleaned on manual reset
        function resetSearch() {
            member1 = null;
            member2 = null;
            document.getElementById('search1').value = '';
            document.getElementById('search2').value = '';
            document.getElementById('rootTree').innerHTML = `
                <div class="empty-state">
                    <div style="font-size:48px; margin-bottom:15px; opacity:0.5;">👥</div>
                    <div style="font-size:18px; font-weight:600; color:var(--maroon); margin-bottom:8px;">Select two members</div>
                    <div style="font-size:13px; color:#666;">Search and select two family members above to find their common root</div>
                </div>
            `;
            sessionStorage.removeItem('tempRoot1');
            sessionStorage.removeItem('tempRoot2');
        }

        function goToDashboard() {
            // Signal to clean state when returning
            sessionStorage.setItem('fromDashboard', 'true');
            window.location.href = '6-dashboard-mobile.html'; 
        }

    })();
</script>
