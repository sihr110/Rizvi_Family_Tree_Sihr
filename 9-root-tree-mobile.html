<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes, viewport-fit=cover">
    <title>Rizvi family · root tree (mobile→pc layout)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
<!-- ========================================= -->
<!-- CSS START                                 -->
<!-- ========================================= -->
<style>
    /* ===== GLOBAL RESET & VARIABLES ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
        --maroon: #5a0000;
        --dark-blue: #0f172a;
        --gold: #d4af37;
        --light-gold: #f1d279;
        --green: #2e7d32;
        --dark-green: #1b5e20;
        --light-green: #d4edda;
        --pink-bg: #fff0f5;
        --light-pink: #ffe4e9;
        --light-sage: #f4f7f2;
        --border-sage: #c9d6c2;
        --sisters-border: #fb7185;
        --summary-border: #e6c87c;
        --table-header-bg: #fdf6e3;
        --bronze: #bc8c4f;
        --reset-red: #5a0000;
        --reset-red-dark: #7a1f1f;
        --pdf-grey: #6c757d;
        --pdf-grey-dark: #5a6268;
        --dashboard-green: #1b5e20;
        --sisters-box-bg: #fff0f5;
    }

    /* ----- BASE LAYOUT ----- */
    body {
        font-family: 'Inter', sans-serif;
        background: #1a1a1a;
        height: 100vh;
        margin: 0;
        padding: 10px;
        overflow: hidden; 
    }
    .app-container {
        max-width: 1400px;
        margin: 0 auto;
        background: white;
        height: calc(100vh - 20px);
        display: flex;
        flex-direction: column;
        border-radius: 20px;
        border: 2px solid var(--gold);
        overflow: hidden;
    }
    
    .app-header {
        background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
        color: var(--gold);
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 3px solid var(--gold);
        min-height: 60px;
    }

    .action-buttons-row {
        display: flex;
        gap: 8px;
        padding: 10px 20px;
        background: var(--dark-blue);
        border-bottom: 2px solid var(--gold);
    }
    .action-btn {
        flex: 1;
        padding: 8px 5px;
        font-weight: 600;
        font-size: 12px;
        border: 2px solid var(--gold);
        border-radius: 4px;
        color: white;
        text-align: center;
    }
    .action-btn.table { background: var(--bronze); }
    .action-btn.pdf { background: var(--pdf-grey); }
    .action-btn.dashboard { background: var(--dashboard-green); }

    /* ----- SEARCH SECTION ----- */
    .fixed-header-section {
        background: #f8fafc;
        padding: 15px 20px;
        border-bottom: 2px solid #e2e8f0;
    }
    .search-row { margin-bottom: 12px; position: relative; }
    .search-label { font-size: 11px; font-weight: 700; color: var(--maroon); margin-bottom: 4px; display: block; }
    .search-input {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
    }
    .dropdown {
        position: absolute;
        width: 100%;
        background: white;
        border: 2px solid var(--gold);
        border-radius: 8px;
        max-height: 250px;
        overflow-y: auto;
        display: none;
        z-index: 9999;
    }

    /* ----- THE CANVAS / SCROLLING AREA ----- */
    .main-content { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
        background: #fffcf8; 
    }
    
    .scrollable-content { 
        flex: 1; 
        overflow: auto; /* ALLOWS BOTH X AND Y SCROLLING */
        padding: 20px;
        -webkit-overflow-scrolling: touch;
    }

    .tree-wide-layout {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: nowrap !important; /* SIDE BY SIDE */
        gap: 50px;
        width: max-content; 
        min-height: min-content;
        margin: 0 auto;
    }

    /* ----- BOXES & FOOTER (AS PER ORIGINAL) ----- */
    .tree-column { flex: 0 0 300px; display: flex; flex-direction: column; align-items: center; }
    .box {
        border: 2px solid var(--gold);
        border-radius: 12px;
        background: white;
        width: 270px;
        overflow: hidden;
        position: relative;
    }
    .box-header { background: var(--dark-blue); color: var(--gold); font-size: 10px; padding: 4px; text-align: center; font-weight: 700; }
    .box-body { padding: 12px; text-align: center; }
    .member-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 17px; color: var(--maroon); }
    .v-line { width: 3px; height: 30px; background: var(--gold); margin: 0 auto; }
    
    .app-footer { 
        background: var(--dark-blue); 
        color: var(--gold); 
        padding: 10px; 
        text-align: center; 
        font-size: 11px; 
        font-weight: 600; 
        border-top: 2px solid var(--gold); 
    }
</style>
<!-- ========================================= -->
<!-- CSS END                                   -->
<!-- ========================================= -->

</head>
<body>
    <!-- ⑨ ROOT TREE – MOBILE WIDE -->
    <div class="app-container">
        <!-- HEADER - TOP ROW with Reset on right -->
        <div class="app-header">
            <div class="header-title">
                <span class="header-icon">👥</span> 
                <span>Rizvi family - Root Tree</span>
            </div>
            <div class="top-reset-btn" onclick="resetSearch()">🔄 Reset</div>
            <button class="menu-toggle" id="mobileMenuToggle">☰</button>
        </div>
        
        <!-- SECOND ROW - Three equal buttons -->
        <div class="action-buttons-row">
            <div class="action-btn table" onclick="switchToTable()">📋 Show Table</div>
            <div class="action-btn pdf" onclick="exportPDF()">📑 Save PDF</div>
            <div class="action-btn dashboard" onclick="goToDashboard()">🏠 Dashboard</div>
        </div>
        
        <!-- main area -->
        <div class="main-content" id="mainContent">
            <div id="rootSection">
                <!-- fixed header with two search rows -->
                <div class="fixed-header-section">
                    <div class="search-row">
                        <div class="search-label">MEMBER 1</div>
                        <div class="search-wrapper">
                            <input type="text" id="search1" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value, 1)" autocomplete="off">
                            <div id="dropdown1" class="dropdown"></div>
                        </div>
                    </div>
                    <div class="search-row">
                        <div class="search-label">MEMBER 2</div>
                        <div class="search-wrapper">
                            <input type="text" id="search2" class="search-input" placeholder="Type name..." onkeyup="searchMember(this.value, 2)" autocomplete="off">
                            <div id="dropdown2" class="dropdown"></div>
                        </div>
                    </div>
                    <div class="border-line"></div>
                </div>
                <!-- scrollable tree area -->
                <div class="scrollable-content">
                    <div id="rootTree"></div>
                </div>
            </div>
        </div>
        <!-- footer -->
        <div class="app-footer">Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010</div>
    </div>

    <!-- hidden markers for html editing -->
    <div class="section-marker" data-section="1-header"></div>
    <div class="section-marker" data-section="2-main"></div>
    <div class="section-marker" data-section="3-search-filters"></div>
    <div class="section-marker" data-section="4-tree-container"></div>
    <div class="section-marker" data-section="5-footer"></div>

<!-- ========================================= -->
<!-- JAVASCRIPT Start                          -->
<!-- ========================================= -->

<script>
    (function(){
        // =========================================================================
        // GLOBAL VARIABLES
        // =========================================================================
        let db = [];
        let member1 = null;
        let member2 = null;
        let LOAD_STAMP = '';

        // =========================================================================
        // UTILITIES
        // =========================================================================
        function displayName(str) {
            return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
        }

        function formatCurrentTime() {
            const d = new Date();
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
        }

        function findParent(member) {
            if (!member || !member.father) return null;
            return db.find(x => x.name.toLowerCase() === member.father.toLowerCase());
        }

        function getAncestryChain(member) {
            if (!member) return [];
            let chain = [], cur = member, visited = new Set();
            while (cur && !visited.has(cur.name.toLowerCase())) {
                chain.push(cur);
                visited.add(cur.name.toLowerCase());
                cur = findParent(cur);
            }
            return chain;
        }

        function getGenNum(gen) {
            const match = String(gen).match(/\d+/);
            return match ? parseInt(match[0]) : 0;
        }

        function findCommonRoot(m1, m2) {
            const chain1 = getAncestryChain(m1);
            const chain2 = getAncestryChain(m2);
            for (let p of chain1) {
                if (chain2.some(x => x.name.toLowerCase() === p.name.toLowerCase())) return p;
            }
            return null;
        }

        // =========================================================================
        // NAVIGATION
        // =========================================================================
        function switchToTable() {
            if (member1 && member2) {
                localStorage.setItem('rootMember1', JSON.stringify(member1));
                localStorage.setItem('rootMember2', JSON.stringify(member2));
            }
            window.location.href = '10-root-table-mobile.html';
        }

        function goToDashboard() {
            window.location.href = '6-dashboard-mobile.html';
        }

        function resetSearch() {
            member1 = null;
            member2 = null;
            document.getElementById('search1').value = '';
            document.getElementById('search2').value = '';
            document.getElementById('rootTree').innerHTML = `
                <div class="empty-state">
                    <div style="font-size:48px; margin-bottom:15px; opacity:0.5;">👥</div>
                    <div style="font-size:18px; font-weight:600; color:var(--maroon); margin-bottom:8px;">Select two members</div>
                    <div style="font-size:13px; color:#666;">Search and select two family members above to find their common root</div>
                </div>
            `;
            document.getElementById('dropdown1').style.display = 'none';
            document.getElementById('dropdown2').style.display = 'none';
        }

        // =========================================================================
        // SEARCH DROPDOWN
        // =========================================================================
        window.searchMember = function(query, num) {
            const drop = document.getElementById(`dropdown${num}`);
            drop.innerHTML = '';
            
            if (!query || query.length < 1) {
                drop.style.display = 'none';
                return;
            }
            
            const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
            if (found.length === 0) {
                drop.style.display = 'none';
                return;
            }
            
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                
                const nameDisplay = displayName(p.name);
                const fatherDisplay = displayName(p.father);
                const relation = p.gender?.startsWith('F') ? 'D/o' : 'S/o';
                
                div.innerHTML = `
                    <div>
                        <span class="main-name">${nameDisplay}</span> 
                        <span class="gen">${p.gen}</span>
                    </div>
                    <div class="father-info">${relation} ${fatherDisplay}</div>
                `;
                
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById(`search${num}`).value = `${nameDisplay} (${p.gen})`;
                    if (num === 1) member1 = p;
                    else member2 = p;
                    
                    if (member1 && member2) {
                        renderRootTree();
                    }
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            
            drop.style.display = 'block';
            drop.style.zIndex = '9999';
        };

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                document.getElementById('dropdown1').style.display = 'none';
                document.getElementById('dropdown2').style.display = 'none';
            }
        });

        // =========================================================================
        // RENDER BOX
        // =========================================================================
        function renderBox(member, label, isRoot, isSelected) {
            const isFemale = member.gender?.startsWith('F');
            const blinkClass = isSelected ? 'blinking-box' : '';
            const rootClass = isRoot ? 'root-box' : '';
            
            const hasChildren = db.some(x => x.father && x.father.toLowerCase() === member.name.toLowerCase());
            
            const memberStr = JSON.stringify(member).replace(/"/g, '&quot;');
            
            return `<div class="box ${isFemale ? 'female-box' : ''} ${blinkClass} ${rootClass}" onclick='handleBoxClick(${memberStr})'>
                <div class="box-header"><span>${label}</span></div>
                <div class="box-body">
                    <span class="member-name">${displayName(member.name)}</span>
                    <span style="font-size: 11px; color: #64748b; display: block; margin: 2px 0 4px 0;">${member.gen}</span>
                    <span class="father-name">${isFemale ? 'D/o' : 'S/o'}: ${displayName(member.father)}</span>
                    ${hasChildren ? '<div class="golden-heart">❤️</div>' : ''}
                </div>
            </div>`;
        }

        // =========================================================================
        // BOX CLICK HANDLER
        // =========================================================================
        window.handleBoxClick = function(member) {
            if (!member || !member.name) return;
            console.log('Box clicked:', member);
        };

        // =========================================================================
        // RENDER ROOT TREE
        // =========================================================================
        function renderRootTree() {
            if (!member1 || !member2) return;
            
            const commonRoot = findCommonRoot(member1, member2);
            
            if (!commonRoot) {
                document.getElementById('rootTree').innerHTML = `
                    <div class="root-card">
                        <div class="root-title">No Common Ancestor</div>
                        <div style="text-align:center; color:#666; padding:20px;">These members are not connected in the family tree.</div>
                    </div>
                `;
                return;
            }
            
            const chain1 = getAncestryChain(member1);
            const chain2 = getAncestryChain(member2);
            
            const rootIndex1 = chain1.findIndex(p => p.name.toLowerCase() === commonRoot.name.toLowerCase());
            const rootIndex2 = chain2.findIndex(p => p.name.toLowerCase() === commonRoot.name.toLowerCase());
            
            const path1 = chain1.slice(0, rootIndex1 + 1);
            const path2 = chain2.slice(0, rootIndex2 + 1);
            
            const gen1 = getGenNum(member1.gen);
            const gen2 = getGenNum(member2.gen);
            const genRoot = getGenNum(commonRoot.gen);
            const gap1 = Math.abs(gen1 - genRoot);
            const gap2 = Math.abs(gen2 - genRoot);
            const gap12 = Math.abs(gen1 - gen2);
            
            let html = `
                <div class="root-card">
                    <div class="root-title">Common Root Ancestor</div>
                    <div class="root-name">${displayName(commonRoot.name)}</div>
                    
                    <div class="gap-row">
                        <div class="gap-item">${displayName(member1.name)} → Root <span class="gap-value">${gap1} gen</span></div>
                        <div class="gap-item">${displayName(member2.name)} → Root <span class="gap-value">${gap2} gen</span></div>
                        <div class="gap-item">Between them <span class="gap-value highlight">${gap12} gen</span></div>
                    </div>
                </div>
                
                <div class="tree-wide-layout">
                    <div class="tree-column">
                        <h3>${displayName(member1.name)}'s Path to Root</h3>
                        <div class="path-chain">
            `;
            
            [...path1].reverse().forEach((member, index) => {
                const isRoot = member.name.toLowerCase() === commonRoot.name.toLowerCase();
                const label = index === 0 ? 'Selected' : (isRoot ? 'Root' : '');
                const isSelected = index === 0;
                
                html += renderBox(member, label, isRoot, isSelected);
                if (index < path1.length - 1) {
                    html += '<div class="v-line"></div>';
                }
            });
            
            html += `
                        </div>
                    </div>
                    <div class="tree-column">
                        <h3>${displayName(member2.name)}'s Path to Root</h3>
                        <div class="path-chain">
            `;
            
            [...path2].reverse().forEach((member, index) => {
                const isRoot = member.name.toLowerCase() === commonRoot.name.toLowerCase();
                const label = index === 0 ? 'Selected' : (isRoot ? 'Root' : '');
                const isSelected = index === 0;
                
                html += renderBox(member, label, isRoot, isSelected);
                if (index < path2.length - 1) {
                    html += '<div class="v-line"></div>';
                }
            });
            
            html += `
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('rootTree').innerHTML = html;
        }

        // =========================================================================
        // PDF EXPORT
        // =========================================================================
        window.exportPDF = async function() {
            if (!member1 || !member2) {
                alert('Please select both members first');
                return;
            }
            
            const content = document.getElementById('rootTree');
            
            try {
                const header = document.createElement('div');
                header.style.marginBottom = '30px';
                header.style.textAlign = 'center';
                header.innerHTML = `
                    <h1 style="color: #d4af37; font-size: 36px; font-family: 'Playfair Display', serif; margin:0 0 10px 0;">Rizvi Family - Root Analysis</h1>
                    <h2 style="color:#5a0000; font-size:24px; font-family:'Playfair Display', serif; margin:0;">${displayName(member1.name)} & ${displayName(member2.name)}</h2>
                `;
                
                const footer = document.createElement('div');
                footer.style.marginTop = '40px';
                footer.style.padding = '15px 20px';
                footer.style.border = '2px solid #d4af37';
                footer.style.borderRadius = '4px';
                footer.style.background = '#0f172a';
                footer.style.color = '#d4af37';
                footer.style.display = 'flex';
                footer.style.justifyContent = 'space-between';
                footer.style.alignItems = 'center';
                footer.style.fontSize = '11px';
                
                const timeStr = formatCurrentTime();
                footer.innerHTML = `<span>${LOAD_STAMP || 'Last data updated on: Unknown'}</span><span style="font-weight: 500;">PDF generated: ${timeStr}</span>`;
                
                const signature = document.createElement('div');
                signature.style.marginTop = '20px';
                signature.style.paddingTop = '15px';
                signature.style.borderTop = '1px solid #ddd';
                signature.style.textAlign = 'center';
                signature.style.color = '#000';
                signature.style.fontSize = '12px';
                signature.style.fontWeight = '500';
                signature.textContent = 'Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010';
                
                content.insertBefore(header, content.firstChild);
                content.appendChild(footer);
                content.appendChild(signature);
                
                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed';
                loadingMsg.style.top = '50%';
                loadingMsg.style.left = '50%';
                loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000';
                loadingMsg.style.color = 'white';
                loadingMsg.style.padding = '20px 40px';
                loadingMsg.style.borderRadius = '8px';
                loadingMsg.style.zIndex = '9999';
                loadingMsg.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
                loadingMsg.textContent = '📄 Preparing PDF... please wait';
                document.body.appendChild(loadingMsg);
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
             const canvas = await html2canvas(content, {
    scale: 2,
    backgroundColor: '#ffffff',
    logging: false,
    allowTaint: true,
    useCORS: true,
    // Add these two lines to capture the full horizontal width
    width: content.scrollWidth, 
    windowWidth: content.scrollWidth 
});
                
                content.removeChild(header);
                content.removeChild(footer);
                content.removeChild(signature);
                document.body.removeChild(loadingMsg);
                
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                
                const w = canvas.width / 2 * 0.264583;
                const h = canvas.height / 2 * 0.264583;
                
                const pdf = new jsPDF({
                    orientation: w > h ? 'l' : 'p',
                    unit: 'mm',
                    format: [w + 40, h + 40]
                });
                
                pdf.addImage(imgData, 'PNG', 20, 20, w, h);
                
                const safeName1 = displayName(member1.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                const safeName2 = displayName(member2.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                pdf.save(`root_${safeName1}_${safeName2}_${Date.now()}.pdf`);
                
            } catch (err) {
                console.error('PDF Error:', err);
                alert('❌ PDF generation failed: ' + err.message);
            }
        };

        // =========================================================================
        // LOAD DATA & INIT
        // =========================================================================
        const saved = localStorage.getItem('familyDB');
        if (saved) {
            db = JSON.parse(saved);
            LOAD_STAMP = 'Last data updated on: ' + new Date().toLocaleString();
        }

        document.addEventListener('DOMContentLoaded', function() {
            // mobile menu toggle
            document.getElementById('mobileMenuToggle')?.addEventListener('click', function() {
                document.querySelector('.fixed-header-section')?.classList.toggle('collapsed');
            });

            const saved1 = localStorage.getItem('rootMember1');
            const saved2 = localStorage.getItem('rootMember2');
            if (saved1 && saved2) {
                member1 = JSON.parse(saved1);
                member2 = JSON.parse(saved2);
                document.getElementById('search1').value = displayName(member1.name) + ' (' + member1.gen + ')';
                document.getElementById('search2').value = displayName(member2.name) + ' (' + member2.gen + ')';
                localStorage.removeItem('rootMember1');
                localStorage.removeItem('rootMember2');
                renderRootTree();
            } else {
                resetSearch();
            }
        });

        // expose globals
        window.switchToTable = switchToTable;
        window.goToDashboard = goToDashboard;
        window.resetSearch = resetSearch;
    })();
</script>

<!-- ========================================= -->
<!-- JAVASCRIPT END                            -->
<!-- ========================================= -->
</body>
</html>
