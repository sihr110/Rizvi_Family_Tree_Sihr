<style>
    /* ===== GLOBAL RESET & VARIABLES ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
        --maroon: #5a0000;
        --dark-blue: #0f172a;
        --gold: #d4af37;
        --light-gold: #f1d279;
        --green: #2e7d32;
        --dark-green: #1b5e20;
        --light-green: #d4edda;
        --pink-bg: #fff0f5;
        --light-pink: #ffe4e9;
        --light-sage: #f4f7f2;
        --border-sage: #c9d6c2;
        --sisters-border: #fb7185;
        --summary-border: #e6c87c;
        --table-header-bg: #fdf6e3;
        --bronze: #bc8c4f;
        --reset-red: #5a0000;
        --reset-red-dark: #7a1f1f;
        --pdf-grey: #6c757d;
        --pdf-grey-dark: #5a6268;
        --dashboard-green: #1b5e20;
        --sisters-box-bg: #fff0f5;
    }

    /* ----- BASE LAYOUT ----- */
    body {
        font-family: 'Inter', sans-serif;
        background: #1a1a1a;
        height: 100vh;
        overflow: hidden;
        margin: 0;
        padding: 10px;
    }
    .app-container {
        max-width: 1400px;
        margin: 0 auto;
        background: white;
        height: calc(100vh - 20px);
        display: flex;
        flex-direction: column;
        border-radius: 20px;
        border: 2px solid var(--gold);
        overflow: hidden;
        box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
    }
    
    .app-header {
        background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
        color: var(--gold);
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 3px solid var(--gold);
        position: relative;
        z-index: 100;
    }
    .header-title {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 900;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .top-reset-btn {
        background: var(--reset-red);
        color: white;
        border: 2px solid var(--gold);
        border-radius: 4px;
        padding: 6px 14px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
    }
    
    .action-buttons-row {
        display: flex;
        gap: 8px;
        width: 100%;
        padding: 10px 20px;
        background: var(--dark-blue);
        border-bottom: 2px solid var(--gold);
    }
    .action-btn {
        flex: 1;
        padding: 8px 5px;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        border: 2px solid var(--gold);
        border-radius: 4px;
        color: white;
    }
    .action-btn.table { background: var(--bronze); }
    .action-btn.pdf { background: var(--pdf-grey); }
    .action-btn.dashboard { background: var(--dashboard-green); }
    
    .main-content { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        overflow: hidden; 
        background: #fffcf8;
    }
    
    /* ----- THE SIDE-BY-SIDE FIX ----- */
    .scrollable-content { 
        flex: 1; 
        overflow-x: auto; /* Enable horizontal scroll */
        overflow-y: auto; 
        padding: 15px;
        display: block; 
        -webkit-overflow-scrolling: touch;
    }

    .tree-wide-layout {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: nowrap !important; /* Forces side-by-side ALWAYS */
        gap: 30px;
        width: max-content; /* Increases width based on content */
        margin: 0 auto;
        min-width: 100%;
    }

    .tree-column {
        flex: 0 0 300px; /* Keeps tree width fixed */
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    .box {
        border: 2px solid var(--gold);
        border-radius: 12px;
        background: white;
        width: 260px;
        text-align: center;
        padding: 12px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    .member-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 16px; }
    .v-line { width: 3px; height: 25px; background: var(--gold); margin: 10px auto; }

    /* ----- CLEAN MOBILE SETTINGS (NO STACKING) ----- */
    @media screen and (max-width: 768px) {
        .app-container { height: auto; min-height: 100vh; border-radius: 0; }
        .action-btn { font-size: 10px; }
        .search-input { height: 48px; font-size: 16px; }
    }
</style>
