<style>
    /* ===== GLOBAL RESET & VARIABLES ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
        --maroon: #5a0000;
        --dark-blue: #0f172a;
        --gold: #d4af37;
        --light-gold: #f1d279;
        --green: #2e7d32;
        --dark-green: #1b5e20;
        --light-green: #d4edda;
        --pink-bg: #fff0f5;
        --light-pink: #ffe4e9;
        --light-sage: #f4f7f2;
        --border-sage: #c9d6c2;
        --sisters-border: #fb7185;
        --summary-border: #e6c87c;
        --table-header-bg: #fdf6e3;
        --bronze: #bc8c4f;
        --reset-red: #5a0000;
        --reset-red-dark: #7a1f1f;
        --pdf-grey: #6c757d;
        --pdf-grey-dark: #5a6268;
        --dashboard-green: #1b5e20;
        --sisters-box-bg: #fff0f5;
    }

    /* ----- BASE LAYOUT ----- */
    body {
        font-family: 'Inter', sans-serif;
        background: #1a1a1a;
        height: 100vh;
        overflow: hidden;
        margin: 0;
        padding: 10px;
    }
    .app-container {
        max-width: 1400px;
        margin: 0 auto;
        background: white;
        height: calc(100vh - 20px);
        display: flex;
        flex-direction: column;
        border-radius: 20px;
        border: 2px solid var(--gold);
        overflow: hidden;
        box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
    }
    
    .app-header {
        background: linear-gradient(135deg, var(--dark-blue) 0%, #1e3d3d 100%);
        color: var(--gold);
        padding: 10px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 3px solid var(--gold);
        position: relative;
        z-index: 100;
    }
    .header-title {
        font-family: 'Playfair Display', serif;
        font-size: 20px;
        font-weight: 900;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .menu-toggle {
        display: none;
        background: none;
        border: 2px solid var(--gold);
        color: var(--gold);
        font-size: 20px;
        padding: 2px 8px;
        border-radius: 4px;
        cursor: pointer;
    }
    .action-buttons-row {
        display: flex;
        gap: 8px;
        width: 100%;
        padding: 10px 20px;
        background: var(--dark-blue);
        border-bottom: 2px solid var(--gold);
    }
    .action-btn {
        flex: 1;
        padding: 8px 5px;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        border: 2px solid var(--gold);
        border-radius: 4px;
        color: white;
    }
    .action-btn.table { background: var(--bronze); }
    .action-btn.pdf { background: var(--pdf-grey); }
    .action-btn.dashboard { background: var(--dashboard-green); }
    .top-reset-btn { background: var(--reset-red); color: white; border: 1px solid var(--gold); border-radius: 4px; padding: 4px 10px; font-size: 12px; font-weight: 600; cursor: pointer; }

    /* ----- SEARCH & DROPDOWN (RESTORED ORIGINAL) ----- */
    .fixed-header-section {
        background: #f8fafc;
        padding: 15px 20px;
        border-bottom: 2px solid #e2e8f0;
    }
    .search-row { margin-bottom: 12px; position: relative; }
    .search-label { font-size: 11px; font-weight: 700; color: var(--maroon); margin-bottom: 4px; }
    .search-input {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
    }
    .dropdown {
        position: absolute;
        width: 100%;
        background: white;
        border: 2px solid var(--gold);
        border-radius: 8px;
        max-height: 250px;
        overflow-y: auto;
        display: none;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        z-index: 9999;
    }
    .result-item { padding: 10px; border-bottom: 1px solid #f1f5f9; cursor: pointer; text-align: left; }
    .result-item:hover { background: #fffcf0; }
    .main-name { font-weight: 700; color: var(--dark-blue); }
    .father-info { font-size: 11px; color: #64748b; }

    /* ----- TREE LAYOUT (SIDE-BY-SIDE FIX) ----- */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #fffcf8; }
    .scrollable-content { 
        flex: 1; 
        overflow-x: auto; 
        overflow-y: auto; 
        padding: 15px;
        -webkit-overflow-scrolling: touch;
    }
    .tree-wide-layout {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: nowrap !important; /* FIXED: Never stacks */
        gap: 40px;
        width: max-content; 
        margin: 0 auto;
        min-width: 100%;
    }
    .tree-column {
        flex: 0 0 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    .tree-column h3 {
        font-size: 14px;
        color: var(--maroon);
        margin-bottom: 15px;
        text-align: center;
        background: var(--light-gold);
        padding: 5px 15px;
        border-radius: 20px;
    }

    /* ----- BOX DESIGN (RESTORED ORIGINAL) ----- */
    .box {
        border: 2px solid var(--gold);
        border-radius: 12px;
        background: white;
        width: 260px;
        padding: 0;
        overflow: hidden;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        position: relative;
    }
    .box-header { background: var(--dark-blue); color: var(--gold); font-size: 10px; padding: 3px; font-weight: 700; text-align: center; }
    .box-body { padding: 12px; position: relative; text-align: center; }
    .member-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 16px; color: var(--maroon); display: block; }
    .father-name { font-size: 12px; color: #475569; }
    .v-line { width: 3px; height: 25px; background: var(--gold); margin: 0 auto; }
    .golden-heart { position: absolute; top: 5px; right: 5px; font-size: 12px; }

    /* ----- ROOT CARD ----- */
    .root-card {
        background: white;
        border: 3px solid var(--gold);
        border-radius: 15px;
        padding: 15px;
        margin: 0 auto 30px auto;
        text-align: center;
        box-shadow: 0 8px 16px rgba(212,175,55,0.15);
        max-width: 600px;
    }
    .root-title { color: var(--maroon); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
    .root-name { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; color: var(--dark-blue); margin: 5px 0; }
    
    .gap-row { display: flex; justify-content: center; gap: 15px; margin-top: 10px; flex-wrap: wrap; }
    .gap-item { font-size: 11px; color: #64748b; background: #f1f5f9; padding: 4px 10px; border-radius: 12px; }
    .gap-value { font-weight: 700; color: var(--maroon); }
    .gap-value.highlight { color: #2563eb; }

    /* ----- FOOTER ----- */
    .app-footer { background: var(--dark-blue); color: var(--gold); padding: 8px; text-align: center; font-size: 11px; font-weight: 600; border-top: 2px solid var(--gold); }

    /* ----- MOBILE SETTINGS (CLEAN) ----- */
    @media screen and (max-width: 768px) {
        .app-container { height: 100vh; border-radius: 0; border: none; }
        .menu-toggle { display: block; }
        .fixed-header-section.collapsed { display: none; }
    }
</style>
