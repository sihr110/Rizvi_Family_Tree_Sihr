<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Rizvi family · structured tree</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>


:root {
    --gold-primary: #d4af37;
    --gold-light: #f9f295;
    --gold-dark: #996515;
    --bg-green-soft: #f0fff4; /* The light green interior */
}

@keyframes wave {
    0%, 100% { transform: rotateX(5deg) rotateY(-5deg) translateY(0px); }
    25% { transform: rotateX(8deg) rotateY(5deg) translateY(-10px); }
    50% { transform: rotateX(5deg) rotateY(10deg) translateY(0px); }
    75% { transform: rotateX(2deg) rotateY(5deg) translateY(10px); }
}

.waving-container {
    perspective: 1000px;
    padding: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
}

.golden-waving-box {
    width: 75%; /* Reduced from 100% */
    max-width: 375px; /* Reduced from 500px */
    background: var(--bg-green-soft);
    border: 5px solid transparent;
    border-image: linear-gradient(45deg, var(--gold-dark), var(--gold-light), var(--gold-primary)) 1;
    padding: 30px 18px; /* Reduced padding */
    text-align: center;
    position: relative;
    transform-style: preserve-3d;
    animation: wave 8s ease-in-out infinite;
    box-shadow: -10px 15px 30px rgba(0,0,0,0.1), 0 5px 15px rgba(212, 175, 55, 0.2);
}

.golden-waving-box .icon {
    font-size: 42px; /* Reduced from 56px */
    margin-bottom: 15px;
    display: inline-block;
    transform: translateZ(40px);
}

.golden-waving-box .row1 {
    font-size: 18px; /* Reduced from 24px */
    font-weight: 700;
    color: #1a3a1a;
    margin-bottom: 15px;
    transform: translateZ(30px);
    font-family: 'Playfair Display', serif;
}

.golden-waving-box .row3 {
    font-size: 12px; /* Reduced from 16px */
    color: #2d5a27;
    background: rgba(255, 255, 255, 0.6);
    padding: 9px; /* Reduced padding */
    border-radius: 8px;
    transform: translateZ(20px);
    border: 1px dashed var(--gold-primary);
    line-height: 1.4;
}


        /* ========== CSS STYLES (unchanged visual) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --maroon: #5a0000;
            --dark-blue: #0f172a;
            --gold: #d4af37;
            --light-gold: #f1d279;
            --green: #2e7d32;
            --dark-green: #1b5e20;
            --light-green: #d4edda;
            --pink-bg: #fff0f5;
            --light-pink: #ffe4e9;
            --light-sage: #f4f7f2;
            --border-sage: #c9d6c2;
            --sisters-border: #fb7185;
            --summary-border: #e6c87c;

        .header-btn.reset:hover { background: var(--reset-red-dark); }
        .header-btn.pdf { background: var(--pdf-grey); color: white; border-color: transparent; border-radius: 4px; }
        .header-btn.pdf:hover { background: var(--pdf-grey-dark); }
        .header-btn.table { background: var(--bronze); color: white; border-color: transparent; border-radius: 4px; }
        .header-btn.table:hover { background: #9e6f3a; }

        #individualSection { display: flex; flex-direction: column; height: 100%; overflow: hidden; flex: 1; }

        .search-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .search-label { font-weight: 700; color: var(--maroon); font-size: 13px; text-transform: uppercase; white-space: nowrap; }
        .search-wrapper { position: relative; flex: 2; min-width: 300px; }
        .search-input { width: 100%; padding: 8px 15px; border: 2px solid #cbd5e1; border-radius: 4px; font-size: 13px; outline: none; transition: all 0.3s; }
        .search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2); }
        .dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border: 2px solid var(--gold); border-radius: 0 0 4px 4px; max-height: 200px; overflow-y: auto; display: none; z-index: 1000; box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        .result-item { padding: 8px 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .result-item:hover { background: #faebcd; }
        .result-item .main-name { font-weight: 700; color: var(--dark-blue); }
        .result-item .gen { color: var(--maroon); font-size: 11px; margin-left: 6px; }
        .filter-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; border-radius: 4px; font-weight: 600; font-size: 13px; cursor: pointer; border: 2px solid var(--gold); background: white; color: var(--dark-blue); white-space: nowrap; display: flex; align-items: center; gap: 4px; }
        .filter-btn.active { background: #d4edda; border-color: var(--dark-green); }
.tree-root-layout { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    gap: 15px; 
    width: 100%;  /* ← Changed to 100% */
    margin: 0 auto; 
    padding: 15px; 
}
        .family-group { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }


/* Replace your existing .children-row with this */
.children-row { 
    display: grid; 
    grid-template-columns: repeat(4, minmax(240px, 1fr)); 
    gap: 20px; 
    justify-content: center; 
    margin-top: 5px; 
    width: 100%; 
}

/* For rows with fewer than 4 boxes, center them */
.children-row:has(:first-child:nth-last-child(1)) {
    grid-template-columns: repeat(1, minmax(240px, 280px));
    justify-content: center;
}

.children-row:has(:first-child:nth-last-child(2)) {
    grid-template-columns: repeat(2, minmax(240px, 280px));
    justify-content: center;
}

.children-row:has(:first-child:nth-last-child(3)) {
    grid-template-columns: repeat(3, minmax(240px, 280px));
    justify-content: center;
}

        .relation-label { font-size: 11px; color: var(--gold); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; background: var(--dark-blue); padding: 4px 12px; border-radius: 4px; color: white; margin: 5px 0; text-align: center; display: inline-block; width: auto; }
        .descendant-heading { font-size: 14px; color: var(--maroon); font-weight: 800; margin: 15px 0 5px 0; font-family: 'Playfair Display', serif; text-align: center; width: 100%; border-bottom: 2px solid var(--gold); padding-bottom: 5px; }
        .sisters-group-box { border: 2px solid var(--sisters-border); border-radius: 12px; background: var(--sisters-box-bg); min-width: 300px; max-width: 380px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); padding: 12px; margin: 10px auto; }
        .sisters-group-box .sisters-header { font-size: 14px; font-weight: 800; color: var(--maroon); padding-bottom: 6px; margin-bottom: 6px; text-align: left; border-bottom: 2px solid var(--sisters-border); font-family: 'Playfair Display', serif; }

        .box:hover { transform: translateY(-3px); }

        @keyframes blinkBoxLightGreen { 0%,100%{ border-color:#2e7d32; background:#e8f5e9; box-shadow:0 0 15px rgba(46,125,50,0.4); } 50%{ border-color:#4caf50; background:#c8e6c9; box-shadow:0 0 30px rgba(76,175,80,0.6); transform:scale(1.05); } }
        .box-header { display: flex; justify-content: space-between; padding: 6px 10px; background: #f8fafc; font-size: 10px; font-weight: 800; border-bottom: 1px solid #ddd; }

        .v-line { width: 3px; height: 25px; background: var(--gold); margin: 5px auto; }

        @media screen and (max-width: 768px) { /* ... mobile styles kept exactly as original ... */

            .app-header { position: relative; padding: 10px 15px; }
            .header-title { font-size: 18px; width: calc(100% - 50px); }
            .menu-toggle { display: flex !important; position: absolute; top: 50%; right: 15px; transform: translateY(-50%); background: var(--gold); color: black; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 26px; font-weight: bold; cursor: pointer; z-index: 2000; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
            .fixed-header-section { transition: max-height 0.3s ease, padding 0.3s ease, margin 0.3s ease; overflow: hidden; max-height: 500px; padding: 15px 15px 10px 15px; background: #fffcf8; }

            .member-name { font-size: 16px !important; }
            .filter-btn { font-size: 11px; padding: 8px 4px; }

    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="header-title"><span class="header-icon">🌿</span> <span>Rizvi family · structured tree</span></div>
            <button class="menu-toggle" id="mobileMenuToggle">☰</button>
            <div class="header-actions" id="headerActions"></div>
        </div>
        <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;">
        <div class="main-content" id="mainContent">
            <div id="individualSection">
                <div class="fixed-header-section">
                    <div class="search-row">
                        <span class="search-label">SEARCH MEMBER</span>
                        <div class="search-wrapper">
                            <input type="text" id="individualSearch" class="search-input" placeholder="Type name..." onkeyup="searchIndividual(this.value)" autocomplete="off">
                            <div id="individualDropdown" class="dropdown"></div>
                        </div>
                        <div class="filter-buttons">
                            <div id="filterSiblings" class="filter-btn active" onclick="toggleFilter('siblings')">👥 Siblings</div>
                            <div id="filterDescendants" class="filter-btn active" onclick="toggleFilter('descendants')">👶 Descendants</div>
                            <div id="filterAncestors" class="filter-btn" onclick="toggleFilter('ancestors')">🌳 Ancestors</div>
                        </div>
                    </div>
                    <div class="border-line"></div>
                </div>
                <div class="scrollable-content">
                    <div id="individualTree" class="tree-root-layout"></div>
                </div>
            </div>
        </div>
        <div class="app-footer" id="appFooter">Developer: Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010</div>
    </div>

         <script>
        // =========================================================================
        // GLOBAL STATE & CONFIGURATION
        // =========================================================================
        let db = [];
        let fileInfo = null;
        let currentIndividual = null;
        let showSiblings = true;
        let showDescendants = true;
        let showAncestors = false;

        // =========================================================================
        // UTILITY FUNCTIONS
        // =========================================================================
        function displayName(str) {
            return str ? str.replace(/\s*-\s*\d+$/, '').trim() : '';
        }

        function formatCurrentTime() {
            const d = new Date();
            const day = d.getDate();
            const month = d.getMonth() + 1;
            const year = d.getFullYear();
            const hours = d.getHours();
            const minutes = String(d.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            return `${day}/${month}/${year} - ${displayHours}:${minutes}${ampm}`;
        }

        function updateFooter() {
            const footer = document.getElementById('appFooter');
            if (!footer) return;
            
            let timeStr = 'Unknown';
            
            if (fileInfo && fileInfo.saved_time) {
                timeStr = fileInfo.saved_time;
            } else {
                const savedInfo = localStorage.getItem('fileInfo');
                if (savedInfo) {
                    try {
                        const info = JSON.parse(savedInfo);
                        if (info && info.saved_time) {
                            timeStr = info.saved_time;
                            fileInfo = info;
                        }
                    } catch (e) {
                        console.error('Error parsing fileInfo:', e);
                    }
                }
            }
            
            if (timeStr === 'Date & time file saved' || timeStr.includes('Date & time')) {
                timeStr = 'No timestamp in Excel';
            }
            
            footer.innerHTML = `📅 Last Data saved: ${timeStr} <span style="margin:0 30px;">|</span> Developer: Imran Haider S/o Syed Risalat Hussain Rizvi <span style="margin:0 30px;">|</span> 0332-787-6010`;
        }

        // =========================================================================
        // VIEW NAVIGATION
        // =========================================================================
        function switchToTableView() {
            if (currentIndividual) {
                localStorage.setItem('tableViewMember', JSON.stringify(currentIndividual));
                localStorage.setItem('tableViewFilters', JSON.stringify({ showSiblings, showDescendants, showAncestors }));
            }
            window.location.href = '3-individual-table-pc.html';
        }

        function updateHeaderButtons() {
            const headerActions = document.getElementById('headerActions');
            if (!headerActions) return;
            headerActions.innerHTML = `
                <div class="header-btn table" onclick="switchToTableView()">📊 Switch to Table</div>
                <div class="header-btn reset" onclick="resetIndividual()">🔄 Reset</div>
                <div class="header-btn pdf" onclick="exportIndividualPDF()">📑 Save PDF</div>
                <div class="header-btn dashboard" onclick="showDashboard()">🏠 Dashboard</div>
            `;
        }

        function showDashboard() {
            window.location.href = '1-dashboard-pc.html';
        }

        function resetIndividual() {
            document.getElementById('individualSearch').value = '';
            currentIndividual = null;
            
            const treeArea = document.getElementById('individualTree');
            if (treeArea) {
                treeArea.innerHTML = `
                    <div class="waving-container">
                        <div class="golden-waving-box">
                            <div class="icon">👤</div>
                            <div class="row1">Select a member to view</div>
                            <div class="row3">
                                Search and select a family member above <br> 
                                to visualize their tree and connections
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // =========================================================================
        // FILTER TOGGLE
        // =========================================================================
        window.toggleFilter = function(filter) {
            if (!currentIndividual) return;
            if (filter === 'siblings') { 
                showSiblings = !showSiblings; 
                document.getElementById('filterSiblings').classList.toggle('active', showSiblings); 
            } else if (filter === 'descendants') { 
                showDescendants = !showDescendants; 
                document.getElementById('filterDescendants').classList.toggle('active', showDescendants); 
            } else if (filter === 'ancestors') { 
                showAncestors = !showAncestors; 
                document.getElementById('filterAncestors').classList.toggle('active', showAncestors); 
            }
            renderIndividualTree();
        };

        // =========================================================================
        // TREE HELPER FUNCTIONS
        // =========================================================================
        function findParent(p) {
            if (!p || !p.father) return null;
            return db.find(x => x.name.toLowerCase() === p.father.toLowerCase());
        }

        function getGenNum(gen) {
            const match = String(gen).match(/\d+/);
            return match ? parseInt(match[0]) : 0;
        }

        function getAncestryChain(p) {
            if (!p) return [];
            let chain = [], cur = p, visited = new Set();
            while (cur && !visited.has(cur.name.toLowerCase())) {
                chain.push(cur);
                visited.add(cur.name.toLowerCase());
                cur = findParent(cur);
            }
            return chain;
        }

        // =========================================================================
        // SEARCH FUNCTION
        // =========================================================================
        window.searchIndividual = function(query) {
            if (!db.length) return;
            const drop = document.getElementById('individualDropdown');
            if (!drop) return;
            drop.innerHTML = '';
            if (!query || query.length < 1) { drop.style.display = 'none'; return; }
            const found = db.filter(p => p.name.toLowerCase().includes(query.toLowerCase())).slice(0, 8);
            if (found.length === 0) { drop.style.display = 'none'; return; }
            found.forEach(p => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `<div><span class="main-name">${displayName(p.name)}</span> <span class="gen">(${p.gen})</span></div>
                    <div style="font-size:11px;">${p.gender?.startsWith('F') ? 'D/o' : 'S/o'} ${displayName(p.father)}</div>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    document.getElementById('individualSearch').value = displayName(p.name) + ' (' + p.gen + ')';
                    currentIndividual = p;
                    renderIndividualTree();
                    drop.style.display = 'none';
                };
                drop.appendChild(div);
            });
            drop.style.display = 'block';
        };

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-wrapper')) {
                document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
            }
        });

        // =========================================================================
        // BOX CLICK HANDLER
        // =========================================================================
        window.handleBoxClick = function(member) {
            if (!member || !member.name) return;
            currentIndividual = member;
            document.getElementById('individualSearch').value = displayName(member.name) + ' (' + member.gen + ')';
            renderIndividualTree();
        };

        // =========================================================================
        // RENDER BOX FUNCTION - UPDATED with all new fields
        // =========================================================================
        function renderBox(p, label, isSelected, hasChildren) {
            const isFemale = p.gender?.startsWith('F');
            const blinkClass = isSelected ? 'blinking-box' : '';
            const memberData = encodeURIComponent(JSON.stringify(p));
            
            // Find mother (spouse of father)
            let motherName = '';
            if (p.father) {
                const father = db.find(f => f.name.toLowerCase() === p.father.toLowerCase());
                if (father && father.spouse) {
                    motherName = father.spouse;
                }
            }
            
            // Rose for vital status (in front of name)
            const roseIcon = p.alive === 'No' ? '🥀' : '🌹';
            const roseColor = p.alive === 'No' ? '#666' : '#e31b23';
            
            // Marital status display
            let maritalDisplay = '';
            if (p.maritalStatus === 'Married') maritalDisplay = '💍';
            else if (p.maritalStatus === 'Unmarried') maritalDisplay = '';
            else if (p.maritalStatus === 'Widow' || p.maritalStatus === 'Widower') maritalDisplay = '👤';
            else if (p.maritalStatus === 'Divorced') maritalDisplay = '⚖️';
            
            // Family icon
            const familyIcon = '👪';
            
            return `<div class="box ${isFemale ? 'female-box' : ''} ${blinkClass}" onclick='handleBoxClick(JSON.parse(decodeURIComponent("${memberData}")))'>
                <div class="box-header">
                    <span>${label}</span>
                    <span>${p.gen}</span>
                </div>
                <div class="box-body">
                    <!-- Name with rose in front -->
                    <div style="display: flex; align-items: center; gap: 5px; margin-bottom: 8px;">
                        <span style="color: ${roseColor}; font-size: 20px;">${roseIcon}</span>
                        <span class="member-name">${displayName(p.name)}</span>
                    </div>
                    
                    <!-- Father -->
                    <div style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
                        <span style="font-size: 14px; min-width: 50px;">Father :</span>
                        <span class="father-name">${displayName(p.father)}</span>
                    </div>
                    
                    <!-- Mother (if found) -->
                    ${motherName ? `<div style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
                        <span style="font-size: 14px; min-width: 50px;">Mother :</span>
                        <span class="father-name" style="color: #b85c5c;">${displayName(motherName)}</span>
                    </div>` : ''}
                    
                    <!-- Spouse (if exists) -->
                    ${p.spouse ? `<div style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
                        <span style="font-size: 14px; min-width: 50px;">Spouse :</span>
                        <span class="father-name" style="color: #8B4513;">${displayName(p.spouse)}</span>
                    </div>` : ''}
                    
                    <!-- Status -->
                    <div style="display: flex; align-items: center; gap: 5px; margin-top: 3px;">
                        <span style="font-size: 14px; min-width: 50px;">Status :</span>
                        <span style="font-size: 14px;">${maritalDisplay}</span>
                        <span class="father-name">${p.maritalStatus || 'Married'}</span>
                    </div>
                    
                    <!-- Family icon for children -->
                    ${hasChildren ? `<div class="golden-heart" style="font-size: 18px;">${familyIcon}</div>` : ''}
                </div>
            </div>`;
        }

        // =========================================================================
        // RENDER INDIVIDUAL TREE - UPDATED with individual boxes for all
        // =========================================================================
        function renderIndividualTree() {
            if (!currentIndividual) return;
            let html = '<div>';

            // ANCESTORS SECTION
            if (showAncestors) {
                const ancestors = getAncestryChain(currentIndividual).slice(1);
                if (ancestors.length > 0) {
                    html += '<div class="family-group">';
                    html += '<div class="relation-label">ANCESTORS</div>';
                    [...ancestors].reverse().forEach((a, idx) => {
                        const hasChildren = db.some(x => x.father && x.father.toLowerCase() === a.name.toLowerCase());
                        html += renderBox(a, idx === 0 ? 'Earliest' : 'Ancestor', false, hasChildren);
                        if (idx < ancestors.length - 1) html += '<div class="v-line"></div>';
                    });
                    html += '<div class="v-line"></div>';
                    html += '</div>';
                }
            }

            // CURRENT MEMBER AND FATHER
            const father = findParent(currentIndividual);
            const ancestors = showAncestors ? getAncestryChain(currentIndividual).slice(1) : [];
            const fatherInAncestors = father && ancestors.some(a => a.name === father.name);

            if (father && !fatherInAncestors) {
                const fatherHasChildren = db.some(x => x.father && x.father.toLowerCase() === father.name.toLowerCase());
                html += '<div class="family-group">';
                html += renderBox(father, 'Father', false, fatherHasChildren);
                html += '<div class="v-line"></div>';
                const currentHasChildren = db.some(x => x.father && x.father.toLowerCase() === currentIndividual.name.toLowerCase());
                html += renderBox(currentIndividual, 'Selected', true, currentHasChildren);
                html += '</div>';
            } else {
                const currentHasChildren = db.some(x => x.father && x.father.toLowerCase() === currentIndividual.name.toLowerCase());
                html += '<div class="family-group">';
                html += renderBox(currentIndividual, 'Selected', true, currentHasChildren);
                html += '</div>';
            }

            // SIBLINGS SECTION - ALL as individual boxes
            if (showSiblings && father) {
                const siblings = db.filter(s => s.father && s.father.toLowerCase() === currentIndividual.father.toLowerCase() && s.name !== currentIndividual.name);
                if (siblings.length > 0) {
                    html += '<div class="family-group">';
                    html += `<div class="descendant-heading">DESCENDANTS OF ${displayName(father.name).toUpperCase()}</div>`;
                    html += '<div class="relation-label">SIBLINGS</div>';
                    
                    // ALL siblings in children-row (both male and female as individual boxes)
                    html += '<div class="children-row">';
                    siblings.forEach(s => {
                        const hasChildren = db.some(x => x.father && x.father.toLowerCase() === s.name.toLowerCase());
                        const siblingLabel = s.gender?.startsWith('F') ? 'Sister' : 'Brother';
                        html += renderBox(s, siblingLabel, false, hasChildren);
                    });
                    html += '</div>';
                    
                    html += '</div>';
                }
            }

            // DESCENDANTS SECTION - ALL as individual boxes
            if (showDescendants) {
                const children = db.filter(c => c.father && c.father.toLowerCase() === currentIndividual.name.toLowerCase());
                if (children.length > 0) {
                    html += '<div class="family-group">';
                    html += '<div class="v-line"></div>';
                    html += `<div class="descendant-heading">DESCENDANTS OF ${displayName(currentIndividual.name).toUpperCase()}</div>`;
                    html += '<div class="relation-label">CHILDREN</div>';
                    
                    // ALL children in children-row (both male and female as individual boxes)
                    html += '<div class="children-row">';
                    children.forEach(c => {
                        const hasChildren = db.some(x => x.father && x.father.toLowerCase() === c.name.toLowerCase());
                        const childLabel = c.gender?.startsWith('F') ? 'Daughter' : 'Son';
                        html += renderBox(c, childLabel, false, hasChildren);
                    });
                    html += '</div>';
                    
                    html += '</div>';
                }
            }

            html += '</div>';
            document.getElementById('individualTree').innerHTML = html;
        }

        // =========================================================================
        // PDF EXPORT
        // =========================================================================
        window.exportIndividualPDF = async function() {
            if (!currentIndividual) { 
                alert('Please select a member first'); 
                return; 
            }
            
            const treeElement = document.querySelector('.tree-root-layout');
            if (!treeElement) return alert('No content to export');
            
            try {
                const header = document.createElement('div');
                header.style.marginBottom = '30px'; 
                header.style.textAlign = 'center';
                header.innerHTML = `<h1 style="color: #d4af37; font-size: 36px; font-family: 'Playfair Display', serif; margin:0;">Rizvi Family Tree</h1>
                    <h2 style="color:#5a0000; font-size:24px; font-family:'Playfair Display', serif; margin:10px 0 0 0;">${displayName(currentIndividual.name)}</h2>`;
                
                treeElement.insertBefore(header, treeElement.firstChild);

                const footer = document.createElement('div');
                footer.style.marginTop = '30px';
                footer.style.padding = '15px 20px';
                footer.style.background = '#fcf9f4';
                footer.style.width = '100%';
                footer.style.boxSizing = 'border-box';
                footer.style.fontFamily = "'Inter', sans-serif";
                footer.style.fontSize = '12px';
                footer.style.textAlign = 'center';

                const timeStr = formatCurrentTime();
                const excelSavedTime = fileInfo ? fileInfo.saved_time : '06/03/2026, 3:57:46 pm';

                const line1 = document.createElement('div');
                line1.style.padding = '2px 0';
                line1.style.fontWeight = 'bold';
                line1.style.color = '#0f172a';
                line1.textContent = `Developer : Imran Haider S/o Syed Risalat Hussain Rizvi | 0332-787-6010`;

                const line2 = document.createElement('div');
                line2.style.padding = '2px 0';
                line2.style.fontWeight = 'bold';
                line2.style.color = '#5a0000';
                line2.textContent = `Last Data Updated : ${excelSavedTime} | PDF Printed : ${timeStr}`;

                footer.appendChild(line1);
                footer.appendChild(line2);
                treeElement.appendChild(footer);
                
                const loadingMsg = document.createElement('div');
                loadingMsg.style.position = 'fixed';
                loadingMsg.style.top = '50%'; 
                loadingMsg.style.left = '50%'; 
                loadingMsg.style.transform = 'translate(-50%, -50%)';
                loadingMsg.style.background = '#5a0000'; 
                loadingMsg.style.color = 'white'; 
                loadingMsg.style.padding = '20px 40px'; 
                loadingMsg.style.borderRadius = '8px'; 
                loadingMsg.style.zIndex = '9999'; 
                loadingMsg.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
                loadingMsg.textContent = '📄 Preparing PDF... please wait';
                document.body.appendChild(loadingMsg);
                
                await new Promise(resolve => setTimeout(resolve, 500));

                const canvas = await html2canvas(treeElement, { 
                    scale: 2, 
                    backgroundColor: '#ffffff', 
                    logging: false, 
                    allowTaint: true, 
                    useCORS: true 
                });
                
                treeElement.removeChild(header);
                treeElement.removeChild(footer);
                document.body.removeChild(loadingMsg);

                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const w = canvas.width / 2 * 0.264583;
                const h = canvas.height / 2 * 0.264583;
                const pdf = new jsPDF({ 
                    orientation: w > h ? 'l' : 'p', 
                    unit: 'mm', 
                    format: [w + 40, h + 40] 
                });
                
                pdf.addImage(imgData, 'PNG', 20, 20, w, h);
                const safeName = displayName(currentIndividual.name).replace(/[^a-z0-9]/gi, '_').toLowerCase();
                pdf.save(`family_${safeName}_${Date.now()}.pdf`);
                
            } catch (err) {
                console.error('PDF Error:', err);
                alert('❌ PDF generation failed: ' + err.message);
            }
        };

        // =========================================================================
        // LOAD DATA FROM LOCALSTORAGE AND INITIALISE
        // =========================================================================
        const saved = localStorage.getItem('familyDB');
        const savedInfo = localStorage.getItem('fileInfo');
        
        if (saved) {
            db = JSON.parse(saved);
        }
        
        if (savedInfo) {
            fileInfo = JSON.parse(savedInfo);
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('mobileMenuToggle')?.addEventListener('click', function() {
                document.querySelector('.fixed-header-section')?.classList.toggle('collapsed');
            });

            updateFooter();

            const tableMember = localStorage.getItem('tableViewMember');
            if (tableMember) {
                currentIndividual = JSON.parse(tableMember);
                document.getElementById('individualSearch').value = displayName(currentIndividual.name) + ' (' + currentIndividual.gen + ')';
                localStorage.removeItem('tableViewMember');
                const savedFilters = localStorage.getItem('tableViewFilters');
                if (savedFilters) {
                    const filters = JSON.parse(savedFilters);
                    showSiblings = filters.showSiblings;
                    showDescendants = filters.showDescendants;
                    showAncestors = filters.showAncestors;
                    document.getElementById('filterSiblings').classList.toggle('active', showSiblings);
                    document.getElementById('filterDescendants').classList.toggle('active', showDescendants);
                    document.getElementById('filterAncestors').classList.toggle('active', showAncestors);
                    localStorage.removeItem('tableViewFilters');
                }
            }

            updateHeaderButtons();

            if (currentIndividual) {
                renderIndividualTree();
            } else {
                resetIndividual();
            }
        });

        resetIndividual();
        window.switchToTableView = switchToTableView;
        window.showDashboard = showDashboard;
        window.resetIndividual = resetIndividual;
    </script>
</body>
</html>
